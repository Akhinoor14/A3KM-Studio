<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Book Details - A3KM Studio">
    <title>Book Details - A3KM Studio</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="../../manifest.json">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../../shared/mobile-common.css">
    <link rel="stylesheet" href="../../shared/mobile-navbar.css">

    <!-- Page Loading Indicator -->
    <script src="../../shared/page-loading.js"></script>

    <style>
        :root {
            --primary-red: #CC0000;
            --dark-red: #8B0000;
            --accent-red: #FF2020;
            --border-red: rgba(139,0,0,0.4);
            --border-strong: rgba(204,0,0,0.7);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.85);
            --text-dim: rgba(255,255,255,0.5);
            --text-muted: rgba(255,255,255,0.35);
        }

        body {
            padding-bottom: 80px;
            /* Premium reddish-black gradient - same as desktop */
            background: linear-gradient(180deg, #0a0000 0%, #030000 100%);
            font-family: 'Inter', 'Noto Sans Bengali', 'Segoe UI', sans-serif;
        }

        /* ── STICKY HEADER ─────────────────────────────── */
        .book-header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 16px;
            background: rgba(10, 0, 0, 0.98);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .book-header::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(204,0,0,0.4) 30%,
                rgba(204,0,0,0.6) 50%,
                rgba(204,0,0,0.4) 70%,
                transparent 100%
            );
            opacity: 0.8;
        }
        .header-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-primary);
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            text-align: center;
            letter-spacing: 0.3px;
        }
        .header-spacer { width: 72px; }

        /* ── HERO COVER SECTION ────────────────────────── */
        .cover-hero {
            position: relative;
            width: 100%;
            background: linear-gradient(180deg, rgba(10,0,0,0.95) 0%, rgba(14,4,4,0.98) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 20px 20px;
            min-height: 280px;
        }
        .cover-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 75% 50% at 50% 25%, rgba(204,0,0,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        /* 3D Book Cover - Desktop Style */
        .cover-img-wrap {
            position: relative;
            width: 160px;
            min-width: 160px;
            height: 240px;
            border-radius: 4px 12px 12px 4px;
            overflow: hidden;
            /* 3D book shadow effects */
            box-shadow:
                -6px 0 0 rgba(0,0,0,0.6),
                -12px 0 10px rgba(0,0,0,0.6),
                0 18px 45px rgba(0,0,0,0.8),
                0 0 50px rgba(204,0,0,0.12);
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        /* Subtle 3D tilt on load */
        .cover-img-wrap.loaded {
            animation: bookReveal 0.6s cubic-bezier(0.4,0,0.2,1) forwards;
        }

        @keyframes bookReveal {
            0% { 
                opacity: 0;
                transform: perspective(800px) rotateY(-15deg) translateY(20px); 
            }
            100% { 
                opacity: 1;
                transform: perspective(800px) rotateY(0deg) translateY(0); 
            }
        }

        /* Book spine strip - desktop style */
        .cover-img-wrap::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 14px;
            background: linear-gradient(90deg,
                rgba(0,0,0,0.7) 0%,
                rgba(0,0,0,0.45) 40%,
                rgba(255,255,255,0.06) 60%,
                rgba(0,0,0,0.35) 100%);
            z-index: 10;
        }

        .cover-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Cover format badge - desktop style */
        .cover-format-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            padding: 4px 10px;
            background: var(--primary-red);
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.8px;
            color: #fff;
            z-index: 12;
            box-shadow: 0 3px 12px rgba(204,0,0,0.5);
        }

        .cover-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, rgba(139,0,0,0.4), rgba(15,8,8,0.95));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cover-placeholder i {
            font-size: 64px;
            color: rgba(204,0,0,0.25);
        }

        /* Cover stats strip - centered below book */
        .cover-stats {
            margin-top: 24px;
            width: 100%;
            max-width: 340px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            z-index: 2;
        }
        .stat-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(14,4,4,0.85);
            border: 1px solid rgba(139,0,0,0.3);
            border-radius: 10px;
            backdrop-filter: blur(8px);
        }
        .stat-chip i {
            font-size: 13px;
            color: var(--primary-red);
            width: 16px;
            text-align: center;
        }
        .stat-chip-info { 
            display: flex; 
            flex-direction: column;
            flex: 1;
        }
        .stat-label { 
            font-size: 9px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.6px; 
            color: var(--text-muted);
        }
        .stat-value { 
            font-size: 13px; 
            font-weight: 800; 
            color: var(--text-secondary);
            margin-top: 1px;
        }

        /* ── CONTENT BELOW ─────────────────────────────── */
        .content-body { 
            padding: 24px 16px 0; 
            max-width: 600px;
            margin: 0 auto;
        }

        /* Badges row - desktop style */
        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 14px;
        }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .badge-cat {
            background: rgba(204,0,0,0.15);
            border: 1px solid rgba(204,0,0,0.45);
            color: rgba(255,100,100,0.95);
        }
        .badge-lang {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.75);
        }
        .badge-date {
            background: transparent;
            border: 1px solid rgba(139,0,0,0.3);
            color: var(--text-muted);
        }

        /* Title + Author - desktop style */
        .book-main-title {
            font-size: clamp(18px, 5vw, 22px);
            font-weight: 900;
            line-height: 1.25;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 0 30px rgba(204,0,0,0.2);
            letter-spacing: -0.3px;
        }
        .author-row {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .author-row i { 
            color: var(--primary-red); 
            font-size: 12px; 
        }

        /* Meta chips - desktop style */
        .meta-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .meta-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: rgba(14,4,4,0.85);
            border: 1px solid rgba(139,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            backdrop-filter: blur(8px);
        }
        .meta-chip i { 
            color: var(--primary-red); 
            font-size: 10px; 
        }

        /* Section divider - desktop style */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139,0,0,0.4), transparent);
            margin: 20px 0;
        }

        /* ── ACTION STRIP - Desktop Premium Style ──────── */
        .action-strip {
            display: flex;
            gap: 12px;
            margin-bottom: 6px;
        }
        .btn-read, .btn-3d {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            padding: 14px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
        }

        .btn-read {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            color: #fff;
            box-shadow: 0 5px 20px rgba(204,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        /* Shine effect on read button */
        .btn-read::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        .btn-read:active {
            transform: scale(0.97);
            box-shadow: 0 3px 12px rgba(204,0,0,0.5);
        }
        .btn-read:active::before {
            transform: translateX(100%);
        }

        .btn-3d {
            background: rgba(14,4,4,0.95);
            color: rgba(255,255,255,0.85);
            border: 2px solid rgba(139,0,0,0.45) !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        .btn-3d:active {
            background: rgba(204,0,0,0.12);
            border-color: rgba(204,0,0,0.7) !important;
            color: #fff;
            transform: scale(0.97);
        }

        /* ── SUMMARY - Desktop Style ──────────────────── */
        .section-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-red);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(139,0,0,0.3);
        }

        .summary-inner {
            font-size: 13px;
            line-height: 1.75;
            color: var(--text-secondary);
            max-height: 150px;
            overflow: hidden;
            position: relative;
            transition: max-height 0.5s ease;
        }
        .summary-inner.expanded { max-height: 9999px; }
        .summary-inner:not(.expanded)::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 55px;
            background: linear-gradient(transparent, rgba(10,0,0,0.95));
            pointer-events: none;
        }
        .summary-inner p, .summary-inner div { margin-bottom: 8px; }
        .summary-inner strong { color: #fff; font-weight: 700; }

        .toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 6px 14px;
            background: transparent;
            border: 1px solid rgba(139,0,0,0.35);
            border-radius: 6px;
            color: var(--primary-red);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }
        .toggle-btn:active {
            background: rgba(204,0,0,0.1);
            border-color: rgba(204,0,0,0.6);
        }

        /* ── DOWNLOAD BOX - Desktop Style ─────────────── */
        .download-box {
            background: rgba(10,2,2,0.88);
            border: 1px solid rgba(139,0,0,0.3);
            border-radius: 14px;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }
        .download-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 18px;
            cursor: pointer;
            transition: background 0.25s;
        }
        .download-header:active { 
            background: rgba(204,0,0,0.06); 
        }
        .download-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
        }
        .download-header-left i { 
            color: var(--primary-red); 
            font-size: 15px;
        }
        .dl-chevron {
            color: var(--primary-red);
            font-size: 12px;
            transition: transform 0.3s;
        }
        .download-box.open .dl-chevron { transform: rotate(180deg); }
        .download-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .download-box.open .download-body { max-height: 200px; }
        .download-body-inner {
            padding: 0 18px 18px;
            border-top: 1px solid rgba(139,0,0,0.2);
        }
        .download-note {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 0 16px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .download-note i { 
            color: var(--primary-red); 
            font-size: 17px; 
            margin-top: 2px; 
            flex-shrink: 0; 
        }
        .contact-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg,rgba(204,0,0,0.2),rgba(139,0,0,0.15));
            border: 1px solid rgba(204,0,0,0.45);
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .contact-btn:active {
            background: var(--primary-red);
            border-color: var(--accent-red);
            transform: scale(0.98);
            box-shadow: 0 6px 18px rgba(204,0,0,0.4);
        }

        /* ── RELATED BOOKS - Desktop Style ────────────── */
        .related-section { margin-top: 32px; }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 14px;
        }
        .rel-card {
            display: block;
            text-decoration: none;
            background: rgba(16,3,3,0.95);
            border: 1px solid rgba(139,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }
        .rel-card:active {
            border-color: rgba(204,0,0,0.65);
            transform: scale(0.98);
            box-shadow: 0 8px 22px rgba(139,0,0,0.3);
        }
        .rel-cover {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(160deg, rgba(120,0,0,0.4), rgba(12,6,6,0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .rel-cover img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }
        .rel-cover i { 
            font-size: 32px; 
            color: rgba(204,0,0,0.25); 
        }
        .rel-info { padding: 9px 10px 10px; }
        .rel-title {
            font-size: 12px;
            font-weight: 700;
            color: rgba(255,255,255,0.85);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            margin-bottom: 4px;
        }
        .rel-author { 
            font-size: 11px; 
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── LOADING STATE ─────────────────────────────── */
        .loading-wrap {
            padding: 60px 20px;
            text-align: center;
        }
        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(204,0,0,0.15);
            border-top-color: #CC0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-wrap p { font-size: 13px; color: rgba(255,255,255,0.35); }

        /* ── BOTTOM NAV ────────────────────────────────── */
        .mobile-bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.96);
            border-top: 1px solid rgba(80,0,0,0.35);
            backdrop-filter: blur(12px);
            z-index: 500;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .mobile-nav-container {
            display: flex;
            align-items: stretch;
            height: 60px;
        }
        .mobile-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            text-decoration: none;
            color: rgba(255,255,255,0.38);
            font-size: 10px;
            font-weight: 600;
            transition: color 0.2s;
        }
        .mobile-nav-item i { font-size: 17px; }
        .mobile-nav-item.active { color: #CC0000; }
        .mobile-nav-item:active { color: rgba(204,0,0,0.7); }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="book-header">
        <span class="header-title" id="headerTitle">Loading…</span>
        <div class="header-spacer"></div>
    </header>

    <!-- PAGE CONTENT -->
    <main id="mainContent">
        <div class="loading-wrap">
            <div class="loading-spinner"></div>
            <p>Loading book…</p>
        </div>
    </main>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="mobile-bottom-nav" role="navigation" aria-label="Main navigation">
        <div class="mobile-nav-container">
            <a href="../../home/index.html" class="mobile-nav-item" aria-label="Home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="../../about/about.html" class="mobile-nav-item" aria-label="About">
                <i class="fas fa-user-circle"></i>
                <span>About</span>
            </a>
            <a href="../../projects/projects.html" class="mobile-nav-item" aria-label="Projects">
                <i class="fas fa-folder-open"></i>
                <span>Projects</span>
            </a>
            <a href="../hub.html" class="mobile-nav-item active" aria-label="Content Studio">
                <i class="fas fa-layer-group"></i>
                <span>Studio</span>
            </a>
            <a href="../../contact/contact.html" class="mobile-nav-item" aria-label="Contact">
                <i class="fas fa-envelope"></i>
                <span>Contact</span>
            </a>
            <a href="../../../Documentation/index.html" class="mobile-nav-item" aria-label="Website Guide">
                <i class="fas fa-book-open" aria-hidden="true"></i>
                <span class="mobile-nav-label">Guide</span>
            </a>
        </div>
    </nav>

    <!-- Mobile Navbar override -->
    <div id="mobileNavbar"></div>

    <script src="../../shared/mobile-navbar.js"></script>
    <script src="book-detail.js"></script>
    <script src="../../pwa-init.js"></script>
    <!-- Neural Grid Cursor Effect -->
    <script src="../../../Optimization/cursor-effects.js" defer></script>
</body>
</html>
