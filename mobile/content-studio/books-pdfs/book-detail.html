<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#CC0000">
    <meta name="description" content="Book Details - A3KM Studio">
    <title>Book Details - A3KM Studio</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="../../manifest.json">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../../shared/mobile-common.css">
    <link rel="stylesheet" href="../../shared/mobile-navbar.css">

    <style>
        body {
            padding-bottom: 80px;
            background: #0a0505;
        }

        /* ── STICKY HEADER ─────────────────────────────── */
        .book-header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(80, 0, 0, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .book-header::after {
            content: '';
            position: absolute;
            bottom: -3px; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255,255,255,0.4) 30%,
                rgba(255,255,255,0.6) 50%,
                rgba(255,255,255,0.4) 70%,
                transparent 100%
            );
            box-shadow: 0 2px 15px rgba(204,0,0,0.6);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: linear-gradient(135deg, rgba(139,0,0,0.25), rgba(0,0,0,0.5));
            border: 1px solid rgba(139,0,0,0.4);
            border-radius: 6px;
            color: #8B0000;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-btn:active {
            background: linear-gradient(135deg, rgba(204,0,0,0.25), rgba(0,0,0,0.4));
        }
        .header-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary, #fff);
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            text-align: center;
        }
        .header-spacer { width: 68px; }

        /* ── HERO COVER SECTION ────────────────────────── */
        .cover-hero {
            position: relative;
            width: 100%;
            background: #0e0505;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 28px 20px 0;
            min-height: 240px;
        }
        .cover-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(139,0,0,0.2) 0%, transparent 70%);
        }
        .cover-img-wrap {
            position: relative;
            width: 140px;
            min-width: 140px;
            height: 210px;
            border-radius: 6px 4px 4px 6px;
            overflow: hidden;
            box-shadow:
                6px 6px 20px rgba(0,0,0,0.9),
                -2px 0 0 rgba(255,255,255,0.04),
                inset -8px 0 20px rgba(0,0,0,0.35);
            z-index: 2;
            transform: perspective(600px) rotateY(-6deg);
        }
        .cover-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .cover-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, rgba(120,0,0,0.5), rgba(20,10,10,0.9));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cover-placeholder i {
            font-size: 56px;
            color: rgba(255,80,80,0.3);
        }
        /* Cover stats strip (right side) */
        .cover-stats {
            flex: 1;
            padding: 0 0 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2;
        }
        .stat-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
        }
        .stat-chip i {
            font-size: 12px;
            color: #CC0000;
            width: 14px;
            text-align: center;
        }
        .stat-chip-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.35); }
        .stat-value { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.85); }

        /* ── CONTENT BELOW ─────────────────────────────── */
        .content-body { padding: 20px 16px 0; }

        /* badges row */
        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .badge-cat {
            background: rgba(139,0,0,0.2);
            border: 1px solid rgba(139,0,0,0.45);
            color: #FF6666;
        }
        .badge-lang {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.55);
        }
        .badge-date {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.4);
        }

        /* Title + Author */
        .book-main-title {
            font-size: 20px;
            font-weight: 900;
            line-height: 1.25;
            color: #fff;
            margin-bottom: 8px;
        }
        .author-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }
        .author-row i { color: #CC0000; font-size: 11px; }

        /* Meta chips */
        .meta-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
        }
        .meta-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 8px;
            font-size: 11px;
            color: rgba(255,255,255,0.55);
        }
        .meta-chip i { font-size: 10px; color: rgba(204,0,0,0.8); }

        /* Section divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139,0,0,0.35), transparent);
            margin: 18px 0;
        }

        /* ── ACTION STRIP ──────────────────────────────── */
        .action-strip {
            display: flex;
            gap: 10px;
            margin-bottom: 4px;
        }
        .btn-read, .btn-3d {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-read {
            background: linear-gradient(135deg, #CC0000, #8B0000);
            color: #fff;
            box-shadow: 0 4px 18px rgba(204,0,0,0.4);
        }
        .btn-read:active { transform: scale(0.97); background: linear-gradient(135deg, #aa0000, #6B0000); }
        .btn-3d {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14) !important;
            color: rgba(255,255,255,0.8);
        }
        .btn-3d:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }

        /* ── SUMMARY ───────────────────────────────────── */
        .section-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #CC0000;
            margin-bottom: 10px;
        }
        .summary-inner {
            font-size: 13px;
            line-height: 1.7;
            color: rgba(255,255,255,0.6);
            max-height: 120px;
            overflow: hidden;
            position: relative;
            transition: max-height 0.4s ease;
        }
        .summary-inner.expanded { max-height: 2000px; }
        .summary-inner:not(.expanded)::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 50px;
            background: linear-gradient(transparent, #0a0505);
        }
        .summary-inner p { margin-bottom: 10px; }
        .toggle-btn {
            background: none;
            border: none;
            color: #CC0000;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ── DOWNLOAD BOX ──────────────────────────────── */
        .download-box {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: hidden;
        }
        .download-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            cursor: pointer;
        }
        .download-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
        }
        .download-header-left i { color: #CC0000; }
        .dl-chevron {
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            transition: transform 0.3s;
        }
        .download-box.open .dl-chevron { transform: rotate(180deg); }
        .download-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .download-box.open .download-body { max-height: 180px; }
        .download-body-inner {
            padding: 4px 16px 18px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .download-body-inner p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            line-height: 1.6;
            margin-bottom: 14px;
        }
        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, rgba(204,0,0,0.3), rgba(139,0,0,0.2));
            border: 1px solid rgba(204,0,0,0.5);
            border-radius: 10px;
            color: #FF6060;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
        }
        .contact-btn:active { background: rgba(204,0,0,0.4); transform: scale(0.98); }

        /* ── RELATED BOOKS ─────────────────────────────── */
        .related-section { margin-top: 28px; }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 12px;
        }
        .rel-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
        }
        .rel-card:active { transform: scale(0.97); background: rgba(255,255,255,0.06); }
        .rel-cover {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(160deg, rgba(100,0,0,0.3), rgba(10,5,5,0.8));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .rel-cover img { width: 100%; height: 100%; object-fit: cover; }
        .rel-cover i { font-size: 28px; color: rgba(204,0,0,0.3); }
        .rel-info { padding: 8px 10px; }
        .rel-title {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.35;
            margin-bottom: 3px;
        }
        .rel-author { font-size: 10px; color: rgba(255,255,255,0.35); }

        /* ── LOADING STATE ─────────────────────────────── */
        .loading-wrap {
            padding: 60px 20px;
            text-align: center;
        }
        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(204,0,0,0.15);
            border-top-color: #CC0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-wrap p { font-size: 13px; color: rgba(255,255,255,0.35); }

        /* ── BOTTOM NAV ────────────────────────────────── */
        .mobile-bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.96);
            border-top: 1px solid rgba(80,0,0,0.35);
            backdrop-filter: blur(12px);
            z-index: 500;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .mobile-nav-container {
            display: flex;
            align-items: stretch;
            height: 60px;
        }
        .mobile-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            text-decoration: none;
            color: rgba(255,255,255,0.38);
            font-size: 10px;
            font-weight: 600;
            transition: color 0.2s;
        }
        .mobile-nav-item i { font-size: 17px; }
        .mobile-nav-item.active { color: #CC0000; }
        .mobile-nav-item:active { color: rgba(204,0,0,0.7); }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="book-header">
        <a href="book-listing.html" class="back-btn" id="backBtn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <span class="header-title" id="headerTitle">Loading…</span>
        <div class="header-spacer"></div>
    </header>

    <!-- PAGE CONTENT -->
    <main id="mainContent">
        <div class="loading-wrap">
            <div class="loading-spinner"></div>
            <p>Loading book…</p>
        </div>
    </main>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="mobile-bottom-nav" role="navigation" aria-label="Main navigation">
        <div class="mobile-nav-container">
            <a href="../../home/index.html" class="mobile-nav-item" aria-label="Home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="../../about/about.html" class="mobile-nav-item" aria-label="About">
                <i class="fas fa-user-circle"></i>
                <span>About</span>
            </a>
            <a href="../../projects/projects.html" class="mobile-nav-item" aria-label="Projects">
                <i class="fas fa-folder-open"></i>
                <span>Projects</span>
            </a>
            <a href="../hub.html" class="mobile-nav-item active" aria-label="Content Studio">
                <i class="fas fa-layer-group"></i>
                <span>Studio</span>
            </a>
            <a href="../../contact/contact.html" class="mobile-nav-item" aria-label="Contact">
                <i class="fas fa-envelope"></i>
                <span>Contact</span>
            </a>
        </div>
    </nav>

    <!-- Mobile Navbar override -->
    <div id="mobileNavbar"></div>

    <script src="../../shared/mobile-navbar.js"></script>
    <script src="book-detail.js"></script>
    <script src="../../pwa-init.js"></script>
</body>
</html>
