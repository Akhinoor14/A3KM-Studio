    <style>
        /* ── Books specific styles ── */

        /* Override shared .content-thumbnail to portrait book size */
        .book-item .content-thumbnail {
            width: 86px;
            height: 118px;
            border-radius: 3px 7px 7px 3px;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Book cover – portrait with page-edge shadow */
        .book-thumbnail {
            position: relative;
            width: 86px;
            height: 118px;
            background: linear-gradient(155deg,
                rgba(45, 4, 4, 0.98),
                rgba(8, 0, 0, 1)
            );
            border-radius: 3px 7px 7px 3px;
            box-shadow:
                3px 0   0 0 rgba(255,255,255,0.05),
                5px 0   0 0 rgba(255,255,255,0.025),
                8px 4px 16px rgba(0,0,0,0.7);
        }

        /* Book spine shadow – left edge */
        .book-thumbnail::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 10px;
            background: linear-gradient(to right,
                rgba(0,0,0,0.8),
                rgba(60,0,0,0.4),
                transparent
            );
            border-radius: 3px 0 0 3px;
            z-index: 3;
            pointer-events: none;
        }

        /* Subtle gloss shine on cover */
        .book-thumbnail::after {
            content: '';
            position: absolute;
            top: 0; left: 10px; right: 0; bottom: 0;
            background: linear-gradient(135deg,
                rgba(255,255,255,0.07) 0%,
                transparent 40%,
                rgba(0,0,0,0.08) 100%
            );
            z-index: 2;
            pointer-events: none;
        }

        /* Cover image – absolute fill */
        .book-thumbnail img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 3px 7px 7px 3px;
            z-index: 1;
            display: block;
        }

        /* No-cover fallback: large initial letter */
        .book-initial {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            font-weight: 900;
            color: rgba(160, 0, 0, 0.38);
            font-family: 'Georgia', 'Times New Roman', serif;
            letter-spacing: -2px;
            z-index: 1;
            user-select: none;
            text-shadow: 0 3px 12px rgba(0,0,0,0.6);
        }

        /* Fallback icon (when no cover and no title) */
        .book-thumbnail > i {
            font-size: 28px;
            color: rgba(180, 0, 0, 0.35);
            position: relative;
            z-index: 1;
        }

        /* Align thumbnail to top so it doesn't stretch in tall cards */
        .book-item {
            align-items: flex-start;
        }

        /* Language badge overlay on thumbnail */
        .book-badge {
            position: absolute;
            bottom: 6px;
            left: 6px;
            padding: 2px 7px;
            background: rgba(0, 0, 0, 0.82);
            border: 1px solid rgba(204, 0, 0, 0.55);
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            z-index: 10;
            letter-spacing: 0.2px;
            backdrop-filter: blur(6px);
            line-height: 1.4;
        }
        
        .book-pages {
            background: linear-gradient(135deg, 
                rgba(204, 0, 0, 0.2), 
                rgba(0, 0, 0, 0.6)
            );
            border: 1px solid rgba(204, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            color: #CC0000;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .book-category {
            background: linear-gradient(135deg, 
                rgba(139, 0, 0, 0.15), 
                rgba(0, 0, 0, 0.5)
            );
            border: 1px solid rgba(139, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: #8B0000;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: inline-block;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .book-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 3px solid transparent;
            border-image: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.4) 30%, 
                rgba(255, 255, 255, 0.6) 50%, 
                rgba(255, 255, 255, 0.4) 70%, 
                transparent 100%
            ) 1;
            box-shadow: 0 -2px 15px rgba(204, 0, 0, 0.4);
        }

        /* Book Mode Icon - Always visible on mobile */
        .book-mode-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, rgba(204, 0, 0, 0.95), rgba(139, 0, 0, 0.9));
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s ease;
            box-shadow: 
                0 2px 8px rgba(204, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .book-mode-icon:active {
            background: linear-gradient(135deg, rgba(139, 0, 0, 1), rgba(80, 0, 0, 0.95));
            transform: scale(0.88);
        }

        .book-mode-icon i {
            color: #fff;
            font-size: 13px;
            filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.5));
        }
        
        .read-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            background: linear-gradient(135deg, 
                rgba(204, 0, 0, 0.25), 
                rgba(139, 0, 0, 0.15)
            );
            border: 1px solid rgba(204, 0, 0, 0.4);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #CC0000;
            text-decoration: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .read-btn:active {
            background: linear-gradient(135deg, 
                rgba(204, 0, 0, 0.35), 
                rgba(139, 0, 0, 0.25)
            );
            transform: scale(0.95);
        }
        
        .download-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            background: linear-gradient(135deg, 
                rgba(178, 34, 34, 0.2), 
                rgba(0, 0, 0, 0.6)
            );
            border: 1px solid rgba(178, 34, 34, 0.4);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #B22222;
            text-decoration: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .download-btn:active {
            background: linear-gradient(135deg, 
                rgba(178, 34, 34, 0.3), 
                rgba(0, 0, 0, 0.7)
            );
            transform: scale(0.95);
        }
        
        /* Book-specific active & cursor — scoped to .book-item only,
           does NOT override shared .content-item:active behaviour */
        .book-item {
            cursor: pointer;
        }

        .book-item:active {
            transform: scale(0.98);
        }
    </style>
