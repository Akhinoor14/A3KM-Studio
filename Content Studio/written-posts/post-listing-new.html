<head>

      const cached = sessionStorage.getItem(CACHE_KEY);
      if (performance.navigation.type === 2 || (cached && cached !== CURRENT_VERSION)) {
        sessionStorage.setItem(CACHE_KEY, CURRENT_VERSION);
        window.location.reload(true);
      } else {
        sessionStorage.setItem(CACHE_KEY, CURRENT_VERSION);
      }
    })();
  </script>

  <title>Blogs – A3KM Studio</title>
  <link rel="icon" href="../../images/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../../Optimization/styles.css" />
  <link rel="stylesheet" href="../../Optimization/navbar-autohide.css">
  <link rel="stylesheet" href="../../Optimization/navbar/desktop-navbar.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <meta name="description" content="Engineering insights, tutorials, and personal experiences by Md Akhinoor Islam" />
  <meta name="author" content="Md Akhinoor Islam" />

  <style>
    :root {
      --primary-red: #CC0000;
      --dark-red: #8B0000;
      --light-red: #FF1744;
      --accent-red: #FF0000;
      --bg-dark: #000000;
      --bg-card: rgba(15,15,15,0.95);
      --border-primary: rgba(139,0,0,0.4);
      --border-strong: rgba(204,0,0,0.8);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255,255,255,0.85);
      --text-dim: rgba(255,255,255,0.55);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: var(--text-primary);
      overflow-x: hidden;
      background: linear-gradient(180deg, #0a0000 0%, #030000 100%);
      padding-top: 85px;
      min-height: 100vh;
    }

    /* ── COMPACT HEADER STRIP ──────────────────────── */
    .lib-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding: 22px 30px;
      background: linear-gradient(160deg,
        rgba(80,0,0,0.35) 0%,
        rgba(40,0,0,0.25) 50%,
        rgba(15,2,2,0.85) 100%);
      border-top: 1px solid rgba(204,0,0,0.2);
      border-bottom: 2px solid rgba(204,0,0,0.45);
      position: sticky;
      top: 85px;
      overflow: hidden;
      z-index: 41;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .lib-header::before {
      content: '';
      position: absolute;
      top:0; left:-50%; width:200%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(204,0,0,0.07), transparent);
      pointer-events: none;
    }

    .lib-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 2;
    }

    .lib-header-left h1 {
      font-size: 1.45rem;
      font-weight: 900;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8), 0 0 20px rgba(204,0,0,0.3);
      margin: 0;
    }

    .lib-header-left h1 i {
      color: var(--primary-red);
      font-size: 1.4rem;
      filter: drop-shadow(0 0 12px rgba(204,0,0,0.6));
    }

    .lib-header-divider {
      width: 1px;
      height: 28px;
      background: rgba(204,0,0,0.4);
    }

    .lib-header-subtitle {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
    }

    .lib-header-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 2;
    }

    .lib-stat-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(204,0,0,0.3);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      white-space: nowrap;
      transition: all 0.3s;
    }

    .lib-stat-badge i { color: var(--primary-red); font-size: 0.7rem; }
    .lib-stat-badge strong { color: #fff; font-size: 0.9rem; }
    .lib-stat-badge:hover { border-color: rgba(204,0,0,0.6); background: rgba(204,0,0,0.1); }

    /* ── 2-COLUMN LAYOUT ───────────────────────────── */
    .main-content-wrapper {
      display: flex;
      min-height: calc(100vh - 85px - 62px);
      background: #020000;
      position: relative;
    }

    /* ── LEFT FILTER SIDEBAR ───────────────────────── */
    .filter-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #050000;
      border-right: 2px solid rgba(204,0,0,0.22);
      position: sticky;
      top: 153px;
      height: calc(100vh - 153px);
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 50;
      box-shadow: 4px 0 20px rgba(0,0,0,0.8);
    }

    .filter-sidebar::-webkit-scrollbar { width: 5px; }
    .filter-sidebar::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    .filter-sidebar::-webkit-scrollbar-thumb { background: rgba(204,0,0,0.4); border-radius: 3px; }
    .filter-sidebar::-webkit-scrollbar-thumb:hover { background: rgba(204,0,0,0.6); }

    .filter-header {
      padding: 18px 16px 14px;
      border-bottom: 2px solid rgba(204,0,0,0.18);
      background: rgba(15,0,0,0.55);
    }

    .filter-header h3 {
      font-size: 0.88rem;
      font-weight: 800;
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
    }

    .filter-header h3 i { color: var(--primary-red); font-size: 0.82rem; }

    .filter-section {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(204,0,0,0.1);
    }

    .filter-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-section-title i { color: var(--primary-red); font-size: 0.68rem; }

    /* Search */
    .search-box { position: relative; }

    .search-input {
      width: 100%;
      padding: 11px 16px 11px 40px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(204,0,0,0.32);
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s;
      font-family: inherit;
    }

    .search-input::placeholder { color: rgba(255,255,255,0.38); }
    .search-input:focus { outline: none; border-color: var(--primary-red); background: rgba(255,255,255,0.08); box-shadow: 0 0 18px rgba(204,0,0,0.25); }

    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--primary-red); font-size: 13px; pointer-events: none; }

    .clear-search {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255,255,255,0.45); cursor: pointer; font-size: 16px; padding: 4px; display: none; transition: all 0.2s;
    }
    .clear-search.active { display: block; }
    .clear-search:hover { color: var(--primary-red); }

    /* Dropdown */
    .filter-dropdown {
      width: 100%;
      padding: 10px 13px;
      background: rgba(15,0,0,0.9);
      border: 1.5px solid rgba(204,0,0,0.28);
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      -webkit-appearance: none;
      appearance: none;
      color-scheme: dark;
      font-family: inherit;
    }

    .filter-dropdown option { background: #1a0000; color: #fff; font-weight: 600; }
    .filter-dropdown:hover { border-color: var(--primary-red); background: rgba(204,0,0,0.08); }
    .filter-dropdown:focus { outline: none; border-color: var(--primary-red); box-shadow: 0 0 14px rgba(204,0,0,0.26); }

    /* Language toggle */
    .lang-toggle { display: flex; gap: 5px; }
    .lang-btn {
      flex: 1; padding: 9px 6px; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(204,0,0,0.22);
      border-radius: 9px; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.2s;
      font-size: 11.5px; font-weight: 700; font-family: inherit; text-align: center;
    }
    .lang-btn.active { background: linear-gradient(135deg, var(--primary-red), var(--dark-red)); border-color: var(--primary-red); color: #fff; }
    .lang-btn:hover:not(.active) { border-color: var(--primary-red); color: #fff; }

    /* View toggle */
    .view-toggle { display: flex; gap: 6px; }
    .view-btn {
      flex: 1; padding: 9px; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(204,0,0,0.26);
      border-radius: 9px; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.2s; font-size: 13px;
    }
    .view-btn.active { background: linear-gradient(135deg, var(--primary-red), var(--dark-red)); border-color: var(--primary-red); color: #fff; }
    .view-btn:hover:not(.active) { border-color: var(--primary-red); color: #fff; }

    /* Category buttons */
    .cat-list { display: flex; flex-direction: column; gap: 5px; }

    .cat-btn {
      width: 100%;
      padding: 9px 12px;
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(204,0,0,0.18);
      border-radius: 9px;
      color: rgba(255,255,255,0.65);
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: all 0.22s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
      word-break: break-word;
    }

    .cat-btn:hover { background: rgba(204,0,0,0.1); border-color: rgba(204,0,0,0.45); color: #fff; }
    .cat-btn.active { background: linear-gradient(135deg, rgba(204,0,0,0.28), rgba(139,0,0,0.22)); border-color: rgba(204,0,0,0.65); color: #fff; }

    .cat-btn .cat-icon { font-size: 1rem; flex-shrink: 0; }

    .cat-btn .cat-count {
      margin-left: auto;
      padding: 1px 7px;
      background: rgba(204,0,0,0.22);
      border: 1px solid rgba(204,0,0,0.35);
      border-radius: 12px;
      font-size: 10.5px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Results info */
    .results-info {
      padding: 10px 14px;
      background: rgba(0,0,0,0.38);
      border-radius: 8px;
      text-align: center;
    }

    .results-count { color: rgba(255,255,255,0.5); font-weight: 700; font-size: 0.78rem; }
    .results-count span { color: var(--primary-red); font-weight: 800; font-size: 1rem; }

    /* ── POSTS ZONE ──────────────────────────────────── */
    .posts-zone {
      flex: 1;
      background: linear-gradient(180deg, #0f0000 0%, #080000 100%);
      border-left: 2px solid rgba(204,0,0,0.12);
      box-shadow: inset 0 16px 50px rgba(0,0,0,0.9), inset 2px 0 20px rgba(0,0,0,0.8);
      overflow-x: hidden;
    }

    .posts-container {
      padding: 30px 30px 60px;
      position: relative;
      z-index: 1;
      min-height: 100%;
    }

    /* ── POST GRID ──────────────────────────────────── */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(240px, 22vw, 320px), 1fr));
      gap: 22px 18px;
      padding: 8px 0 20px;
    }

    /* ── POST CARD ──────────────────────────────────── */
    .post-card {
      background: linear-gradient(160deg,
        rgba(22,4,4,0.98) 0%,
        rgba(14,6,6,0.98) 60%,
        rgba(8,2,2,0.98) 100%);
      border: 1px solid rgba(139,0,0,0.32);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 18px rgba(0,0,0,0.7);
      text-decoration: none;
      color: inherit;
      height: 100%;
    }

    .post-card::before {
      content: '';
      position: absolute; top:8px; left:8px;
      width:18px; height:18px;
      border-top: 2px solid var(--primary-red);
      border-left: 2px solid var(--primary-red);
      opacity: 0.2; transition: all 0.3s; pointer-events:none; z-index:30;
    }

    .post-card:hover {
      border-color: rgba(204,0,0,0.68);
      box-shadow: 0 16px 40px rgba(139,0,0,0.4), 0 0 55px rgba(204,0,0,0.22);
      transform: translateY(-4px) scale(1.01);
    }

    .post-card:hover::before { width:24px; height:24px; opacity:1; border-color: var(--accent-red); top:5px; left:5px; }

    /* Cover – 16:9 */
    .post-cover-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      position: relative;
      background: #0d0000;
      flex-shrink: 0;
    }

    .post-cover-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }

    .post-card:hover .post-cover-wrap img { transform: scale(1.07); }

    .post-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 35%, rgba(0,0,0,0.72) 100%);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.25s ease;
    }

    .post-card:hover .post-overlay { opacity: 1; }

    .read-overlay-btn {
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
      border-radius: 22px;
      color: #fff; font-size: 13px; font-weight: 700;
      box-shadow: 0 4px 16px rgba(204,0,0,0.5);
      display: flex; align-items: center; gap: 7px;
      transition: transform 0.2s;
    }

    .post-card:hover .read-overlay-btn { transform: scale(1.08); }

    /* Language badge */
    .lang-badge {
      position: absolute; top: 8px; right: 8px;
      padding: 3px 9px;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(204,0,0,0.45);
      border-radius: 6px;
      font-size: 0.62rem; font-weight: 800;
      color: #fff; z-index: 10;
      backdrop-filter: blur(8px);
      letter-spacing: 0.2px;
    }

    /* Category badge */
    .cat-badge {
      position: absolute; top: 8px; left: 8px;
      padding: 2px 8px;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(139,0,0,0.55);
      border-radius: 5px;
      font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.3px; color: var(--accent-red); z-index: 10;
      backdrop-filter: blur(8px);
      max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Info strip */
    .post-info {
      padding: 11px 12px 13px;
      display: flex; flex-direction: column; gap: 7px;
      flex: 1;
    }

    .post-title {
      font-size: 0.9rem; font-weight: 800; color: var(--text-primary);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2; line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      letter-spacing: 0.05px; transition: color 0.25s;
      min-height: 2.4em;
    }

    .post-card:hover .post-title { color: var(--accent-red); }

    .post-summary {
      font-size: 0.72rem; color: rgba(255,255,255,0.45); line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2; line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-meta-row {
      display: flex; align-items: center; justify-content: space-between; gap: 5px;
      padding-top: 6px;
      border-top: 1px solid rgba(139,0,0,0.16); transition: border-color 0.25s;
      margin-top: auto;
    }

    .post-card:hover .post-meta-row { border-color: rgba(204,0,0,0.35); }

    .meta-date, .meta-read {
      font-size: 0.64rem; color: rgba(255,255,255,0.42); font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }

    .meta-date i, .meta-read i { color: var(--primary-red); font-size: 0.56rem; }

    /* ── LIST MODE ──────────────────────────────────── */
    .posts-grid.list-mode {
      grid-template-columns: 1fr !important;
      gap: 10px;
    }

    .posts-grid.list-mode .post-card {
      flex-direction: row !important;
      height: 108px;
      align-items: stretch;
    }

    .posts-grid.list-mode .post-cover-wrap {
      width: 192px !important; min-width: 192px;
      flex-shrink: 0; height: 100%; aspect-ratio: unset !important;
      border-right: 1px solid rgba(139,0,0,0.28);
    }

    .posts-grid.list-mode .post-cover-wrap img { height: 100%; object-fit: cover; }
    .posts-grid.list-mode .post-info { flex:1; padding: 10px 14px; justify-content:space-between; }
    .posts-grid.list-mode .post-title { -webkit-line-clamp:1; line-clamp:1; min-height: unset; }
    .posts-grid.list-mode .post-summary { display: none; }
    .posts-grid.list-mode .post-overlay { display: none; }

    /* ── LOADING / EMPTY ────────────────────────────── */
    .loading-state, .no-posts {
      text-align: center; padding: 60px 20px; color: var(--text-dim);
    }

    .loading-state i, .no-posts i { font-size: 48px; color: var(--primary-red); margin-bottom: 16px; display: block; }
    .loading-state p, .no-posts p { font-size: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }

    /* ── LOAD MORE ──────────────────────────────────── */
    .load-more-wrap { text-align: center; margin: 36px 0 10px; }

    .load-more-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 36px;
      background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
      border: none; border-radius: 12px; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all 0.28s; box-shadow: 0 4px 16px rgba(204,0,0,0.35);
    }

    .load-more-btn:hover { background: linear-gradient(135deg, #e60000, #6b0000); transform:translateY(-2px); box-shadow: 0 8px 24px rgba(204,0,0,0.55); }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width:1024px) {
      .main-content-wrapper { flex-direction: column; }
      .filter-sidebar { width:100%; height:auto; position:relative; top:0; border-right:none; border-bottom:2px solid rgba(204,0,0,0.22); max-height:380px; overflow-y:auto; }
      .posts-zone { border-left:none; }
      .posts-grid { grid-template-columns: repeat(auto-fill, minmax(clamp(200px, 28vw, 300px),1fr)); }
    }

    @media (max-width:768px) {
      .lib-header-left h1 { font-size:1.15rem; }
      .lib-header-subtitle { display:none; }
      .lib-stat-badge { font-size:0.68rem; padding:4px 9px; }
      .posts-container { padding:18px 14px 40px; }
      .posts-grid { grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap:14px 10px; }
      .post-title { font-size:0.8rem; }
    }
  </style>
</head>

          <a href="../../About me/CV/Md Akhinnor Islam's CV @2026.pdf" class="desktop-nav-link desktop-nav-cv-btn" download="Md_Akhinoor_Islam_CV_2026.pdf" title="Download CV">
            <i class="fas fa-download"></i><span>CV</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Compact Header Strip -->
  <div class="lib-header">
    <div class="lib-header-left">
      <h1><i class="fas fa-pen-nib"></i> Written Posts</h1>
      <div class="lib-header-divider"></div>
      <span class="lib-header-subtitle">Engineering Blog Archive</span>
    </div>
    <div class="lib-header-stats">
      <div class="lib-stat-badge">
        <i class="fas fa-file-alt"></i>
        <strong id="headerTotalPosts">—</strong>
        <span>Posts</span>
      </div>
      <div class="lib-stat-badge">
        <i class="fas fa-layer-group"></i>
        <strong id="headerTotalDomains">—</strong>
        <span>Domains</span>
      </div>
      <div class="lib-stat-badge">
        <i class="fas fa-language"></i>
        <strong>BN</strong>
        <span>&amp; EN</span>
      </div>
    </div>
  </div>

  <!-- Main 2-Column Layout -->
  <div class="main-content-wrapper">

    <!-- LEFT SIDEBAR -->
    <aside class="filter-sidebar">

      <div class="filter-header">
        <h3><i class="fas fa-sliders-h"></i> Filters</h3>
      </div>

      <!-- Search -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-search"></i> Search</div>
        <div class="search-box">
          <i class="fas fa-search search-icon"></i>
          <input type="text" class="search-input" id="searchInput" placeholder="Search posts…">
          <button class="clear-search" id="clearSearch" onclick="clearSearch()">×</button>
        </div>
      </div>

      <!-- Sort -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-sort"></i> Sort By</div>
        <select class="filter-dropdown" id="sortFilter">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="title-asc">Title (A → Z)</option>
          <option value="title-desc">Title (Z → A)</option>
          <option value="read-asc">Read Time (Short → Long)</option>
        </select>
      </div>

      <!-- Language -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-language"></i> Language</div>
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="all" onclick="setLang('all', this)">All</button>
          <button class="lang-btn" data-lang="en" onclick="setLang('en', this)">🇬🇧 EN</button>
          <button class="lang-btn" data-lang="bn" onclick="setLang('bn', this)">🇧🇩 BN</button>
        </div>
      </div>

      <!-- View Mode -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-th"></i> View</div>
        <div class="view-toggle">
          <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="Grid view"><i class="fas fa-th-large"></i></button>
          <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="List view"><i class="fas fa-list"></i></button>
        </div>
      </div>

      <!-- Results count -->
      <div class="filter-section">
        <div class="results-info">
          <div class="results-count">Showing <span id="resultsCount">0</span> posts</div>
        </div>
      </div>

      <!-- Domains / Categories -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-layer-group"></i> Domains</div>
        <div class="cat-list" id="catList">
          <button class="cat-btn active" data-domain="all" onclick="filterBy('all', this)">
            <i class="fas fa-pen-nib cat-icon"></i> All Posts
            <span class="cat-count" id="countAll">0</span>
          </button>
        </div>
      </div>

    </aside>

    <!-- POSTS ZONE -->
    <main class="posts-zone">
      <div class="posts-container">
        <div class="loading-state" id="loadingState">
          <i class="fas fa-spinner spin"></i>
          <p>Loading posts…</p>
        </div>
        <div id="postsGrid" style="display:none;"></div>
      </div>
    </main>

  </div>

  <script>
    // ── State ───────────────────────────────────────────
    let allPosts      = [];
    let domainMap     = {};   // slug → { name, icon, count }
    let currentDomain = 'all';
    let currentLang   = 'all';
    let currentSort   = 'newest';
    let currentView   = 'grid';
    let batchSize     = 16;
    let currentBatch  = 1;

    // ── ICON MAP (preserved from original) ──────────────
    const ICON_MAP = {
      'Embedded Systems & Arduino': 'fa-microchip',
      'SolidWorks & CAD': 'fa-cube',
      '3D Modeling & Animation': 'fa-shapes',
      'Circuit Design & Analysis': 'fa-bolt',
      'PCB Design & Fabrication': 'fa-microchip',
      'Robotics & Automation': 'fa-robot',
      'Internet of Things (IoT)': 'fa-network-wired',
      'Electrical Engineering': 'fa-plug',
      'Mechanical Engineering': 'fa-cog',
      'Career Advice & Professional Growth': 'fa-user-tie',
      'Interview Preparation': 'fa-clipboard-check',
      'Freelancing & Remote Work': 'fa-laptop-house',
      'Resume & Portfolio Building': 'fa-id-card',
      'Networking & LinkedIn': 'fa-handshake',
      'Arduino Projects': 'fa-microchip',
      'Web Development': 'fa-laptop-code',
      'Python Programming': 'fab fa-python',
      'Robotics': 'fa-robot',
      'Study Tips': 'fa-graduation-cap',
      'Personal Growth': 'fa-seedling',
      'Tutorial': 'fa-book-open',
      'Project Showcase': 'fa-trophy',
      'Campus Life': 'fa-university',
      'Travel & Tours': 'fa-plane'
    };

    function catIcon(catName) {
      return ICON_MAP[catName] || 'fa-tag';
    }

    // ── Utilities ───────────────────────────────────────
    function slugify(str) {
      return (str||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    function escHtml(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    }

    // ── GitHub sync (preserved exactly) ─────────────────
    async function syncFromGitHub() {
      try {
        const token = localStorage.getItem('github_api_token');
        if (!token) { console.log('⚠️ No GitHub token - skipping cloud sync'); return; }
        console.log('⬇️  Syncing posts from cloud...');
        const owner = 'Akhinoor14', repo = 'A3KM-Studio';
        const path  = 'Content Studio/written-posts/posts.json';
        const url   = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`;
        const res   = await fetch(url, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
        if (res.ok) {
          const data        = await res.json();
          const githubPosts = JSON.parse(atob(data.content));
          const local       = JSON.parse(localStorage.getItem('a3km_posts') || '[]');
          const localIds    = new Set(local.map(p => p.id));
          let newCount = 0;
          if (githubPosts.posts && Array.isArray(githubPosts.posts)) {
            githubPosts.posts.forEach(p => { if (!localIds.has(p.id)) { local.push(p); newCount++; } });
          }
          if (newCount > 0) {
            localStorage.setItem('a3km_posts', JSON.stringify(local));
            console.log(`✅ Synced ${newCount} new posts from cloud!`);
          } else { console.log('✅ Already up to date with cloud'); }
        }
      } catch (e) { console.warn('⚠️ Cloud sync failed:', e); }
    }

    // ── Load Data ───────────────────────────────────────
    async function loadPosts() {
      try {
        await syncFromGitHub();
        const res  = await fetch('posts.json');
        const data = await res.json();

        allPosts = data.posts || [];

        // Merge localStorage posts
        const local = JSON.parse(localStorage.getItem('a3km_posts') || '[]');
        if (local.length > 0) {
          local.forEach(p => { if (!allPosts.find(x => x.id === p.id)) allPosts.push(p); });
        }

        // Build domain map from categoryGroups
        domainMap = {};
        if (data.categoryGroups && Array.isArray(data.categoryGroups)) {
          data.categoryGroups.forEach(group => {
            const slug = slugify(group.name);
            const count = allPosts.filter(p => group.categories.includes(p.category)).length;
            if (count > 0) {
              domainMap[slug] = { name: group.name, icon: group.icon, count, categories: group.categories };
            }
          });
          // Attach domain slug to each post
          allPosts.forEach(p => {
            for (const [slug, d] of Object.entries(domainMap)) {
              if (d.categories.includes(p.category)) { p._domainSlug = slug; break; }
            }
            if (!p._domainSlug) p._domainSlug = 'other';
          });
        }

        // Header stats
        const activeDomains = Object.keys(domainMap).length;
        document.getElementById('headerTotalPosts').textContent   = allPosts.length;
        document.getElementById('headerTotalDomains').textContent = activeDomains;
        document.getElementById('countAll').textContent           = allPosts.length;

        buildDomainButtons();
        renderPosts();

      } catch (err) {
        console.error('Error loading posts:', err);
        document.getElementById('loadingState').innerHTML =
          '<i class="fas fa-exclamation-triangle"></i><p>Failed to load posts. Please refresh.</p>';
      }
    }

    // ── Build Domain Buttons ──────────────────────────
    function buildDomainButtons() {
      const list = document.getElementById('catList');
      Array.from(list.children).forEach(el => { if (el.dataset.domain !== 'all') el.remove(); });

      const sorted = Object.entries(domainMap).sort((a,b) => b[1].count - a[1].count);
      sorted.forEach(([slug, info]) => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.dataset.domain = slug;
        btn.innerHTML = `<span class="cat-icon">${info.icon}</span>${escHtml(info.name)}<span class="cat-count">${info.count}</span>`;
        btn.onclick = () => filterBy(slug, btn);
        list.appendChild(btn);
      });
    }

    // ── Filters ──────────────────────────────────────
    function filterBy(domain, el) {
      currentDomain = domain;
      currentBatch  = 1;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderPosts();
    }

    function setLang(lang, el) {
      currentLang  = lang;
      currentBatch = 1;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderPosts();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearSearch').classList.remove('active');
      renderPosts();
    }

    function setView(mode) {
      currentView = mode;
      document.getElementById('gridViewBtn').classList.toggle('active', mode === 'grid');
      document.getElementById('listViewBtn').classList.toggle('active', mode === 'list');
      const grid = document.getElementById('postsGrid').querySelector('.posts-grid');
      if (grid) grid.classList.toggle('list-mode', mode === 'list');
    }

    // ── Render ────────────────────────────────────────
    function renderPosts() {
      const container = document.getElementById('postsGrid');
      document.getElementById('loadingState').style.display = 'none';
      container.style.display = 'block';

      const q = document.getElementById('searchInput').value.toLowerCase().trim();

      let filtered = allPosts.filter(p => {
        const domainOk = currentDomain === 'all' || p._domainSlug === currentDomain;
        const langOk   = currentLang === 'all' || (p.language || 'en') === currentLang;
        const qOk      = !q
          || (p.title||'').toLowerCase().includes(q)
          || (p.summary||'').toLowerCase().includes(q)
          || (p.category||'').toLowerCase().includes(q);
        return domainOk && langOk && qOk;
      });

      // Sort
      switch (currentSort) {
        case 'oldest':   filtered.sort((a,b) => new Date(a.date) - new Date(b.date)); break;
        case 'title-asc':filtered.sort((a,b) => (a.title||'').localeCompare(b.title||'')); break;
        case 'title-desc':filtered.sort((a,b) => (b.title||'').localeCompare(a.title||'')); break;
        case 'read-asc': filtered.sort((a,b) => (a.readTime||0) - (b.readTime||0)); break;
        default:         filtered.sort((a,b) => new Date(b.date) - new Date(a.date)); break;
      }

      document.getElementById('resultsCount').textContent = filtered.length;

      if (filtered.length === 0) {
        container.innerHTML = `<div class="no-posts"><i class="fas fa-file-alt"></i><p>No posts found</p></div>`;
        return;
      }

      const total   = batchSize * currentBatch;
      const slice   = filtered.slice(0, total);
      const hasMore = filtered.length > total;
      const listCls = currentView === 'list' ? ' list-mode' : '';
      const cards   = slice.map(p => createPostCard(p)).join('');

      container.innerHTML = `
        <div class="posts-grid${listCls}">${cards}</div>
        ${hasMore ? `
        <div class="load-more-wrap">
          <button class="load-more-btn" id="loadMoreBtn">
            <i class="fas fa-arrow-down"></i>
            Load More (${filtered.length - total} remaining)
          </button>
        </div>` : ''}`;

      document.getElementById('loadMoreBtn')?.addEventListener('click', () => {
        currentBatch++;
        renderPosts();
      });
    }

    // ── Post Card HTML ────────────────────────────────
    function createPostCard(p) {
      const langLabel = (p.language === 'bn') ? '🇧🇩 বাংলা' : '🇬🇧 English';
      const catName   = p.category || '';
      const dateStr   = p.date ? formatDate(p.date) : '';
      const readTime  = p.readTime ? `${p.readTime} min` : '';
      const cover     = p.coverImage || '../../images/blog-cover-default.svg';

      return `
        <a class="post-card" href="post-reader.html?id=${escHtml(p.id)}">
          <div class="post-cover-wrap">
            <img src="${escHtml(cover)}" alt="${escHtml(p.title)}" loading="lazy"
                 onerror="this.src='../../images/blog-cover-default.svg'">
            <div class="post-overlay">
              <div class="read-overlay-btn"><i class="fas fa-book-open"></i> Read Post</div>
            </div>
            ${langLabel ? `<div class="lang-badge">${langLabel}</div>` : ''}
            ${catName   ? `<div class="cat-badge">${escHtml(catName)}</div>`   : ''}
          </div>
          <div class="post-info">
            <h3 class="post-title">${escHtml(p.title)}</h3>
            ${p.summary ? `<p class="post-summary">${escHtml(p.summary)}</p>` : ''}
            <div class="post-meta-row">
              ${dateStr  ? `<span class="meta-date"><i class="far fa-calendar-alt"></i>${dateStr}</span>` : '<span></span>'}
              ${readTime ? `<span class="meta-read"><i class="far fa-clock"></i>${readTime}</span>`       : '<span></span>'}
            </div>
          </div>
        </a>`;
    }

    // ── Event Listeners ──────────────────────────────
    document.getElementById('searchInput').addEventListener('input', e => {
      document.getElementById('clearSearch').classList.toggle('active', e.target.value.length > 0);
      currentBatch = 1;
      renderPosts();
    });

    document.getElementById('sortFilter').addEventListener('change', e => {
      currentSort  = e.target.value;
      currentBatch = 1;
      renderPosts();
    });

    // ── Navbar scroll ─────────────────────────────────
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('desktopNavbar');
      if (nav) nav.classList.toggle('scrolled', window.scrollY > 50);
    });

    // ── Init ──────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', loadPosts);
  </script>

  <script src="../../Optimization/navbar-autohide.js"></script>
  <script src="../../Optimization/fullscreen-init.js"></script>
    <!-- Neural Grid Cursor Effect -->
    <script src="../../Optimization/cursor-effects.js" defer></script>
</body>
