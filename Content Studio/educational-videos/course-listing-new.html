<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#0a0000">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Immediate Mobile Detection -->
  <script>
    (function() {
      const ua = navigator.userAgent || '';
      if (/android|iphone|ipad|ipod|iemobile|mobile/i.test(ua) ||
          (navigator.userAgentData && navigator.userAgentData.mobile)) {
        window.location.replace('../../mobile/content-studio/educational-courses/course-listing.html');
      }
    })();
  </script>

  <title>Educational Courses – A3KM Studio</title>
  <link rel="icon" href="../../images/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../../Optimization/styles.css" />
  <link rel="stylesheet" href="../../Optimization/navbar-autohide.css">
  <link rel="stylesheet" href="../../Optimization/navbar/desktop-navbar.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <meta name="description" content="Browse engineering video courses, tutorials and educational content – A3KM Studio" />
  <meta name="author" content="Md Akhinoor Islam" />

  <style>
    :root {
      --primary-red: #CC0000;
      --dark-red: #8B0000;
      --light-red: #FF1744;
      --accent-red: #FF0000;
      --beginner: #4CAF50;
      --intermediate: #FF9800;
      --advanced: #F44336;
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255,255,255,0.85);
      --text-dim: rgba(255,255,255,0.55);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: var(--text-primary);
      overflow-x: hidden;
      background: linear-gradient(180deg, #0a0000 0%, #030000 100%);
      padding-top: 85px;
      min-height: 100vh;
    }

    /* ── COMPACT HEADER STRIP ──────────────────────── */
    .lib-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding: 22px 30px;
      background: linear-gradient(160deg,
        rgba(80,0,0,0.35) 0%,
        rgba(40,0,0,0.25) 50%,
        rgba(15,2,2,0.85) 100%);
      border-top: 1px solid rgba(204,0,0,0.2);
      border-bottom: 2px solid rgba(204,0,0,0.45);
      position: relative;
      overflow: hidden;
      z-index: 1;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .lib-header::before {
      content: '';
      position: absolute;
      top:0; left:-50%; width:200%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(204,0,0,0.07), transparent);
      pointer-events: none;
    }

    .lib-header-left {
      display: flex; align-items: center; gap: 12px; z-index: 2;
    }

    .lib-header-left h1 {
      font-size: 1.45rem; font-weight: 900; color: #fff;
      display: flex; align-items: center; gap: 10px;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8), 0 0 20px rgba(204,0,0,0.3);
      margin: 0;
    }

    .lib-header-left h1 i {
      color: var(--primary-red); font-size: 1.4rem;
      filter: drop-shadow(0 0 12px rgba(204,0,0,0.6));
    }

    .lib-header-divider { width:1px; height:28px; background:rgba(204,0,0,0.4); }

    .lib-header-subtitle { font-size:0.82rem; color:rgba(255,255,255,0.45); font-weight:500; }

    .lib-header-stats { display:flex; align-items:center; gap:8px; z-index:2; }

    .lib-stat-badge {
      display:flex; align-items:center; gap:5px;
      padding:5px 12px;
      background:rgba(0,0,0,0.45);
      border:1px solid rgba(204,0,0,0.3);
      border-radius:20px;
      font-size:0.8rem; font-weight:700;
      color:rgba(255,255,255,0.85);
      backdrop-filter:blur(8px);
      white-space:nowrap; transition:all 0.3s;
    }

    .lib-stat-badge i { color:var(--primary-red); font-size:0.7rem; }
    .lib-stat-badge strong { color:#fff; font-size:0.9rem; }
    .lib-stat-badge:hover { border-color:rgba(204,0,0,0.6); background:rgba(204,0,0,0.1); }

    /* ── 2-COLUMN LAYOUT ───────────────────────────── */
    .main-content-wrapper {
      display:flex;
      min-height: calc(100vh - 85px - 62px);
      background:#020000;
      position:relative;
    }

    /* ── SIDEBAR ───────────────────────────────────── */
    .filter-sidebar {
      width:260px; flex-shrink:0;
      background:#050000;
      border-right:2px solid rgba(204,0,0,0.22);
      position:sticky; top:85px;
      height:calc(100vh - 85px);
      overflow-y:auto; overflow-x:hidden;
      z-index:50;
      box-shadow:4px 0 20px rgba(0,0,0,0.8);
    }

    .filter-sidebar::-webkit-scrollbar { width:5px; }
    .filter-sidebar::-webkit-scrollbar-track { background:rgba(0,0,0,0.3); }
    .filter-sidebar::-webkit-scrollbar-thumb { background:rgba(204,0,0,0.4); border-radius:3px; }
    .filter-sidebar::-webkit-scrollbar-thumb:hover { background:rgba(204,0,0,0.6); }

    .filter-header {
      padding:18px 16px 14px;
      border-bottom:2px solid rgba(204,0,0,0.18);
      background:rgba(15,0,0,0.55);
    }

    .filter-header h3 {
      font-size:0.88rem; font-weight:800; color:rgba(255,255,255,0.9);
      display:flex; align-items:center; gap:8px; margin:0;
    }

    .filter-header h3 i { color:var(--primary-red); font-size:0.82rem; }

    .filter-section { padding:14px 16px; border-bottom:1px solid rgba(204,0,0,0.1); }

    .filter-section-title {
      font-size:0.72rem; font-weight:700; color:rgba(255,255,255,0.45);
      text-transform:uppercase; letter-spacing:0.5px;
      margin-bottom:10px;
      display:flex; align-items:center; gap:6px;
    }

    .filter-section-title i { color:var(--primary-red); font-size:0.68rem; }

    /* Search */
    .search-box { position:relative; }

    .search-input {
      width:100%; padding:11px 16px 11px 40px;
      background:rgba(255,255,255,0.05);
      border:1.5px solid rgba(204,0,0,0.32);
      border-radius:10px; color:#fff;
      font-size:13px; font-weight:500;
      transition:all 0.3s; font-family:inherit;
    }

    .search-input::placeholder { color:rgba(255,255,255,0.38); }
    .search-input:focus { outline:none; border-color:var(--primary-red); background:rgba(255,255,255,0.08); box-shadow:0 0 18px rgba(204,0,0,0.25); }

    .search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--primary-red); font-size:13px; pointer-events:none; }

    .clear-search {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:rgba(255,255,255,0.45); cursor:pointer; font-size:16px; padding:4px; display:none; transition:all 0.2s;
    }
    .clear-search.active { display:block; }
    .clear-search:hover { color:var(--primary-red); }

    /* Dropdown */
    .filter-dropdown {
      width:100%; padding:10px 13px;
      background:rgba(15,0,0,0.9);
      border:1.5px solid rgba(204,0,0,0.28);
      border-radius:10px; color:#fff;
      font-size:13px; font-weight:600; cursor:pointer;
      transition:all 0.3s; -webkit-appearance:none; appearance:none;
      color-scheme:dark; font-family:inherit;
    }

    .filter-dropdown option { background:#1a0000; color:#fff; font-weight:600; }
    .filter-dropdown:hover { border-color:var(--primary-red); background:rgba(204,0,0,0.08); }
    .filter-dropdown:focus { outline:none; border-color:var(--primary-red); box-shadow:0 0 14px rgba(204,0,0,0.26); }

    /* Language toggle */
    .lang-toggle { display:flex; gap:5px; }
    .lang-btn {
      flex:1; padding:9px 6px;
      background:rgba(255,255,255,0.04);
      border:1.5px solid rgba(204,0,0,0.22);
      border-radius:9px; color:rgba(255,255,255,0.55);
      cursor:pointer; transition:all 0.2s;
      font-size:11.5px; font-weight:700; font-family:inherit; text-align:center;
    }
    .lang-btn.active { background:linear-gradient(135deg, var(--primary-red), var(--dark-red)); border-color:var(--primary-red); color:#fff; }
    .lang-btn:hover:not(.active) { border-color:var(--primary-red); color:#fff; }

    /* Difficulty buttons */
    .diff-toggle { display:flex; flex-direction:column; gap:5px; }
    .diff-btn {
      width:100%; padding:9px 12px;
      background:rgba(255,255,255,0.03);
      border:1.5px solid rgba(204,0,0,0.18);
      border-radius:9px; color:rgba(255,255,255,0.65);
      font-size:12.5px; font-weight:600; cursor:pointer;
      text-align:left; transition:all 0.22s;
      display:flex; align-items:center; gap:8px;
      font-family:inherit;
    }
    .diff-btn .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .diff-btn[data-diff="all"] .dot { background:rgba(255,255,255,0.4); }
    .diff-btn[data-diff="beginner"] .dot { background:var(--beginner); }
    .diff-btn[data-diff="intermediate"] .dot { background:var(--intermediate); }
    .diff-btn[data-diff="advanced"] .dot { background:var(--advanced); }
    .diff-btn:hover { background:rgba(204,0,0,0.1); border-color:rgba(204,0,0,0.45); color:#fff; }
    .diff-btn.active { background:linear-gradient(135deg, rgba(204,0,0,0.28), rgba(139,0,0,0.22)); border-color:rgba(204,0,0,0.65); color:#fff; }
    .diff-btn .cat-count {
      margin-left:auto; padding:1px 7px;
      background:rgba(204,0,0,0.22); border:1px solid rgba(204,0,0,0.35);
      border-radius:12px; font-size:10.5px; font-weight:700; color:rgba(255,255,255,0.8);
    }

    /* View toggle */
    .view-toggle { display:flex; gap:6px; }
    .view-btn {
      flex:1; padding:9px;
      background:rgba(255,255,255,0.05);
      border:1.5px solid rgba(204,0,0,0.26);
      border-radius:9px; color:rgba(255,255,255,0.55);
      cursor:pointer; transition:all 0.2s; font-size:13px;
    }
    .view-btn.active { background:linear-gradient(135deg, var(--primary-red), var(--dark-red)); border-color:var(--primary-red); color:#fff; }
    .view-btn:hover:not(.active) { border-color:var(--primary-red); color:#fff; }

    /* Category buttons */
    .cat-list { display:flex; flex-direction:column; gap:5px; }

    .cat-btn {
      width:100%; padding:9px 12px;
      background:rgba(255,255,255,0.03);
      border:1.5px solid rgba(204,0,0,0.18);
      border-radius:9px; color:rgba(255,255,255,0.65);
      font-size:12.5px; font-weight:600; cursor:pointer;
      text-align:left; transition:all 0.22s;
      display:flex; align-items:center; gap:8px;
      font-family:inherit; word-break:break-word;
    }
    .cat-btn:hover { background:rgba(204,0,0,0.1); border-color:rgba(204,0,0,0.45); color:#fff; }
    .cat-btn.active { background:linear-gradient(135deg, rgba(204,0,0,0.28), rgba(139,0,0,0.22)); border-color:rgba(204,0,0,0.65); color:#fff; }
    .cat-btn .cat-icon { font-size:1rem; flex-shrink:0; }
    .cat-btn .cat-count {
      margin-left:auto; padding:1px 7px; flex-shrink:0;
      background:rgba(204,0,0,0.22); border:1px solid rgba(204,0,0,0.35);
      border-radius:12px; font-size:10.5px; font-weight:700; color:rgba(255,255,255,0.8);
    }

    /* Results */
    .results-info { padding:10px 14px; background:rgba(0,0,0,0.38); border-radius:8px; text-align:center; }
    .results-count { color:rgba(255,255,255,0.5); font-weight:700; font-size:0.78rem; }
    .results-count span { color:var(--primary-red); font-weight:800; font-size:1rem; }

    /* ── COURSES ZONE ────────────────────────────────── */
    .courses-zone {
      flex:1;
      background:linear-gradient(180deg, #0f0000 0%, #080000 100%);
      border-left:2px solid rgba(204,0,0,0.12);
      box-shadow:inset 0 16px 50px rgba(0,0,0,0.9), inset 2px 0 20px rgba(0,0,0,0.8);
      overflow-x:hidden;
    }

    .courses-container {
      padding:30px 30px 60px;
      position:relative; z-index:1; min-height:100%;
    }

    /* ── COURSES GRID ──────────────────────────────── */
    .courses-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(clamp(224px, 21vw, 300px), 1fr));
      gap:22px 18px;
      padding:8px 0 20px;
    }

    /* ── COURSE CARD ───────────────────────────────── */
    .course-card {
      background:linear-gradient(160deg,
        rgba(22,4,4,0.98) 0%,
        rgba(14,6,6,0.98) 60%,
        rgba(8,2,2,0.98) 100%);
      border:1px solid rgba(139,0,0,0.32);
      border-radius:10px; overflow:hidden; cursor:pointer;
      transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
      position:relative; display:flex; flex-direction:column;
      box-shadow:0 4px 18px rgba(0,0,0,0.7);
      height:100%;
    }

    .course-card::before {
      content:''; position:absolute; top:8px; left:8px;
      width:18px; height:18px;
      border-top:2px solid var(--primary-red);
      border-left:2px solid var(--primary-red);
      opacity:0.2; transition:all 0.3s; pointer-events:none; z-index:30;
    }

    .course-card:hover {
      border-color:rgba(204,0,0,0.68);
      box-shadow:0 16px 40px rgba(139,0,0,0.4), 0 0 55px rgba(204,0,0,0.22);
      transform:translateY(-4px) scale(1.01);
    }

    .course-card:hover::before { width:24px; height:24px; opacity:1; border-color:var(--accent-red); top:5px; left:5px; }

    /* Thumbnail 16:9 */
    .course-thumb {
      width:100%; aspect-ratio:16/9; overflow:hidden;
      position:relative; background:#0d0000; flex-shrink:0;
    }

    .course-thumb img {
      width:100%; height:100%; object-fit:cover;
      transition:transform 0.4s ease; display:block;
    }

    .course-card:hover .course-thumb img { transform:scale(1.07); }

    /* Play overlay */
    .play-overlay {
      position:absolute; inset:0;
      background:linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.75) 100%);
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity 0.25s ease;
    }

    .course-card:hover .play-overlay { opacity:1; }

    .play-btn {
      width:54px; height:54px;
      background:linear-gradient(135deg, var(--primary-red), var(--dark-red));
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      color:#fff; font-size:20px;
      box-shadow:0 6px 24px rgba(204,0,0,0.6); transition:transform 0.2s;
    }

    .play-btn i { margin-left:3px; }
    .course-card:hover .play-btn { transform:scale(1.12); }

    /* Difficulty badge */
    .diff-badge {
      position:absolute; top:8px; left:8px;
      padding:3px 9px; border-radius:6px;
      font-size:0.62rem; font-weight:800; text-transform:uppercase; letter-spacing:0.3px;
      color:#fff; z-index:10;
    }

    .diff-badge.beginner    { background:rgba(76,175,80,0.88);  border:1px solid var(--beginner); }
    .diff-badge.intermediate{ background:rgba(255,152,0,0.88); border:1px solid var(--intermediate); }
    .diff-badge.advanced    { background:rgba(244,67,54,0.88);  border:1px solid var(--advanced); }

    /* PDF badge */
    .pdf-badge {
      position:absolute; bottom:8px; left:8px;
      padding:3px 8px;
      background:rgba(0,0,0,0.85);
      border:1px solid rgba(204,0,0,0.4);
      border-radius:6px; font-size:11px; font-weight:700; color:#fff;
      backdrop-filter:blur(8px);
    }

    /* Episode count pill */
    .ep-pill {
      position:absolute; bottom:8px; right:8px;
      background:rgba(0,0,0,0.88);
      border:1px solid rgba(204,0,0,0.4);
      color:#fff; padding:3px 8px; border-radius:6px;
      font-size:11px; font-weight:800;
    }

    /* Card info */
    .course-info {
      padding:11px 12px 13px;
      display:flex; flex-direction:column; gap:6px;
      flex:1;
    }

    .course-title {
      font-size:0.9rem; font-weight:800; color:var(--text-primary);
      line-height:1.35;
      display:-webkit-box; -webkit-line-clamp:2; line-clamp:2;
      -webkit-box-orient:vertical; overflow:hidden;
      letter-spacing:0.05px; transition:color 0.25s; min-height:2.4em;
    }

    .course-card:hover .course-title { color:var(--accent-red); }

    .course-summary {
      font-size:0.72rem; color:rgba(255,255,255,0.45); line-height:1.5;
      display:-webkit-box; -webkit-line-clamp:2; line-clamp:2;
      -webkit-box-orient:vertical; overflow:hidden;
    }

    .course-meta-row {
      display:flex; align-items:center; justify-content:space-between; gap:5px;
      padding-top:6px;
      border-top:1px solid rgba(139,0,0,0.16); transition:border-color 0.25s;
      margin-top:auto; flex-wrap:wrap;
    }

    .course-card:hover .course-meta-row { border-color:rgba(204,0,0,0.35); }

    .meta-chip {
      font-size:0.62rem; color:rgba(255,255,255,0.42); font-weight:600;
      display:flex; align-items:center; gap:4px;
    }

    .meta-chip i { color:var(--primary-red); font-size:0.56rem; }

    .lang-tag {
      padding:2px 7px;
      background:rgba(204,0,0,0.18); border:1px solid rgba(204,0,0,0.32);
      border-radius:5px; font-size:0.6rem; font-weight:800; color:rgba(255,255,255,0.7);
    }

    /* ── LIST MODE ──────────────────────────────────── */
    .courses-grid.list-mode { grid-template-columns:1fr !important; gap:10px; }
    .courses-grid.list-mode .course-card { flex-direction:row !important; height:108px; align-items:stretch; }
    .courses-grid.list-mode .course-thumb { width:192px !important; min-width:192px; flex-shrink:0; height:100%; aspect-ratio:unset !important; border-right:1px solid rgba(139,0,0,0.28); }
    .courses-grid.list-mode .course-thumb img { height:100%; object-fit:cover; }
    .courses-grid.list-mode .course-info { flex:1; padding:10px 14px; justify-content:space-between; }
    .courses-grid.list-mode .course-title { -webkit-line-clamp:1; line-clamp:1; min-height:unset; }
    .courses-grid.list-mode .course-summary { display:none; }
    .courses-grid.list-mode .play-overlay { display:none; }

    /* ── EMPTY / LOADING ───────────────────────────── */
    .loading-state, .no-courses {
      text-align:center; padding:60px 20px; color:var(--text-dim);
    }
    .loading-state i, .no-courses i { font-size:48px; color:var(--primary-red); margin-bottom:16px; display:block; }
    .loading-state p, .no-courses p { font-size:15px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 1s linear infinite; }

    /* ── LOAD MORE ──────────────────────────────────── */
    .load-more-wrap { text-align:center; margin:36px 0 10px; }
    .load-more-btn {
      display:inline-flex; align-items:center; gap:10px;
      padding:13px 36px;
      background:linear-gradient(135deg, var(--primary-red), var(--dark-red));
      border:none; border-radius:12px; color:#fff;
      font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
      transition:all 0.28s; box-shadow:0 4px 16px rgba(204,0,0,0.35);
    }
    .load-more-btn:hover { background:linear-gradient(135deg, #e60000, #6b0000); transform:translateY(-2px); box-shadow:0 8px 24px rgba(204,0,0,0.55); }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width:1024px) {
      .main-content-wrapper { flex-direction:column; }
      .filter-sidebar { width:100%; height:auto; position:relative; top:0; border-right:none; border-bottom:2px solid rgba(204,0,0,0.22); max-height:380px; overflow-y:auto; }
      .courses-zone { border-left:none; }
      .courses-grid { grid-template-columns:repeat(auto-fill, minmax(clamp(180px,26vw,280px),1fr)); }
    }

    @media (max-width:768px) {
      .lib-header-left h1 { font-size:1.15rem; }
      .lib-header-subtitle { display:none; }
      .lib-stat-badge { font-size:0.68rem; padding:4px 9px; }
      .courses-container { padding:18px 14px 40px; }
      .courses-grid { grid-template-columns:repeat(auto-fill, minmax(155px,1fr)); gap:14px 10px; }
      .course-title { font-size:0.8rem; }
    }
  </style>
</head>

      </a>
      <ul class="desktop-nav-menu">

          <a href="../../About me/about.html" class="desktop-nav-link" aria-label="About Me">
            <i class="fas fa-user-circle"></i><span>About</span>
          </a>

  <!-- Compact Header Strip -->
  <div class="lib-header">
    <div class="lib-header-left">
      <h1><i class="fas fa-graduation-cap"></i> Educational Courses</h1>
      <div class="lib-header-divider"></div>
      <span class="lib-header-subtitle">Video Course Archive</span>
    </div>
    <div class="lib-header-stats">
      <div class="lib-stat-badge">
        <i class="fas fa-video"></i>
        <strong id="headerTotalCourses">—</strong>
        <span>Courses</span>
      </div>
      <div class="lib-stat-badge">
        <i class="fas fa-layer-group"></i>
        <strong id="headerTotalCats">—</strong>
        <span>Categories</span>
      </div>
      <div class="lib-stat-badge">
        <i class="fas fa-list-ol"></i>
        <strong id="headerTotalEps">—</strong>
        <span>Episodes</span>
      </div>
    </div>
  </div>

  <!-- Main 2-Column Layout -->
  <div class="main-content-wrapper">

    <!-- LEFT SIDEBAR -->
    <aside class="filter-sidebar">

      <div class="filter-header">
        <h3><i class="fas fa-sliders-h"></i> Filters</h3>
      </div>

      <!-- Search -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-search"></i> Search</div>
        <div class="search-box">
          <i class="fas fa-search search-icon"></i>
          <input type="text" class="search-input" id="searchInput" placeholder="Search courses…">
          <button class="clear-search" id="clearSearch" onclick="clearSearch()">×</button>
        </div>
      </div>

      <!-- Sort -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-sort"></i> Sort By</div>
        <select class="filter-dropdown" id="sortFilter">
          <option value="default">Default</option>
          <option value="title-asc">Title (A → Z)</option>
          <option value="title-desc">Title (Z → A)</option>
          <option value="episodes-desc">Most Episodes</option>
          <option value="episodes-asc">Fewest Episodes</option>
        </select>
      </div>

      <!-- Language -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-language"></i> Language</div>
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="all" onclick="setLang('all',this)">All</button>
          <button class="lang-btn" data-lang="en" onclick="setLang('en',this)">🇬🇧 EN</button>
          <button class="lang-btn" data-lang="bn" onclick="setLang('bn',this)">🇧🇩 BN</button>
        </div>
      </div>

      <!-- Difficulty -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-signal"></i> Difficulty</div>
        <div class="diff-toggle">
          <button class="diff-btn active" data-diff="all" onclick="setDiff('all',this)">
            <span class="dot"></span>All Levels
            <span class="cat-count" id="diffCountAll">0</span>
          </button>
          <button class="diff-btn" data-diff="beginner" onclick="setDiff('beginner',this)">
            <span class="dot"></span>Beginner
            <span class="cat-count" id="diffCountBeginner">0</span>
          </button>
          <button class="diff-btn" data-diff="intermediate" onclick="setDiff('intermediate',this)">
            <span class="dot"></span>Intermediate
            <span class="cat-count" id="diffCountIntermediate">0</span>
          </button>
          <button class="diff-btn" data-diff="advanced" onclick="setDiff('advanced',this)">
            <span class="dot"></span>Advanced
            <span class="cat-count" id="diffCountAdvanced">0</span>
          </button>
        </div>
      </div>

      <!-- View Mode -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-th"></i> View</div>
        <div class="view-toggle">
          <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="Grid view"><i class="fas fa-th-large"></i></button>
          <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="List view"><i class="fas fa-list"></i></button>
        </div>
      </div>

      <!-- Results -->
      <div class="filter-section">
        <div class="results-info">
          <div class="results-count">Showing <span id="resultsCount">0</span> courses</div>
        </div>
      </div>

      <!-- Categories -->
      <div class="filter-section">
        <div class="filter-section-title"><i class="fas fa-layer-group"></i> Categories</div>
        <div class="cat-list" id="catList">
          <button class="cat-btn active" data-cat="all" onclick="filterBy('all',this)">
            <i class="fas fa-graduation-cap cat-icon"></i> All Courses
            <span class="cat-count" id="countAll">0</span>
          </button>
        </div>
      </div>

    </aside>

    <!-- COURSES ZONE -->
    <main class="courses-zone">
      <div class="courses-container">
        <div class="loading-state" id="loadingState">
          <i class="fas fa-spinner spin"></i>
          <p>Loading courses…</p>
        </div>
        <div id="coursesGrid" style="display:none;"></div>
      </div>
    </main>

  </div>

  <script>
    // ── State ──────────────────────────────────────────
    let allCourses   = [];
    let catMap       = {};    // slug → { name, icon, count }
    let currentCat   = 'all';
    let currentDiff  = 'all';
    let currentLang  = 'all';
    let currentSort  = 'default';
    let currentView  = 'grid';
    let batchSize    = 16;
    let currentBatch = 1;

    // ── CATEGORY ICON MAP (from original) ──────────────
    const CAT_ICONS = {
      'Arduino & Microcontrollers': 'fas fa-microchip',
      'Circuit Design':             'fas fa-bolt',
      'Embedded Systems':           'fas fa-memory',
      'Python Programming':         'fab fa-python',
      'Web Development & Design':   'fas fa-laptop-code',
      'Machine Learning & Deep Learning': 'fas fa-brain',
      'Artificial Intelligence':    'fas fa-brain',
      'Data Science & Analytics':   'fas fa-chart-line',
      'Robotics & Automation':      'fas fa-robot',
      'Internet of Things (IoT)':   'fas fa-wifi',
      'PCB Design & Fabrication':   'fas fa-th',
      'Electrical Engineering':     'fas fa-plug',
      'Mechanical Engineering':     'fas fa-cog',
      '3D Modeling & CAD':          'fas fa-cube',
      'Computer Science & Programming': 'fas fa-code',
      'Cybersecurity & Networking': 'fas fa-shield-alt',
      'Engineering & Technology':   'fas fa-cogs',
    };

    function getCatIcon(name) {
      return CAT_ICONS[name] || 'fas fa-tag';
    }

    // ── Utilities ──────────────────────────────────────
    function slugify(s) {
      return (s||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    function escHtml(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Load Data ──────────────────────────────────────
    async function loadCourses() {
      try {
        const res  = await fetch('courses.json');
        const data = await res.json();

        allCourses = (data.courses || []).map(c => ({
          ...c,
          episodes:   c.episodes || (c.playlist ? c.playlist.length : 0),
          instructor: c.institution || c.instructor || 'Md Akhinoor Islam',
          playlist:   c.playlist || []
        }));

        // Build category map
        const seenCats = {};
        allCourses.forEach(c => {
          const slug = slugify(c.category || 'other');
          if (!seenCats[slug]) seenCats[slug] = { name: c.category || 'Other', count: 0 };
          seenCats[slug].count++;
          c._catSlug = slug;
        });
        catMap = seenCats;

        // Difficulty counts
        const counts = { beginner:0, intermediate:0, advanced:0 };
        allCourses.forEach(c => {
          const d = (c.difficulty||'beginner').toLowerCase();
          if (counts[d] !== undefined) counts[d]++;
        });

        // Total episodes
        const totalEps = allCourses.reduce((sum, c) => sum + (c.episodes || 0), 0);

        // Header stats
        document.getElementById('headerTotalCourses').textContent = allCourses.length;
        document.getElementById('headerTotalCats').textContent    = Object.keys(catMap).length;
        document.getElementById('headerTotalEps').textContent     = totalEps;
        document.getElementById('countAll').textContent           = allCourses.length;

        // Difficulty count badges
        document.getElementById('diffCountAll').textContent          = allCourses.length;
        document.getElementById('diffCountBeginner').textContent     = counts.beginner;
        document.getElementById('diffCountIntermediate').textContent = counts.intermediate;
        document.getElementById('diffCountAdvanced').textContent     = counts.advanced;

        buildCatButtons();
        renderCourses();

      } catch (err) {
        console.error('Error loading courses:', err);
        document.getElementById('loadingState').innerHTML =
          '<i class="fas fa-exclamation-triangle"></i><p>Failed to load courses. Please refresh.</p>';
      }
    }

    // ── Build Category Buttons ─────────────────────────
    function buildCatButtons() {
      const list = document.getElementById('catList');
      Array.from(list.children).forEach(el => { if (el.dataset.cat !== 'all') el.remove(); });

      const sorted = Object.entries(catMap).sort((a,b) => b[1].count - a[1].count);
      sorted.forEach(([slug, info]) => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.dataset.cat = slug;
        btn.innerHTML = `<i class="${getCatIcon(info.name)} cat-icon"></i>${escHtml(info.name)}<span class="cat-count">${info.count}</span>`;
        btn.onclick = () => filterBy(slug, btn);
        list.appendChild(btn);
      });
    }

    // ── Filters ────────────────────────────────────────
    function filterBy(cat, el) {
      currentCat = cat; currentBatch = 1;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderCourses();
    }

    function setDiff(diff, el) {
      currentDiff = diff; currentBatch = 1;
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderCourses();
    }

    function setLang(lang, el) {
      currentLang = lang; currentBatch = 1;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderCourses();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearSearch').classList.remove('active');
      renderCourses();
    }

    function setView(mode) {
      currentView = mode;
      document.getElementById('gridViewBtn').classList.toggle('active', mode === 'grid');
      document.getElementById('listViewBtn').classList.toggle('active', mode === 'list');
      const grid = document.getElementById('coursesGrid').querySelector('.courses-grid');
      if (grid) grid.classList.toggle('list-mode', mode === 'list');
    }

    // ── Render ─────────────────────────────────────────
    function renderCourses() {
      const container = document.getElementById('coursesGrid');
      document.getElementById('loadingState').style.display = 'none';
      container.style.display = 'block';

      const q = document.getElementById('searchInput').value.toLowerCase().trim();

      let filtered = allCourses.filter(c => {
        const catOk  = currentCat  === 'all' || c._catSlug === currentCat;
        const diffOk = currentDiff === 'all' || (c.difficulty||'beginner').toLowerCase() === currentDiff;
        const langOk = currentLang === 'all' || (c.language||'en') === currentLang;
        const qOk    = !q
          || (c.title||'').toLowerCase().includes(q)
          || (c.summary||'').toLowerCase().includes(q)
          || (c.category||'').toLowerCase().includes(q)
          || (c.instructor||'').toLowerCase().includes(q);
        return catOk && diffOk && langOk && qOk;
      });

      // Sort
      switch (currentSort) {
        case 'title-asc':      filtered.sort((a,b) => (a.title||'').localeCompare(b.title||'')); break;
        case 'title-desc':     filtered.sort((a,b) => (b.title||'').localeCompare(a.title||'')); break;
        case 'episodes-desc':  filtered.sort((a,b) => (b.episodes||0) - (a.episodes||0)); break;
        case 'episodes-asc':   filtered.sort((a,b) => (a.episodes||0) - (b.episodes||0)); break;
      }

      document.getElementById('resultsCount').textContent = filtered.length;

      if (filtered.length === 0) {
        container.innerHTML = `<div class="no-courses"><i class="fas fa-video-slash"></i><p>No courses found</p></div>`;
        return;
      }

      const total   = batchSize * currentBatch;
      const slice   = filtered.slice(0, total);
      const hasMore = filtered.length > total;
      const listCls = currentView === 'list' ? ' list-mode' : '';
      const cards   = slice.map(c => createCourseCard(c)).join('');

      container.innerHTML = `
        <div class="courses-grid${listCls}">${cards}</div>
        ${hasMore ? `
        <div class="load-more-wrap">
          <button class="load-more-btn" id="loadMoreBtn">
            <i class="fas fa-arrow-down"></i>
            Load More (${filtered.length - total} remaining)
          </button>
        </div>` : ''}`;

      document.getElementById('loadMoreBtn')?.addEventListener('click', () => {
        currentBatch++;
        renderCourses();
      });
    }

    // ── Course Card HTML (logic preserved from original) ─
    function createCourseCard(c) {
      const lang       = (c.language === 'bn') ? 'BN' : 'EN';
      const difficulty = (c.difficulty || 'beginner').toLowerCase();
      const diffLabel  = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
      const pdfCount   = c.playlist.filter(ep => ep.lecturePdf && ep.lecturePdf.downloadUrl).length;
      const thumb      = c.thumbnail || '../../Content Storage/images/default-course-thumbnail.svg';
      const eps        = c.episodes || 0;
      const dur        = c.duration || '';

      return `
        <div class="course-card" onclick="openCourse('${escHtml(c.id)}')">
          <div class="course-thumb">
            <img src="${escHtml(thumb)}" alt="${escHtml(c.title)}" loading="lazy"
                 onerror="this.src='../../Content Storage/images/default-course-thumbnail.svg'">
            <div class="play-overlay"><div class="play-btn"><i class="fas fa-play"></i></div></div>
            <div class="diff-badge ${difficulty}">${diffLabel}</div>
            ${pdfCount > 0 ? `<div class="pdf-badge">📝 ${pdfCount} PDF</div>` : ''}
            ${eps > 0 ? `<div class="ep-pill"><i class="fas fa-list" style="font-size:9px;margin-right:3px;"></i>${eps} ep</div>` : ''}
          </div>
          <div class="course-info">
            <h3 class="course-title">${escHtml(c.title)}</h3>
            ${c.summary ? `<p class="course-summary">${escHtml(c.summary)}</p>` : ''}
            <div class="course-meta-row">
              ${dur ? `<span class="meta-chip"><i class="fas fa-clock"></i>${dur}</span>` : '<span></span>'}
              <span class="meta-chip"><i class="fas fa-graduation-cap"></i>${escHtml(c.instructor)}</span>
              <span class="lang-tag">${lang}</span>
            </div>
          </div>
        </div>`;
    }

    function openCourse(id) { window.location.href = `course-viewer-new.html?id=${id}`; }

    // ── Event Listeners ────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', e => {
      document.getElementById('clearSearch').classList.toggle('active', e.target.value.length > 0);
      currentBatch = 1;
      renderCourses();
    });

    document.getElementById('sortFilter').addEventListener('change', e => {
      currentSort  = e.target.value;
      currentBatch = 1;
      renderCourses();
    });

    // ── Navbar scroll ──────────────────────────────────
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('desktopNavbar');
      if (nav) nav.classList.toggle('scrolled', window.scrollY > 50);
    });

    // ── Init ───────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', loadCourses);
  </script>

  <script src="../../Optimization/navbar-autohide.js"></script>
  <script src="../../Optimization/fullscreen-init.js"></script>
    <!-- Neural Grid Cursor Effect -->
    <script src="../../Optimization/cursor-effects.js" defer></script>
