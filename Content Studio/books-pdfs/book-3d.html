<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#0a0000">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <!-- Mobile redirect -->
  <script>
    (function() {
      if (/android|iphone|ipad|ipod|iemobile|mobile/i.test(navigator.userAgent) ||
          (navigator.userAgentData && navigator.userAgentData.mobile)) {
        const id = new URLSearchParams(window.location.search).get('id');
        window.location.replace('../../mobile/content-studio/books-pdfs/book-reader.html' + (id ? '?id='+id+'&bookmode=true' : ''));
      }
    })();
  </script>

  <title>3D Book Reader – A3KM Studio</title>
  <link rel="icon" href="../../images/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary-red: #CC0000;
      --dark-red: #8B0000;
      --accent-red: #FF2020;
      --glow: rgba(204,0,0,0.35);
      --ctrl-bg: rgba(8,2,2,0.96);
      --ctrl-border: rgba(139,0,0,0.45);
    }

    /* Global text rendering optimization */
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* ──────────────────────────────────────────────────
       ATMOSPHERE
    ────────────────────────────────────────────────── */
    body {
      font-family: 'Inter', sans-serif;
      background: #0e0a0a;
      color: #fff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Clean solid background - no distractions */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #0a0000 0%, #030000 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ──────────────────────────────────────────────────
       TOP STRIP (auto-hide)
    ────────────────────────────────────────────────── */
    .top-strip {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      background: var(--ctrl-bg);
      border-bottom: 1px solid var(--ctrl-border);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      z-index: 500;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }
    .top-strip.hidden { transform: translateY(-100%); opacity: 0; }

    .ts-title {
      flex: 1;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ts-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      height: 34px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      font-family: 'Inter',sans-serif;
    }
    .ts-btn:hover {
      background: rgba(204,0,0,0.15);
      border-color: var(--ctrl-border);
      color: #fff;
    }
    .ts-btn.red {
      background: var(--primary-red);
      border-color: var(--accent-red);
      color: #fff;
    }
    .ts-btn.red:hover {
      background: var(--dark-red);
      transform: translateY(-1px);
    }

    /* ──────────────────────────────────────────────────
       BOOK STAGE
    ────────────────────────────────────────────────── */
    .book-stage {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      perspective: 2400px;
    }

    /* Open book container - clean professional premium */
    .open-book {
      position: relative;
      display: flex;
      align-items: stretch;
      height: 85vh;
      max-height: 900px;
      transform-style: preserve-3d;
      /* Subtle tilt for depth */
      transform: perspective(2400px) rotateX(2deg);
      /* Clean professional shadow - smooth performance */
      filter: 
        drop-shadow(0 30px 60px rgba(0,0,0,0.5))
        drop-shadow(0 0 30px rgba(204,0,0,0.08));
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      /* Hardware acceleration */
      will-change: transform;
      backface-visibility: hidden;
    }
    .open-book:hover {
      transform: perspective(2400px) rotateX(1deg) translateY(-5px);
      filter: 
        drop-shadow(0 35px 70px rgba(0,0,0,0.55))
        drop-shadow(0 0 40px rgba(204,0,0,0.12));
    }
    
    /* Single-page mode */
    body.single-page-mode .open-book {
      justify-content: center;
    }
    body.single-page-mode .book-p.left-p {
      display: none;
    }
    body.single-page-mode .book-p.right-p {
      border-radius: 8px;
      box-shadow: 
        inset 0 0 40px rgba(0,0,0,0.08),
        0 20px 50px rgba(0,0,0,0.4);
      width: 42vw;
      max-width: 650px;
    }
    body.single-page-mode .book-spine {
      display: none;
    }

    /* Book pages - realistic dimensions + performance */
    .book-p {
      position: relative;
      width: 40vw;
      min-width: 280px;
      max-width: 550px;
      height: 100%;
      background: #fefefe;
      overflow: hidden;
      transform-style: preserve-3d;
      /* Hardware acceleration for smooth animations */
      will-change: transform;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .book-p.left-p {
      border-radius: 8px 0 0 8px;
      transform-origin: right center;
      /* Clean gutter shadow - smooth performance */
      box-shadow:
        inset -25px 0 40px rgba(0,0,0,0.12),
        inset -2px 0 3px rgba(0,0,0,0.1);
      background: #fefefe;
    }

    .book-p.right-p {
      border-radius: 0 8px 8px 0;
      transform-origin: left center;
      /* Clean gutter shadow - smooth performance */
      box-shadow:
        inset 25px 0 40px rgba(0,0,0,0.12),
        inset 2px 0 3px rgba(0,0,0,0.1);
      background: #fefefe;
    }

    /* Page canvas - MAXIMUM SHARPNESS */
    .book-p canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto !important;
      height: auto !important;
      /* Force crisp rendering for text */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      -ms-interpolation-mode: nearest-neighbor;
      /* Hardware acceleration */
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-font-smoothing: subpixel-antialiased;
    }

    .book-p .pg-canvas-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Allow vertical scroll for extremely tall pages */
      overflow-y: auto;
      overflow-x: hidden;
      background: #fefefe;
      /* Prevent any blur or quality loss */
      transform: translateZ(0);
      backface-visibility: hidden;
      /* Smooth scrolling for overflow content */
      scroll-behavior: smooth;
      /* Hide scrollbar for clean look */
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.2) transparent;
    }
    .book-p .pg-canvas-wrap::-webkit-scrollbar {
      width: 6px;
    }
    .book-p .pg-canvas-wrap::-webkit-scrollbar-track {
      background: transparent;
    }
    .book-p .pg-canvas-wrap::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.2);
      border-radius: 3px;
    }
    .book-p .pg-canvas-wrap::-webkit-scrollbar-thumb:hover {
      background: rgba(0,0,0,0.35);
    }

    /* Page corner curl - subtle professional */
    .book-p::after {
      content: '';
      position: absolute;
      width: 0; height: 0;
      background: transparent;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 20;
    }
    .right-p::after {
      bottom: 0; right: 0;
      border-radius: 0 0 0 100%;
      background: linear-gradient(225deg, rgba(0,0,0,0.08) 0%, transparent 65%);
    }
    .left-p::after {
      bottom: 0; left: 0;
      border-radius: 0 0 100% 0;
      background: linear-gradient(315deg, rgba(0,0,0,0.08) 0%, transparent 65%);
    }
    .book-p:hover::after { 
      width: 60px; 
      height: 60px;
    }

    /* Book spine - clean professional binding */
    .book-spine {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 100%;
      background: linear-gradient(
        90deg,
        rgba(0,0,0,0.02) 0%,
        rgba(0,0,0,0.25) 20%,
        rgba(0,0,0,0.32) 50%,
        rgba(0,0,0,0.25) 80%,
        rgba(0,0,0,0.02) 100%
      );
      pointer-events: none;
      z-index: 30;
    }

    /* Click zones (left / right half) */
    .click-zone {
      position: absolute;
      top: 0; bottom: 0;
      width: 50%;
      z-index: 50;
      cursor: pointer;
    }
    .click-zone.left-zone  { left: 0; }
    .click-zone.right-zone { right: 0; }

    /* Page number ribbon */
    .page-ribbon {
      position: absolute;
      bottom: 12px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(80,40,40,0.5);
      z-index: 25;
      pointer-events: none;
    }
    .left-p  .page-ribbon { left: 20px; }
    .right-p .page-ribbon { right: 20px; }

    /* Flip animations - smooth realistic page turn */
    @keyframes flipLeft {
      0%   { 
        transform: rotateY(0deg); 
        z-index: 200;
        filter: brightness(1);
      }
      40%  { 
        transform: rotateY(-85deg) translateZ(20px); 
        filter: brightness(0.85);
      }
      60%  { 
        transform: rotateY(-95deg) translateZ(20px); 
        filter: brightness(0.85);
      }
      100% { 
        transform: rotateY(-180deg); 
        z-index: 200;
        filter: brightness(1);
      }
    }
    @keyframes flipRight {
      0%   { 
        transform: rotateY(0deg); 
        z-index: 200;
        filter: brightness(1);
      }
      40%  { 
        transform: rotateY(85deg) translateZ(20px); 
        filter: brightness(0.85);
      }
      60%  { 
        transform: rotateY(95deg) translateZ(20px); 
        filter: brightness(0.85);
      }
      100% { 
        transform: rotateY(180deg); 
        z-index: 200;
        filter: brightness(1);
      }
    }
    @keyframes pageTurnSingle {
      0%   { 
        transform: rotateY(0deg) scale(1); 
        opacity: 1;
        filter: brightness(1);
      }
      20%  { 
        transform: rotateY(-20deg) translateX(-3%) scale(0.99); 
        filter: brightness(0.95);
      }
      50%  { 
        transform: rotateY(-90deg) translateX(-10%) scale(0.97); 
        opacity: 0.6;
        filter: brightness(0.8);
      }
      80%  { 
        transform: rotateY(-160deg) translateX(-3%) scale(0.99); 
        filter: brightness(0.95);
      }
      100% { 
        transform: rotateY(-180deg) scale(1); 
        opacity: 0;
        filter: brightness(1);
      }
    }
    .flipping-left  { 
      animation: flipLeft 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; 
    }
    .flipping-right { 
      animation: flipRight 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; 
    }
    .page-turning-single { 
      animation: pageTurnSingle 0.75s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; 
    }

    /* ──────────────────────────────────────────────────
       BOTTOM CONTROLS (auto-appearing)
    ────────────────────────────────────────────────── */
    .ctrl-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: rgba(8,2,2,0.98);
      border: 1px solid rgba(139,0,0,0.6);
      border-radius: 50px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 500;
      backdrop-filter: blur(24px);
      box-shadow: 
        0 8px 32px rgba(0,0,0,0.8), 
        0 0 60px rgba(204,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.05);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .ctrl-bar.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(20px);
      pointer-events: none;
    }

    .ctrl-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter',sans-serif;
    }
    .ctrl-btn:hover {
      background: rgba(204,0,0,0.2);
      border-color: var(--ctrl-border);
      color: #fff;
      transform: scale(1.08);
    }
    .ctrl-btn:disabled { opacity: 0.28; cursor: default; transform: none; }

    .ctrl-page {
      padding: 0 16px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      min-width: 100px;
      text-align: center;
    }

    .ctrl-sep {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.1);
    }

    .ctrl-btn.red-btn {
      background: rgba(204,0,0,0.2);
      border-color: rgba(204,0,0,0.5);
      color: rgba(255,80,80,0.9);
    }
    .ctrl-btn.red-btn:hover { background: var(--primary-red); color: #fff; border-color: var(--accent-red); }

    /* progress track */
    .ctrl-progress {
      width: 100px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .ctrl-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-red), #FF4444);
      border-radius: 2px;
      transition: width 0.3s ease;
      box-shadow: 0 0 6px rgba(204,0,0,0.5);
    }

    /* ──────────────────────────────────────────────────
       LOADING / ERROR STATE
    ────────────────────────────────────────────────── */
    .loading-cover {
      position: fixed; inset: 0;
      background: rgba(5,0,0,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 900;
      backdrop-filter: blur(10px);
    }
    .loading-cover.done { display: none; }

    .loading-cover i { font-size: 52px; color: var(--primary-red); animation: spin 1.2s linear infinite; }
    .loading-cover p { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.6); }
    .loading-cover small { font-size: 12px; color: rgba(255,255,255,0.3); max-width: 380px; text-align: center; line-height:1.6; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─────────────────────────────────────────────────
       ADBLOCKER NOTIFICATION POPUP
    ───────────────────────────────────────────────── */
    .adblocker-notification {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      z-index: 10000; animation: fadeIn 0.3s ease;
    }
    .adblocker-notification.active { display: flex; }
    
    .notif-content {
      background: linear-gradient(145deg, rgba(20,2,2,0.98), rgba(8,0,0,0.98));
      border: 1px solid rgba(204,0,0,0.3);
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(204,0,0,0.15);
      text-align: center;
      position: relative;
      animation: slideUp 0.4s ease;
    }
    
    .notif-icon {
      width: 80px; height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(204,0,0,0.4);
    }
    .notif-icon i { font-size: 36px; color: #fff; }
    
    .notif-title {
      font-size: 24px; font-weight: 800; color: var(--text-primary);
      margin-bottom: 12px; letter-spacing: -0.3px;
    }
    
    .notif-msg {
      font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.65);
      margin-bottom: 28px; max-width: 400px; margin-left: auto; margin-right: auto;
    }
    
    .notif-actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    
    .notif-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .notif-btn i { font-size: 13px; }
    
    .notif-btn-primary {
      background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
      color: #fff; box-shadow: 0 4px 12px rgba(204,0,0,0.3);
    }
    .notif-btn-primary:hover {
      transform: translateY(-2px); box-shadow: 0 6px 20px rgba(204,0,0,0.5);
    }
    
    .notif-btn-secondary {
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .notif-btn-secondary:hover {
      background: rgba(255,255,255,0.1); color: var(--text-primary);
      border-color: rgba(255,255,255,0.25);
    }
    
    .notif-close {
      position: absolute; top: 16px; right: 16px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.05); border: none;
      color: rgba(255,255,255,0.4); cursor: pointer;
      transition: all 0.2s; font-size: 14px;
    }
    .notif-close:hover {
      background: rgba(255,255,255,0.1); color: var(--text-primary);
      transform: rotate(90deg);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ──────────────────────────────────────────────────
       NIGHT MODE OVERLAY
    ────────────────────────────────────────────────── */
    .night-filter {
      position: fixed; inset: 0;
      background: rgba(255,100,0,0.06);
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.4s;
    }
    body.night .night-filter { opacity: 1; }
    body.night .book-p { 
      filter: invert(0.90) hue-rotate(180deg) contrast(0.98) brightness(0.92); 
      /* No blur - keep text sharp */
    }

    /* ──────────────────────────────────────────────────
       KEYBOARD HINT
    ────────────────────────────────────────────────── */
    .hint-toast {
      position: fixed;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      background: rgba(8,2,2,0.9);
      border: 1px solid rgba(204,0,0,0.3);
      border-radius: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      z-index: 600;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    .hint-toast.show { opacity: 1; }
    .hint-toast span { color: rgba(255,140,140,0.85); font-weight: 700; }

    /* ──────────────────────────────────────────────────
       RESPONSIVE OPTIMIZATION
    ────────────────────────────────────────────────── */
    
    /* Tablet - Force single page for better readability */
    @media (max-width: 1024px) {
      .open-book {
        height: 90vh;
        max-height: none;
      }
      body:not(.single-page-mode) .book-p.left-p {
        display: none;
      }
      body:not(.single-page-mode) .book-p.right-p {
        border-radius: 8px;
        box-shadow: 
          inset 0 0 40px rgba(0,0,0,0.08),
          0 20px 50px rgba(0,0,0,0.4);
        width: 70vw;
        max-width: none;
      }
      body:not(.single-page-mode) .book-spine {
        display: none;
      }
    }
    
    /* Mobile - Optimized for vertical reading */
    @media (max-width: 768px) {
      .open-book {
        height: 88vh;
        transform: perspective(2400px) rotateX(0deg);
      }
      .book-p.right-p,
      body.single-page-mode .book-p.right-p,
      body:not(.single-page-mode) .book-p.right-p {
        width: 92vw;
        max-width: 500px;
        border-radius: 6px;
      }
      .control-bar {
        flex-wrap: wrap;
        gap: 8px;
      }
      .control-bar button {
        padding: 8px 14px;
        font-size: 13px;
      }
    }
    
    /* Small mobile - Maximum readability */
    @media (max-width: 480px) {
      .open-book {
        height: 85vh;
      }
      .book-p.right-p,
      body.single-page-mode .book-p.right-p,
      body:not(.single-page-mode) .book-p.right-p {
        width: 96vw;
      }
      .control-bar {
        padding: 10px 8px;
        gap: 6px;
      }
      .control-bar button {
        padding: 6px 10px;
        font-size: 12px;
        min-width: 32px;
      }
      .page-ribbon {
        font-size: 10px;
        bottom: 8px;
      }
    }
  </style>
</head>
<body>

  <!-- Night filter overlay -->
  <div class="night-filter"></div>

  <!-- LOADING COVER -->
  <div class="loading-cover" id="loadingCover">
    <i class="fas fa-spinner"></i>
    <p>Opening 3D Book…</p>
    <small>Rendering pages for the best reading experience</small>
  </div>

  <!-- ADBLOCKER WARNING NOTIFICATION -->
  <div class="adblocker-notification" id="adblockNotification">
    <div class="notif-content">
      <div class="notif-icon">
        <i class="fas fa-shield-alt"></i>
      </div>
      <h3 class="notif-title">AdBlocker Detected</h3>
      <p class="notif-msg">It looks like your browser extension is blocking the PDF. Please disable your AdBlocker for this site to view the book in 3D mode.</p>
      <div class="notif-actions">
        <button class="notif-btn notif-btn-primary" onclick="retryPDFLoad()">
          <i class="fas fa-redo"></i> Try Again
        </button>
        <button class="notif-btn notif-btn-secondary" onclick="continueWithFallback()">
          <i class="fas fa-forward"></i> Continue Anyway
        </button>
      </div>
      <button class="notif-close" onclick="closeAdblockNotif()">
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>

  <!-- TOP STRIP -->
  <div class="top-strip" id="topStrip">
    <a class="ts-btn" id="backToDetail" href="#" style="flex-shrink:0">
      <i class="fas fa-arrow-left"></i> Back
    </a>
    <span class="ts-title" id="topTitle">Loading…</span>
    <a class="ts-btn" id="switchToPdfBtn" href="#" style="flex-shrink:0">
      <i class="fas fa-file-pdf"></i> PDF View
    </a>
    <button class="ts-btn" onclick="toggleNight()">
      <i class="fas fa-moon"></i>
    </button>
    <button class="ts-btn" onclick="toggleReadingMode()" id="readingModeBtn" title="Toggle single/dual page">
      <i class="fas fa-book-open"></i> Dual Page
    </button>
    <button class="ts-btn red" onclick="toggleFullscreen()">
      <i class="fas fa-expand"></i>
    </button>
  </div>

  <!-- BOOK STAGE -->
  <div class="book-stage" id="bookStage">
    <div class="open-book" id="openBook">
      <!-- Left page -->
      <div class="book-p left-p" id="leftPage">
        <div class="pg-canvas-wrap" id="leftCanvas"></div>
        <div class="page-ribbon" id="leftRibbon"></div>
        <div class="click-zone left-zone" onclick="prevPages()" title="Previous pages"></div>
      </div>

      <!-- Spine -->
      <div class="book-spine"></div>

      <!-- Right page -->
      <div class="book-p right-p" id="rightPage">
        <div class="pg-canvas-wrap" id="rightCanvas"></div>
        <div class="page-ribbon" id="rightRibbon"></div>
        <div class="click-zone right-zone" onclick="nextPages()" title="Next pages"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM CONTROLS -->
  <div class="ctrl-bar" id="ctrlBar">
    <button class="ctrl-btn" id="prevBtn" onclick="prevPages()" disabled title="Previous (←)">
      <i class="fas fa-chevron-left"></i>
    </button>

    <div class="ctrl-sep"></div>

    <span class="ctrl-page" id="ctrlPage">—</span>
    <div class="ctrl-progress">
      <div class="ctrl-progress-fill" id="ctrlProgressFill" style="width:0%"></div>
    </div>

    <div class="ctrl-sep"></div>

    <button class="ctrl-btn" id="nextBtn" onclick="nextPages()" disabled title="Next (→)">
      <i class="fas fa-chevron-right"></i>
    </button>

    <div class="ctrl-sep"></div>

    <button class="ctrl-btn" onclick="goToFirstPage()" title="First page">
      <i class="fas fa-step-backward"></i>
    </button>
    <button class="ctrl-btn" onclick="goToLastPage()" title="Last page">
      <i class="fas fa-step-forward"></i>
    </button>

    <div class="ctrl-sep"></div>

    <button class="ctrl-btn red-btn" onclick="goBack()" title="Back to details (Esc)">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <!-- KEYBOARD HINT -->
  <div class="hint-toast" id="hintToast">
    <span>← →</span> Turn pages &nbsp; <span>N</span> Night mode &nbsp; <span>F</span> Fullscreen &nbsp; <span>Esc</span> Exit
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const params  = new URLSearchParams(window.location.search);
    const bookId  = params.get('id');
    let pdfDoc    = null;
    let totalPg   = 0;
    let currentL  = 1;   // left page number currently showing
    let bookData  = null;
    let flipping  = false;
    let ctrlTimer;
    let stripTimer;
    let isNight   = false;

    // ── Init ─────────────────────────────────────────────
    async function init() {
      if (!bookId) { showErr('No book ID.'); return; }

      try {
        const res  = await fetch('books.json');
        const data = await res.json();
        bookData   = data.books.find(b => b.id === bookId);
        if (!bookData) { showErr('Book not found.'); return; }

        document.getElementById('topTitle').textContent    = bookData.title;
        document.getElementById('backToDetail').href       = `book-detail.html?id=${bookId}`;
        document.getElementById('switchToPdfBtn').href     = `pdf-reader.html?id=${bookId}`;
        document.title = bookData.title + ' – 3D Mode';

        await loadPDF(bookData.downloadUrl);
        showHint();
      } catch (e) {
        showErr('Load failed: ' + e.message);
      }
    }

    // ── PDF load ─────────────────────────────────────────
    function normalizeGithubUrl(url) {
      let u = url;
      try { u = decodeURIComponent(u); } catch(e) {}
      if (u.includes('github.com') && u.includes('/blob/')) {
        u = u.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
      } else if (u.includes('github.com') && !u.includes('/raw/')) {
        u = u.replace('/blob/', '/raw/');
      }
      return u;
    }

    async function tryLoadDoc(pdfUrl) {
      return pdfjsLib.getDocument({
        url: pdfUrl,
        cMapUrl:             'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
        cMapPacked:          true,
        standardFontDataUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/standard_fonts/',
        enableXfa:           true,
        disableFontFace:     false,
      }).promise;
    }

    let loadAttempts = [];
    let currentPdfUrl = '';
    let skipAdblockWarning = false;

    async function loadPDF(url, startFromIndex = 0) {
      const rawUrl = normalizeGithubUrl(url);
      currentPdfUrl = rawUrl;
      const isGithub = rawUrl.includes('githubusercontent.com') || rawUrl.includes('github.com');

      // Multiple fallback strategies: direct → CDN → CORS proxies
      loadAttempts = isGithub ? [
        { url: rawUrl, label: 'Direct GitHub' },
        { url: `https://cdn.jsdelivr.net/gh/${extractGithubPath(rawUrl)}`, label: 'jsDelivr CDN' },
        { url: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(rawUrl), label: 'AllOrigins Proxy' },
        { url: 'https://corsproxy.io/?' + encodeURIComponent(rawUrl), label: 'CORS Proxy' },
      ] : [{ url: rawUrl, label: 'Direct' }];

      let lastErr;
      for (let i = startFromIndex; i < loadAttempts.length; i++) {
        const attempt = loadAttempts[i];
        try {
          console.log(`[3D PDF Loader] Attempt ${i + 1}/${loadAttempts.length}: ${attempt.label}`);
          updateLoadingMsg(`Loading Book (${attempt.label})...`);
          
          pdfDoc = await tryLoadDoc(attempt.url);
          totalPg = pdfDoc.numPages;
          currentL = 1;
          await spread(currentL, false);
          document.getElementById('loadingCover').classList.add('done');
          console.log(`[3D PDF Loader] ✓ Success via ${attempt.label}`);
          return;
        } catch(e) { 
          console.warn(`[3D PDF Loader] ✗ Failed ${attempt.label}:`, e.message);
          lastErr = e;
          
          // Show AdBlocker warning on first attempt failure (Direct GitHub blocked)
          // Check for common AdBlocker/network error patterns
          const errStr = e.message || e.toString();
          const isBlocked = errStr.includes('ERR_BLOCKED_BY_CLIENT') || 
                           errStr.includes('net::ERR') || 
                           errStr.includes('Failed to fetch') ||
                           errStr.includes('NetworkError');
          
          if (i === 0 && !skipAdblockWarning && isGithub && isBlocked) {
            showAdblockNotification();
            throw new Error('AdBlocker_Detected'); // Stop here and wait for user action
          }
        }
      }
      
      // All attempts failed
      showErrWithDownload(rawUrl);
      throw lastErr;
    }

    // Extract GitHub path for jsDelivr CDN: user/repo@branch/path
    function extractGithubPath(url) {
      const match = url.match(/githubusercontent\.com\/([^\/]+)\/([^\/]+)\/([^\/]+)\/(.+)/);
      if (match) return `${match[1]}/${match[2]}@${match[3]}/${match[4]}`;
      return url;
    }

    // Update loading message
    function updateLoadingMsg(msg) {
      const loadEl = document.getElementById('loadingCover');
      if (loadEl && !loadEl.classList.contains('done')) {
        const pTag = loadEl.querySelector('p');
        if (pTag) pTag.textContent = msg;
      }
    }

    // ── Render two-page spread ────────────────────────────
    async function spread(leftNum, animate) {
      if (!pdfDoc) return;
      const rightNum = Math.min(leftNum + 1, totalPg);

      if (animate) {
        // Flip animation
        const rightPg = document.getElementById('rightPage');
        rightPg.classList.add('flipping-right');
        await delay(400); // Match new 0.8s animation midpoint
        rightPg.classList.remove('flipping-right');
      }

      await Promise.all([
        renderBookPage(leftNum,  'leftCanvas',  'leftRibbon'),
        renderBookPage(rightNum, 'rightCanvas', 'rightRibbon'),
      ]);

      updateUI(leftNum);
    }

    async function spreadBack(leftNum) {
      if (!pdfDoc) return;
      const rightNum = Math.min(leftNum + 1, totalPg);

      const leftPg = document.getElementById('leftPage');
      leftPg.classList.add('flipping-left');
      await delay(400); // Match new 0.8s animation midpoint
      leftPg.classList.remove('flipping-left');

      await Promise.all([
        renderBookPage(leftNum,  'leftCanvas',  'leftRibbon'),
        renderBookPage(rightNum, 'rightCanvas', 'rightRibbon'),
      ]);

      updateUI(leftNum);
    }

    // ── Render single page into a container ──────────────
    async function renderBookPage(pageNum, containerId, ribbonId) {
      if (pageNum > totalPg) {
        document.getElementById(containerId).innerHTML = '';
        document.getElementById(ribbonId).textContent  = '';
        return;
      }
      try {
        const page = await pdfDoc.getPage(pageNum);
        const container = document.getElementById(containerId);

        const cW = container.offsetWidth  || 480;
        const cH = container.offsetHeight || 680;
        const vp  = page.getViewport({scale:1});
        
        // ADAPTIVE SCALING: Prioritize width for better readability
        // Works perfectly for both A4 (1:1.41) and custom ratios (2:3)
        const pageRatio = vp.height / vp.width;
        const containerRatio = cH / cW;
        
        // Width-priority scaling for maximum text size
        const widthScale = (cW * 0.98) / vp.width;
        const heightScale = (cH * 0.98) / vp.height;
        
        // Use width scaling, but limit by height if page is extremely tall
        const sc = pageRatio > 1.6 ? Math.min(widthScale, heightScale) : widthScale;
        
        const scaled = page.getViewport({scale: sc});
        // MAXIMUM QUALITY: 4x DPI for ultra-sharp text rendering
        const dpr    = 4.0;

        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d', {alpha:false});
        canvas.width  = Math.floor(scaled.width  * dpr);
        canvas.height = Math.floor(scaled.height * dpr);
        canvas.style.width  = Math.floor(scaled.width)  + 'px';
        canvas.style.height = Math.floor(scaled.height) + 'px';
        // Maximum sharpness settings
        ctx.imageSmoothingEnabled = false; // Disable smoothing for crisp text
        ctx.imageSmoothingQuality = 'high';
        // Font rendering optimization
        ctx.textRendering = 'optimizeLegibility';

        await page.render({
          canvasContext: ctx,
          viewport:   scaled,
          transform:  dpr !== 1 ? [dpr,0,0,dpr,0,0] : null,
          intent:     'display',
        }).promise;

        container.innerHTML = '';
        container.appendChild(canvas);

        document.getElementById(ribbonId).textContent = pageNum;
      } catch (e) {
        console.error('Render error page', pageNum, e);
      }
    }

    // ── Render single page with animation ─────────────────
    async function renderPageTo(pageNum, pageId, ribbonId) {
      const page = document.getElementById(pageId);
      const canvasContainer = page.querySelector('.pg-canvas-wrap');
      
      // Add page turn animation
      page.classList.add('page-turning-single');
      
      // Wait for animation midpoint, then swap content
      await delay(375); // Match new 0.75s animation midpoint
      await renderBookPage(pageNum, canvasContainer.id, ribbonId);
      
      // Remove animation class after complete
      await delay(375);
      page.classList.remove('page-turning-single');
      
      updateUI(pageNum);
    }

    // ── Navigation ────────────────────────────────────────
    function nextPages() {
      const increment = isSinglePageMode ? 1 : 2;
      if (flipping || currentL + increment > totalPg) return;
      flipping = true;
      currentL += increment;
      if (isSinglePageMode) {
        renderPageTo(currentL, 'rightPage', 'rightRibbon').finally(() => { flipping = false; showCtrl(); });
      } else {
        spread(currentL, true).finally(() => { flipping = false; showCtrl(); });
      }
    }

    function prevPages() {
      const decrement = isSinglePageMode ? 1 : 2;
      if (flipping || currentL <= 1) return;
      flipping = true;
      currentL = Math.max(1, currentL - decrement);
      if (isSinglePageMode) {
        renderPageTo(currentL, 'rightPage', 'rightRibbon').finally(() => { flipping = false; showCtrl(); });
      } else {
        spreadBack(currentL).finally(() => { flipping = false; showCtrl(); });
      }
    }

    function goToFirstPage() {
      if (flipping) return;
      currentL = 1;
      spread(1, false);
      showCtrl();
    }

    function goToLastPage() {
      if (flipping) return;
      // Make it land on odd (left) page
      currentL = totalPg % 2 === 0 ? totalPg - 1 : totalPg;
      spread(currentL, false);
      showCtrl();
    }

    // ── Update UI ─────────────────────────────────────────
    function updateUI(leftNum) {
      const rightNum = Math.min(leftNum + 1, totalPg);
      let lbl;
      if (isSinglePageMode) {
        lbl = `${leftNum} / ${totalPg}`;
      } else {
        lbl = rightNum <= totalPg
          ? `${leftNum}–${rightNum} / ${totalPg}`
          : `${leftNum} / ${totalPg}`;
      }
      document.getElementById('ctrlPage').textContent   = lbl;
      document.getElementById('ctrlProgressFill').style.width = (leftNum / totalPg * 100) + '%';
      
      // Update button states based on mode
      if (isSinglePageMode) {
        document.getElementById('prevBtn').disabled = leftNum <= 1;
        document.getElementById('nextBtn').disabled = leftNum >= totalPg;
      } else {
        document.getElementById('prevBtn').disabled = leftNum <= 1;
        document.getElementById('nextBtn').disabled = leftNum + 2 > totalPg;
      }
    }

    // ── Controls auto-hide with smart behavior ────────────
    function showCtrl() {
      const ctrlBar = document.getElementById('ctrlBar');
      ctrlBar.classList.remove('hidden');
      clearTimeout(ctrlTimer);
      // Auto-hide after 4 seconds of inactivity
      ctrlTimer = setTimeout(() => ctrlBar.classList.add('hidden'), 4000);
    }
    function showStrip() {
      const strip = document.getElementById('topStrip');
      strip.classList.remove('hidden');
      clearTimeout(stripTimer);
      // Auto-hide after 4 seconds of inactivity
      stripTimer = setTimeout(() => strip.classList.add('hidden'), 4000);
    }

    // Show controls on mouse move or click
    document.addEventListener('mousemove', () => { showCtrl(); showStrip(); });
    document.addEventListener('click', () => { showCtrl(); showStrip(); });
    
    // Keep controls visible when hovering over them
    document.getElementById('ctrlBar').addEventListener('mouseenter', () => {
      clearTimeout(ctrlTimer);
    });
    document.getElementById('ctrlBar').addEventListener('mouseleave', () => {
      showCtrl(); // Restart auto-hide timer
    });
    
    document.getElementById('topStrip').addEventListener('mouseenter', () => {
      clearTimeout(stripTimer);
    });
    document.getElementById('topStrip').addEventListener('mouseleave', () => {
      showStrip(); // Restart auto-hide timer
    });
    
    // Init: show controls then hide
    showCtrl(); showStrip();

    // ── Night / Fullscreen / Back ─────────────────────────
    function toggleNight() {
      isNight = !isNight;
      document.body.classList.toggle('night', isNight);
    }
    
    // Reading mode toggle: single-page vs dual-page
    let isSinglePageMode = false;
    function toggleReadingMode() {
      isSinglePageMode = !isSinglePageMode;
      document.body.classList.toggle('single-page-mode', isSinglePageMode);
      
      const btn = document.getElementById('readingModeBtn');
      if (isSinglePageMode) {
        btn.innerHTML = '<i class="fas fa-book"></i> Single Page';
        // Re-render only right page with animation
        renderPageTo(currentL, 'rightPage', 'rightRibbon');
      } else {
        btn.innerHTML = '<i class="fas fa-book-open"></i> Dual Page';
        // Re-render both pages
        spread(currentL, false);
      }
    }
    
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen && document.exitFullscreen();
      }
    }
    function goBack() {
      window.location.href = `book-detail.html?id=${bookId}`;
    }

    // ── Keyboard ─────────────────────────────────────────
    document.addEventListener('keydown', e => {
      showCtrl(); showStrip();
      switch (e.key) {
        case 'ArrowLeft':  case 'ArrowUp':    prevPages(); break;
        case 'ArrowRight': case 'ArrowDown':  nextPages(); break;
        case ' ':   e.preventDefault(); nextPages(); break;
        case 'Escape': goBack(); break;
        case 'n': case 'N': toggleNight(); break;
        case 'f': case 'F': toggleFullscreen(); break;
      }
    });

    // ── Hint toast ────────────────────────────────────────
    function showHint() {
      const el = document.getElementById('hintToast');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    // ── Utilities ─────────────────────────────────────────
    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    function showErr(msg) {
      document.getElementById('loadingCover').innerHTML = `
        <i class="fas fa-exclamation-triangle" style="animation:none;color:var(--primary-red)"></i>
        <p>${msg}</p>
        <a href="book-detail.html?id=${bookId || ''}"
           style="padding:11px 22px;background:var(--primary-red);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;font-size:13px;">
          ← Go Back
        </a>`;
    }

    function showErrWithDownload(pdfUrl) {
      document.getElementById('loadingCover').innerHTML = `
        <i class="fas fa-exclamation-triangle" style="animation:none;color:var(--primary-red)"></i>
        <p style="font-size:15px;font-weight:600;margin-bottom:8px;">Unable to load PDF in 3D viewer</p>
        <small style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:16px;display:block;">Your browser or extensions may be blocking the PDF. Try disabling ad blockers.</small>
        <a href="${pdfUrl}" download style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--primary-red);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;font-size:13px;margin:8px;">
          <i class="fas fa-download"></i> Download PDF Instead
        </a>
        <a href="book-detail.html?id=${bookId || ''}" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);text-decoration:none;border-radius:10px;font-weight:700;font-size:13px;border:1px solid rgba(255,255,255,0.1);margin:8px;">
          <i class="fas fa-arrow-left"></i> Back to Book Details
        </a>
      `;
    }

    // AdBlocker notification functions
    function showAdblockNotification() {
      document.getElementById('adblockNotification').classList.add('active');
    }

    function closeAdblockNotif() {
      document.getElementById('adblockNotification').classList.remove('active');
    }

    function retryPDFLoad() {
      closeAdblockNotif();
      skipAdblockWarning = false;
      // Reset loading cover
      document.getElementById('loadingCover').classList.remove('done');
      document.getElementById('loadingCover').innerHTML = `
        <i class="fas fa-spinner"></i>
        <p>Retrying...</p>
        <small>Attempting to load PDF again</small>
      `;
      // Retry from beginning
      loadPDF(currentPdfUrl, 0).catch(e => {
        if (e.message !== 'AdBlocker_Detected') {
          console.error('Retry failed:', e);
        }
      });
    }

    function continueWithFallback() {
      closeAdblockNotif();
      skipAdblockWarning = true;
      // Reset loading cover
      document.getElementById('loadingCover').classList.remove('done');
      document.getElementById('loadingCover').innerHTML = `
        <i class="fas fa-spinner"></i>
        <p>Loading with backup method...</p>
        <small>Using alternative servers</small>
      `;
      // Continue from CDN fallback (skip Direct GitHub)
      loadPDF(currentPdfUrl, 1).catch(e => {
        console.error('Fallback failed:', e);
      });
    }

    // ── Swipe support ─────────────────────────────────────
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; });
    document.addEventListener('touchend',   e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 60) { dx < 0 ? nextPages() : prevPages(); }
    });

    document.addEventListener('DOMContentLoaded', init);
  </script>
  <script src="../../Optimization/fullscreen-init.js"></script>
</body>
</html>
