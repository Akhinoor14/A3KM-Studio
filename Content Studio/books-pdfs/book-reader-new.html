  <!-- Immediate Mobile Detection -->
  <script>
      (function() {
          function isMobile() {
              const ua = navigator.userAgent || '';
              return /android|iphone|ipad|ipod|iemobile|mobile/i.test(ua) || 
                     (navigator.userAgentData && navigator.userAgentData.mobile);
          }
          if (isMobile()) {
              const urlParams = new URLSearchParams(window.location.search);
              const id = urlParams.get('id');
              window.location.replace('../../mobile/content-studio/books-pdfs/book-reader.html' + (id ? '?id=' + id : ''));
          }
      })();
  </script>

  <style>
    :root {
      --primary-red: #CC0000;
      --dark-red: #8B0000;
      --light-red: #FF1744;
      --accent-red: #FF0000;
      --border-primary: rgba(139, 0, 0, 0.4);
      --border-strong: rgba(204, 0, 0, 0.8);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.85);
      --text-dim: rgba(255, 255, 255, 0.65);
      --bg-dark: #000000;
      --bg-card: rgba(15, 15, 15, 0.95);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      overflow-x: hidden;
      background: #000000;
      position: relative;
      padding-top: 85px;
      min-height: 100vh;
    }

    /* PREMIUM Engineering Grid Background - INTENSIFIED */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 0, 0, 0.1) 1px, transparent 1px),
        linear-gradient(0deg, rgba(139, 0, 0, 0.1) 1px, transparent 1px);
      background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.8;
    }

    /* Radial Gradient Overlay */
    body::after {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      right: -10%;
      bottom: -10%;
      background: radial-gradient(ellipse at 50% 20%, 
        rgba(204, 0, 0, 0.08) 0%, 
        transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body.night-mode {
      --bg-card: rgba(12, 12, 12, 0.98);
      background: #000000;
    }

    body.sepia-mode {
      --bg-card: rgba(245, 235, 220, 1);
      --text-white: #5c4a3a;
      --text-secondary: rgba(92, 74, 58, 0.8);
      --text-dim: rgba(92, 74, 58, 0.6);
      background: #f5e8d0;
    }

    .back-to-list {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 26px;
      background: linear-gradient(135deg, rgba(15, 15, 15, 0.95), rgba(10, 10, 10, 0.98));
      border: 2px solid var(--border-red);
      border-radius: 12px;
      color: var(--text-white);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(20px);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 var(--highlight-white),
        0 0 40px rgba(204, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
    }

    .back-to-list::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s;
    }

    .back-to-list:hover::before {
      left: 100%;
    }

    .back-to-list:hover {
      background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
      border-color: var(--light-red);
      transform: translateX(-4px);
      box-shadow: 
        0 12px 40px rgba(204, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 0 60px rgba(204, 0, 0, 0.4);
    }

    .reader-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 100px 20px 40px;
      position: relative;
      z-index: 1;
    }

    .book-header {
      text-align: center;
      margin-bottom: 30px;
      padding: 60px 30px 50px;
      background: linear-gradient(180deg, rgba(204, 0, 0, 0.08) 0%, transparent 100%);
      border-bottom: 2px solid var(--border-primary);
      border-radius: 0;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    /* Scan Line Animation */
    .book-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(204, 0, 0, 0.05), transparent);
      animation: scanLine 4s infinite linear;
    }

    @keyframes scanLine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .book-title-main {
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
      letter-spacing: -0.5px;
      text-shadow: 
        0 2px 10px rgba(0, 0, 0, 0.8),
        0 0 30px rgba(204, 0, 0, 0.4);
      line-height: 1.2;
    }

    .book-meta-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.9rem;
      color: var(--text-secondary);
      position: relative;
      z-index: 2;
    }

    .meta-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(20, 20, 20, 0.6);
      border: 1px solid var(--border-primary);
      border-radius: 10px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .meta-item-header:hover {
      border-color: var(--border-strong);
      background: rgba(204, 0, 0, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(204, 0, 0, 0.2);
    }

    .meta-item-header i {
      color: var(--primary-red);
      filter: drop-shadow(0 0 8px rgba(204, 0, 0, 0.6));
    }

    /* TOOLBAR - Premium Style */
    .toolbar {
      position: sticky;
      top: 85px;
      z-index: 100;
      background: linear-gradient(135deg, 
        rgba(20, 0, 0, 0.95) 0%, 
        rgba(10, 5, 5, 0.95) 50%,
        rgba(5, 0, 0, 0.95) 100%);
      border: 2px solid var(--border-primary);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
      backdrop-filter: blur(20px);
      box-shadow: 
        0 10px 35px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.02),
        0 0 50px rgba(139, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    /* Engineering Grid in Toolbar */
    .toolbar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 0, 0, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(139, 0, 0, 0.08) 1px, transparent 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
      pointer-events: none;
      opacity: 0.6;
      z-index: 0;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .tool-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, rgba(204, 0, 0, 0.15), rgba(139, 0, 0, 0.1));
      border: 2px solid var(--border-red);
      border-radius: 10px;
      color: var(--text-white);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 
        0 6px 20px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .tool-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.4s;
    }

    .tool-btn:hover::before {
      left: 100%;
    }

    .tool-btn:hover {
      background: linear-gradient(135deg, rgba(204, 0, 0, 0.3), rgba(139, 0, 0, 0.2));
      border-color: var(--border-red-hover);
      transform: translateY(-2px);
      box-shadow: 
        0 10px 30px rgba(204, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 0 40px rgba(204, 0, 0, 0.3);
    }

    .tool-btn:active {
      transform: scale(0.97);
    }

    .tool-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .tool-btn.active {
      background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
      border-color: var(--light-red);
      box-shadow: 
        0 8px 25px rgba(204, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 0 50px rgba(204, 0, 0, 0.4);
    }

    .zoom-display {
      padding: 10px 16px;
      background: linear-gradient(135deg, rgba(10, 10, 10, 0.9), rgba(0, 0, 0, 0.95));
      border: 2px solid var(--border-red);
      border-radius: 8px;
      font-weight: 800;
      color: var(--primary-red);
      min-width: 70px;
      text-align: center;
      box-shadow: 
        inset 0 2px 8px rgba(0, 0, 0, 0.6),
        0 4px 16px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.5px;
    }

    .page-input {
      width: 70px;
      padding: 10px 12px;
      background: linear-gradient(135deg, rgba(10, 10, 10, 0.9), rgba(0, 0, 0, 0.95));
      border: 2px solid var(--border-red);
      border-radius: 8px;
      color: var(--text-white);
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6);
    }

    .page-input:focus {
      outline: none;
      border-color: var(--light-red);
      box-shadow: 
        inset 0 2px 8px rgba(0, 0, 0, 0.6),
        0 0 20px rgba(204, 0, 0, 0.4);
    }

    .page-info {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 700;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    /* PDF VIEWER - Premium Container */
    .pdf-viewer {
      background: linear-gradient(135deg, 
        rgba(20, 0, 0, 0.95) 0%, 
        rgba(10, 5, 5, 0.95) 50%,
        rgba(5, 0, 0, 0.95) 100%);
      border: 2px solid var(--border-primary);
      border-radius: 20px;
      padding: 40px;
      min-height: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: 
        0 10px 35px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.02),
        0 0 50px rgba(139, 0, 0, 0.2);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    /* Engineering Grid Inside Viewer */
    .pdf-viewer::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 0, 0, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(139, 0, 0, 0.08) 1px, transparent 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
      pointer-events: none;
      opacity: 0.5;
      z-index: 0;
      0%, 100% { opacity: 0.3; border-color: rgba(255, 255, 255, 0.2); }
      50% { opacity: 1; border-color: var(--light-red); box-shadow: 0 0 30px rgba(204, 0, 0, 0.5); }
    }

    .canvas-container {
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 
        0 15px 50px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      overflow: hidden;
      margin: 0 auto;
      max-width: 100%;
      position: relative;
      z-index: 1;
      border: 2px solid var(--border-red);
    }

    body.night-mode .canvas-container {
      background: #1a1a1a;
      filter: invert(0.9) hue-rotate(180deg);
    }

    body.sepia-mode .canvas-container {
      background: #f5e8d0;
      filter: sepia(0.3);
    }

    /* FULLSCREEN MODE - Premium eBook Experience */
    body.pdf-fullscreen-mode {
      background: #000;
    }

    body.pdf-fullscreen-mode .content-wrapper {
      padding-top: 0;
    }

    body.pdf-fullscreen-mode .toolbar {
      border-radius: 0;
      border-left: none;
      border-right: none;
      top: 0;
    }

    body.pdf-fullscreen-mode .pdf-viewer {
      border-radius: 0;
      min-height: calc(100vh - 100px);
      padding: 20px;
    }

    body.pdf-fullscreen-mode .canvas-container {
      border-radius: 0;
      border: none;
      max-width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
    }

    body.pdf-fullscreen-mode #pdfCanvas {
      max-width: 100%;
      height: auto;
      image-rendering: crisp-edges;
      image-rendering: -webkit-optimize-contrast;
    }

    /* Canvas rendering optimization */
    #pdfCanvas {
      display: block;
      margin: 0 auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      image-rendering: optimizeQuality;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      -webkit-font-smoothing: subpixel-antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .canvas-container:hover {
      border-color: var(--border-strong);

    .loading-state {
      text-align: center;
      padding: 120px 20px;
      position: relative;
      z-index: 1;
    }

    .loading-state i {
      font-size: 56px;
      color: var(--primary-red);
      margin-bottom: 24px;
      animation: spin 2s linear infinite;
      filter: drop-shadow(0 0 20px rgba(204, 0, 0, 0.5));
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-state {
      text-align: center;
      padding: 120px 20px;
      color: var(--text-dim);
      position: relative;
      z-index: 1;
    }

    .error-state i {
      font-size: 72px;
      color: var(--primary-red);
      margin-bottom: 24px;
      animation: errorPulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(204, 0, 0, 0.6));
    }

    @keyframes errorPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .bookmarks-panel {
      position: fixed;
      top: 0;
      right: -340px;
      width: 340px;
      height: 100vh;
      background: linear-gradient(135deg, rgba(20, 20, 20, 0.98), rgba(10, 10, 10, 0.99));
      border-left: 3px solid var(--border-red);
      z-index: 999;
      transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      padding: 25px;
      backdrop-filter: blur(30px);
      box-shadow: 
        -15px 0 50px rgba(0, 0, 0, 0.7),
        inset 1px 0 0 var(--highlight-white);
    }

    .bookmarks-panel.active {
      right: 0;
    }

    .bookmarks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border-red);
    }

    .bookmarks-header h3 {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-white);
      letter-spacing: 0.5px;
    }

    .close-panel {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(204, 0, 0, 0.2), rgba(139, 0, 0, 0.15));
      border: 2px solid var(--border-red);
      border-radius: 50%;
      color: var(--text-white);
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .close-panel:hover {
      background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
      border-color: var(--light-red);
      transform: scale(1.1);
      box-shadow: 
        0 6px 20px rgba(204, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .bookmark-item {
      padding: 14px;
      background: linear-gradient(135deg, rgba(204, 0, 0, 0.12), rgba(139, 0, 0, 0.08));
      border: 2px solid var(--border-red);
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .bookmark-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, var(--light-red), var(--primary-red));
      transition: width 0.3s ease;
    }

    .bookmark-item:hover {
      background: linear-gradient(135deg, rgba(204, 0, 0, 0.25), rgba(139, 0, 0, 0.15));
      border-color: var(--light-red);
      transform: translateX(-6px);
      box-shadow: 
        0 8px 24px rgba(204, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .bookmark-item:hover::before {
      width: 8px;
    }

    .bookmark-page {
      font-size: 15px;
      font-weight: 800;
      color: var(--primary-red);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .bookmark-date {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 600;
    }

    .no-bookmarks {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-dim);
    }

    .download-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .download-modal.active {
      display: flex;
    }

    .download-content {
      background: linear-gradient(135deg, rgba(25, 25, 25, 0.98), rgba(15, 15, 15, 0.99));
      border: 3px solid var(--border-red);
      border-radius: 20px;
      padding: 40px;
      max-width: 450px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(30px);
      box-shadow: 
        0 25px 80px rgba(0, 0, 0, 0.8),
        inset 0 2px 0 var(--highlight-white),
        0 0 100px rgba(204, 0, 0, 0.3);
      position: relative;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .download-content::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 15px;
      width: 50px;
      height: 50px;
      border-top: 3px solid rgba(255, 255, 255, 0.2);
      border-left: 3px solid rgba(255, 255, 255, 0.2);
    }

    .download-content h3 {
      font-size: 28px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #FFFFFF, var(--primary-red));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
    }

    .download-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .download-option-btn {
      padding: 14px 20px;
      background: var(--primary-red);
      border: none;
      border-radius: 8px;
      color: var(--text-white);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .download-option-btn:hover {
      background: var(--dark-red);
      transform: translateY(-2px);
    }

    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(204, 0, 0, 0.2);
      z-index: 101;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-red) 0%, var(--light-red) 100%);
      transition: width 0.3s ease;
    }

    @media (max-width: 768px) {
      .back-to-list {
        top: 10px;
        left: 10px;
        padding: 10px 14px;
        font-size: 12px;
      }

      .reader-container {
        padding: 70px 10px 20px;
      }

      .book-title-main {
        font-size: 24px;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar-group {
        width: 100%;
        justify-content: space-between;
      }

      .pdf-viewer {
        padding: 15px;
      }

      .bookmarks-panel {
        width: 280px;
      }
    }
  </style>
</head>
<body>

  <div class="background-system"></div>
  
  <a href="book-listing-new.html" class="back-to-list">
    <i class="fas fa-arrow-left"></i>
    Back to Library
  </a>

  <div class="reader-container">
    <div class="book-header" id="bookHeader">
      <!-- Book info will be loaded here -->
    </div>

    <div class="toolbar">
      <div class="toolbar-group">
        <button class="tool-btn" id="prevPage" onclick="changePage(-1)">
          <i class="fas fa-chevron-left"></i>
          Previous
        </button>
        <input type="number" class="page-input" id="pageInput" min="1" onchange="goToPage()">
        <span class="page-info">/ <span id="totalPages">0</span></span>
        <button class="tool-btn" id="nextPage" onclick="changePage(1)">
          Next
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>

      <div class="toolbar-group">
        <button class="tool-btn" onclick="zoomOut()">
          <i class="fas fa-search-minus"></i>
        </button>
        <span class="zoom-display" id="zoomDisplay">100%</span>
        <button class="tool-btn" onclick="zoomIn()">
          <i class="fas fa-search-plus"></i>
        </button>
        <button class="tool-btn" onclick="resetZoom()">
          <i class="fas fa-expand-arrows-alt"></i>
        </button>
      </div>

      <div class="toolbar-group">
        <button class="tool-btn" onclick="toggleNightMode()">
          <i class="fas fa-moon"></i>
          Night
        </button>
        <button class="tool-btn" onclick="toggleSepiaMode()">
          <i class="fas fa-sun"></i>
          Sepia
        </button>
        <button class="tool-btn" onclick="toggleBookmarks()">
          <i class="fas fa-bookmark"></i>
          Bookmarks
        </button>
        <button class="tool-btn" onclick="addBookmark()">
          <i class="fas fa-plus"></i>
          Add
        </button>
      </div>

      <div class="toolbar-group">
        <button class="tool-btn" onclick="toggleFullscreen()">
          <i class="fas fa-expand"></i>
          Fullscreen
        </button>
        <button class="tool-btn" onclick="showDownloadOptions()">
          <i class="fas fa-download"></i>
          Download
        </button>
        <button class="tool-btn" onclick="printPDF()">
          <i class="fas fa-print"></i>
          Print
        </button>
      </div>
    </div>

    <div class="pdf-viewer" id="pdfViewer">
      <div class="loading-state">
        <i class="fas fa-spinner"></i>
        <p>Loading PDF...</p>
      </div>
    </div>
  </div>

  <div class="bookmarks-panel" id="bookmarksPanel">
    <div class="bookmarks-header">
      <h3><i class="fas fa-bookmark"></i> Bookmarks</h3>
      <button class="close-panel" onclick="toggleBookmarks()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div id="bookmarksList"></div>
  </div>

  <div class="download-modal" id="downloadModal">
    <div class="download-content">
      <h3><i class="fas fa-download"></i> Download Options</h3>
      <p style="color: var(--text-secondary); margin-top: 12px;">Choose how you want to download this book</p>
      <div class="download-options">
        <button class="download-option-btn" onclick="downloadFullPDF()">
          <i class="fas fa-file-pdf"></i> Download Full PDF
        </button>
        <button class="download-option-btn" onclick="downloadCurrentPage()">
          <i class="fas fa-file-image"></i> Download Current Page
        </button>
        <button class="download-option-btn" onclick="closeDownloadModal()">
          <i class="fas fa-times"></i> Cancel
        </button>
      </div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <script>
    // PDF.js configuration
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let currentZoom = 1.0;
    let currentBookId = '';
    let currentBookData = null;
    let bookmarks = [];

    // Load book from URL parameter
    async function loadBook() {
      const urlParams = new URLSearchParams(window.location.search);
      currentBookId = urlParams.get('id');

      if (!currentBookId) {
        showError('No book ID provided');
        return;
      }

      try {
        const response = await fetch('books.json');
        const data = await response.json();
        currentBookData = data.books.find(book => book.id === currentBookId);

        if (!currentBookData) {
          showError('Book not found');
          return;
        }

        displayBookInfo();
        await loadPDF(currentBookData.downloadUrl);
        loadBookmarks();
      } catch (error) {
        console.error('Error loading book:', error);
        showError('Error loading book');
      }
    }

    function displayBookInfo() {
      const header = document.getElementById('bookHeader');
      const languageName = currentBookData.language === 'bn' ? 'বাংলা' : 'English';
      
      header.innerHTML = `
        <h1 class="book-title-main">${currentBookData.title}</h1>
        <div class="book-meta-info">
          <span class="meta-item-header">
            <i class="fas fa-user"></i>
            ${currentBookData.author}
          </span>
          <span class="meta-item-header">
            <i class="fas fa-file-pdf"></i>
            ${currentBookData.pages} pages
          </span>
          <span class="meta-item-header">
            <i class="fas fa-hdd"></i>
            ${currentBookData.size}
          </span>
          <span class="meta-item-header">
            <i class="fas fa-language"></i>
            ${languageName}
          </span>
          <span class="meta-item-header">
            <i class="fas fa-tag"></i>
            ${currentBookData.category}
          </span>
        </div>
      `;
    }

    async function loadPDF(url) {
      try {
        // Normalize URL - handle both local and GitHub URLs
        let pdfUrl = url;
        
        // If it's a local path, make it relative to current location
        if (!pdfUrl.startsWith('http') && !pdfUrl.startsWith('//')) {
          // Local path - ensure it's properly formatted
          if (pdfUrl.startsWith('./') || pdfUrl.startsWith('../')) {
            // Already relative
          } else if (pdfUrl.startsWith('/')) {
            // Absolute from root - make relative
            pdfUrl = '../..' + pdfUrl;
          } else {
            // No leading slash - assume Content Storage path
            pdfUrl = '../../Content Storage/' + pdfUrl;
          }
        }
        
        // For GitHub raw URLs, ensure proper format
        if (pdfUrl.includes('github.com') && !pdfUrl.includes('/raw/')) {
          pdfUrl = pdfUrl.replace('/blob/', '/raw/');
        }
        
        console.log('Loading PDF from:', pdfUrl);
        
        // Load PDF with proper configuration
        const loadingTask = pdfjsLib.getDocument({
          url: pdfUrl,
          cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
          cMapPacked: true,
          enableXfa: true,
          // Add CORS mode
          httpHeaders: {},
          withCredentials: false
        });
        
        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;
        document.getElementById('totalPages').textContent = totalPages;
        document.getElementById('pageInput').max = totalPages;
        await renderPage(1);
        
        console.log('PDF loaded successfully:', totalPages, 'pages');
      } catch (error) {
        console.error('Error loading PDF:', error);
        console.error('PDF URL:', url);
        console.error('Normalized URL:', pdfUrl);
        showError(`Failed to load PDF file: ${error.message || 'Unknown error'}`);
      }
    }

    async function renderPage(pageNum) {
      if (!pdfDoc) return;

      currentPage = pageNum;
      document.getElementById('pageInput').value = currentPage;
      updateProgress();

      try {
        const page = await pdfDoc.getPage(pageNum);
        
        // Calculate optimal viewport with HIGH DPI for crystal clear text
        const desiredWidth = Math.min(window.innerWidth * 0.85, 1200);
        const viewport = page.getViewport({ scale: 1.0 });
        const scale = (desiredWidth / viewport.width) * currentZoom;
        const scaledViewport = page.getViewport({ scale: scale });
        
        // Use device pixel ratio for crisp rendering
        const outputScale = window.devicePixelRatio || 2;
        
        const canvas = document.createElement('canvas');
        canvas.id = 'pdfCanvas';
        const context = canvas.getContext('2d', { alpha: false });
        
        // Set canvas size with HIGH resolution for sharp text
        canvas.width = Math.floor(scaledViewport.width * outputScale);
        canvas.height = Math.floor(scaledViewport.height * outputScale);
        canvas.style.width = Math.floor(scaledViewport.width) + 'px';
        canvas.style.height = Math.floor(scaledViewport.height) + 'px';

        // Configure context for CRISP rendering
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = 'high';
        
        const transform = outputScale !== 1 
          ? [outputScale, 0, 0, outputScale, 0, 0] 
          : null;

        const renderContext = {
          canvasContext: context,
          viewport: scaledViewport,
          transform: transform,
          enableWebGL: true
        };

        // Clear viewer and add canvas
        document.getElementById('pdfViewer').innerHTML = `
          <div class="canvas-container">
            ${canvas.outerHTML}
          </div>
        `;

        // Render with HIGH QUALITY settings
        const canvasElement = document.getElementById('pdfCanvas');
        const renderTask = page.render({
          canvasContext: canvasElement.getContext('2d', { alpha: false }),
          viewport: scaledViewport,
          transform: transform
        });
        
        await renderTask.promise;

        updateNavigationButtons();
        
        console.log(`📄 Page ${currentPage} rendered at ${Math.round(scale * 100)}% (${outputScale}x DPI)`);
      } catch (error) {
        console.error('Error rendering page:', error);
        showError('Failed to render PDF page');
      }
    }

    function changePage(delta) {
      const newPage = currentPage + delta;
      if (newPage >= 1 && newPage <= totalPages) {
        // Smooth page transition
        const viewer = document.getElementById('pdfViewer');
        viewer.style.opacity = '0.5';
        viewer.style.transform = 'scale(0.98)';
        
        setTimeout(() => {
          renderPage(newPage);
          setTimeout(() => {
            viewer.style.opacity = '1';
            viewer.style.transform = 'scale(1)';
          }, 100);
        }, 150);
        
        console.log(`📄 Page ${currentPage} → ${newPage}`);
      }
    }

    function goToPage() {
      const pageNum = parseInt(document.getElementById('pageInput').value);
      if (pageNum >= 1 && pageNum <= totalPages) {
        changePage(pageNum - currentPage);
      }
    }

    function updateNavigationButtons() {
      document.getElementById('prevPage').disabled = currentPage <= 1;
      document.getElementById('nextPage').disabled = currentPage >= totalPages;
    }

    function updateProgress() {
      const progress = (currentPage / totalPages) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
    }

    function zoomIn() {
      currentZoom = Math.min(currentZoom + 0.2, 4.0); // Max 400%
      document.getElementById('zoomDisplay').textContent = Math.round(currentZoom * 100) + '%';
      renderPage(currentPage);
      console.log(`🔍 Zoom: ${Math.round(currentZoom * 100)}%`);
    }

    function zoomOut() {
      currentZoom = Math.max(currentZoom - 0.2, 0.4); // Min 40%
      document.getElementById('zoomDisplay').textContent = Math.round(currentZoom * 100) + '%';
      renderPage(currentPage);
      console.log(`🔍 Zoom: ${Math.round(currentZoom * 100)}%`);
    }

    function resetZoom() {
      currentZoom = 1.0;
      document.getElementById('zoomDisplay').textContent = '100%';
      renderPage(currentPage);
      console.log('🔍 Zoom reset to 100%');
    }

    function toggleNightMode() {
      document.body.classList.remove('sepia-mode');
      document.body.classList.toggle('night-mode');
    }

    function toggleSepiaMode() {
      document.body.classList.remove('night-mode');
      document.body.classList.toggle('sepia-mode');
    }

    function toggleBookmarks() {
      document.getElementById('bookmarksPanel').classList.toggle('active');
    }

    function addBookmark() {
      const bookmark = {
        page: currentPage,
        date: new Date().toLocaleString(),
        bookId: currentBookId
      };
      
      bookmarks.push(bookmark);
      saveBookmarks();
      displayBookmarks();
      
      // Show notification
      alert(`Bookmark added for page ${currentPage}`);
    }

    function loadBookmarks() {
      const saved = localStorage.getItem('book-bookmarks-' + currentBookId);
      bookmarks = saved ? JSON.parse(saved) : [];
      displayBookmarks();
    }

    function saveBookmarks() {
      localStorage.setItem('book-bookmarks-' + currentBookId, JSON.stringify(bookmarks));
    }

    function displayBookmarks() {
      const container = document.getElementById('bookmarksList');
      
      if (bookmarks.length === 0) {
        container.innerHTML = '<div class="no-bookmarks"><p>No bookmarks yet</p></div>';
        return;
      }

      container.innerHTML = bookmarks.map((bookmark, index) => `
        <div class="bookmark-item" onclick="goToBookmark(${bookmark.page})">
          <div class="bookmark-page">Page ${bookmark.page}</div>
          <div class="bookmark-date">${bookmark.date}</div>
        </div>
      `).join('');
    }

    function goToBookmark(page) {
      renderPage(page);
      toggleBookmarks();
    }

    // ENHANCED FULLSCREEN with eBook mode
    function toggleFullscreen() {
      const elem = document.documentElement;
      
      if (!document.fullscreenElement && 
          !document.webkitFullscreenElement && 
          !document.mozFullScreenElement && 
          !document.msFullscreenElement) {
        // Enter fullscreen
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        } else if (elem.mozRequestFullScreen) {
          elem.mozRequestFullScreen();
        } else if (elem.msRequestFullscreen) {
          elem.msRequestFullscreen();
        }
        
        // Add fullscreen class for styling
        document.body.classList.add('pdf-fullscreen-mode');
        
        // Re-render page for optimal fullscreen size
        setTimeout(() => renderPage(currentPage), 100);
        
        console.log('📺 Fullscreen mode activated');
      } else {
        // Exit fullscreen
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
        
        document.body.classList.remove('pdf-fullscreen-mode');
        
        // Re-render page for normal size
        setTimeout(() => renderPage(currentPage), 100);
        
        console.log('📺 Fullscreen mode deactivated');
      }
    }
    
    // Listen for fullscreen changes
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    document.addEventListener('mozfullscreenchange', handleFullscreenChange);
    document.addEventListener('MSFullscreenChange', handleFullscreenChange);
    
    function handleFullscreenChange() {
      if (!document.fullscreenElement && 
          !document.webkitFullscreenElement && 
          !document.mozFullScreenElement && 
          !document.msFullscreenElement) {
        document.body.classList.remove('pdf-fullscreen-mode');
      }
    }

    function showDownloadOptions() {
      document.getElementById('downloadModal').classList.add('active');
    }

    function closeDownloadModal() {
      document.getElementById('downloadModal').classList.remove('active');
    }

    function downloadFullPDF() {
      window.open(currentBookData.downloadUrl, '_blank');
      closeDownloadModal();
    }

    async function downloadCurrentPage() {
      const canvas = document.getElementById('pdfCanvas');
      const link = document.createElement('a');
      link.download = `${currentBookData.title.replace(/[^a-z0-9]/gi, '-')}-page-${currentPage}.png`;
      link.href = canvas.toDataURL();
      link.click();
      closeDownloadModal();
    }

    function printPDF() {
      window.print();
    }

    function showError(message) {
      document.getElementById('pdfViewer').innerHTML = `
        <div class="error-state">
          <i class="fas fa-exclamation-triangle"></i>
          <p>${message}</p>
        </div>
      `;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') changePage(-1);
      if (e.key === 'ArrowRight') changePage(1);
      if (e.key === '+' || e.key === '=') zoomIn();
      if (e.key === '-') zoomOut();
      if (e.key === '0') resetZoom();
      if (e.key === 'f' || e.key === 'F') toggleFullscreen();
      if (e.key === 'b' || e.key === 'B') addBookmark();
    });

    // Load book on page load
    document.addEventListener('DOMContentLoaded', loadBook);

    // Background system
    if (typeof BackgroundSystem !== 'undefined') {
      const bg = new BackgroundSystem();
      bg.init();
    }
  </script>

  <script>
    (function() {
      window.addEventListener('scroll', function() {
        const navbar = document.getElementById('desktopNavbar');
        if (navbar) {
          if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
          } else {
            navbar.classList.remove('scrolled');
          }
        }
      });
    })();
  </script>
