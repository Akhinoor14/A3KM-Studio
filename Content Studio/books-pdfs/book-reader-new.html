<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- Immediate Mobile Detection -->
  <script>
      (function() {
          function isMobile() {
              const ua = navigator.userAgent || '';
              return /android|iphone|ipad|ipod|iemobile|mobile/i.test(ua) || 
                     (navigator.userAgentData && navigator.userAgentData.mobile);
          }
          if (isMobile()) {
              const urlParams = new URLSearchParams(window.location.search);
              const id = urlParams.get('id');
              window.location.replace('../../mobile/content-studio/books-pdfs/book-reader.html' + (id ? '?id=' + id : ''));
          }
      })();
  </script>
  
  <title>eBook Reader - Md Akhinoor Islam</title>
  <link rel="icon" href="../../images/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../../Optimization/styles.css" />
  <link rel="stylesheet" href="../../Optimization/Background/background-system.css" />
  <link rel="stylesheet" href="../../Optimization/navbar-autohide.css">
  <link rel="stylesheet" href="../../Optimization/navbar/desktop-navbar.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <meta name="theme-color" content="#CC0000" />
  
  <style>
    :root {
      --primary-red: #CC0000;
      --dark-red: #8B0000;
      --light-red: #FF1744;
      --accent-red: #FF0000;
      --border-primary: rgba(139, 0, 0, 0.4);
      --border-strong: rgba(204, 0, 0, 0.8);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.85);
      --text-dim: rgba(255, 255, 255, 0.65);
      --bg-dark: #000000;
      --bg-card: rgba(15, 15, 15, 0.95);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      overflow-x: hidden;
      background: #000000;
      position: relative;
      padding-top: 85px;
      min-height: 100vh;
    }

    /* PREMIUM Engineering Grid Background - INTENSIFIED */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 0, 0, 0.1) 1px, transparent 1px),
        linear-gradient(0deg, rgba(139, 0, 0, 0.1) 1px, transparent 1px);
      background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.8;
    }

    /* Radial Gradient Overlay */
    body::after {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      right: -10%;
      bottom: -10%;
      background: radial-gradient(ellipse at 50% 20%, 
        rgba(204, 0, 0, 0.08) 0%, 
        transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body.night-mode {
      --bg-card: rgba(12, 12, 12, 0.98);
      background: #000000;
    }

    body.sepia-mode {
      --bg-card: rgba(245, 235, 220, 1);
      --text-white: #5c4a3a;
      --text-secondary: rgba(92, 74, 58, 0.8);
      --text-dim: rgba(92, 74, 58, 0.6);
      background: #f5e8d0;
    }

    .back-to-list {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 26px;
      background: linear-gradient(135deg, rgba(15, 15, 15, 0.95), rgba(10, 10, 10, 0.98));
      border: 2px solid var(--border-red);
      border-radius: 12px;
      color: var(--text-white);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(20px);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 var(--highlight-white),
        0 0 40px rgba(204, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
    }

    .back-to-list::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s;
    }

    .back-to-list:hover::before {
      left: 100%;
    }

    .back-to-list:hover {
      background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
      border-color: var(--light-red);
      transform: translateX(-4px);
      box-shadow: 
        0 12px 40px rgba(204, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 0 60px rgba(204, 0, 0, 0.4);
    }

    .reader-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 100px 20px 40px;
      position: relative;
      z-index: 1;
    }

    .book-header {
      text-align: center;
      margin-bottom: 40px;
      padding: 50px 40px 40px;
      background: linear-gradient(180deg, rgba(204, 0, 0, 0.1) 0%, rgba(139, 0, 0, 0.05) 50%, transparent 100%);
      border-bottom: 3px solid var(--border-primary);
      border-radius: 0;
      position: relative;
      overflow: hidden;
      z-index: 1;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    /* Scan Line Animation */
    .book-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(204, 0, 0, 0.05), transparent);
      animation: scanLine 4s infinite linear;
    }

    @keyframes scanLine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .book-title-main {
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
      letter-spacing: -0.5px;
      text-shadow: 
        0 2px 10px rgba(0, 0, 0, 0.8),
        0 0 30px rgba(204, 0, 0, 0.4);
      line-height: 1.2;
    }

    .book-meta-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.9rem;
      color: var(--text-secondary);
      position: relative;
      z-index: 2;
    }

    .meta-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(20, 20, 20, 0.6);
      border: 1px solid var(--border-primary);
      border-radius: 10px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .meta-item-header:hover {
      border-color: var(--border-strong);
      background: rgba(204, 0, 0, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(204, 0, 0, 0.2);
    }

    .meta-item-header i {
      color: var(--primary-red);
      filter: drop-shadow(0 0 8px rgba(204, 0, 0, 0.6));
    }

    /* TOOLBAR - Premium Style */
    .toolbar {
      position: sticky;
      top: 85px;
      z-index: 100;
      background: linear-gradient(135deg, 
        rgba(20, 0, 0, 0.98) 0%, 
        rgba(10, 5, 5, 0.98) 50%,
        rgba(5, 0, 0, 0.98) 100%);
      border: 2px solid var(--border-primary);
      border-radius: 16px;
      padding: 18px 25px;
      margin-bottom: 35px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 
        0 10px 35px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.02),
        0 0 50px rgba(139, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    /* Engineering Grid in Toolbar */
    .toolbar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 0, 0, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(139, 0, 0, 0.08) 1px, transparent 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
      pointer-events: none;
      opacity: 0.6;
      z-index: 0;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
    }

    .tool-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, rgba(204, 0, 0, 0.15), rgba(139, 0, 0, 0.1));
      border: 2px solid var(--border-red);
      border-radius: 10px;
      color: var(--text-white);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 
        0 6px 20px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .tool-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.4s;
    }

    .tool-btn:hover::before {
      left: 100%;
    }

    .tool-btn:hover {
      background: linear-gradient(135deg, rgba(204, 0, 0, 0.3), rgba(139, 0, 0, 0.2));
      border-color: var(--border-red-hover);
      transform: translateY(-2px);
      box-shadow: 
        0 10px 30px rgba(204, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 0 40px rgba(204, 0, 0, 0.3);
    }

    .tool-btn:active {
      transform: scale(0.97);
    }

    .tool-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .tool-btn.active {
      background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
      border-color: var(--light-red);
      box-shadow: 
        0 8px 25px rgba(204, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 0 50px rgba(204, 0, 0, 0.4);
    }

    .zoom-display {
      padding: 10px 16px;
      background: linear-gradient(135deg, rgba(10, 10, 10, 0.9), rgba(0, 0, 0, 0.95));
      border: 2px solid var(--border-red);
      border-radius: 8px;
      font-weight: 800;
      color: var(--primary-red);
      min-width: 70px;
      text-align: center;
      box-shadow: 
        inset 0 2px 8px rgba(0, 0, 0, 0.6),
        0 4px 16px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.5px;
    }

    .page-input {
      width: 70px;
      padding: 10px 12px;
      background: linear-gradient(135deg, rgba(10, 10, 10, 0.9), rgba(0, 0, 0, 0.95));
      border: 2px solid var(--border-red);
      border-radius: 8px;
      color: var(--text-white);
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6);
    }

    .page-input:focus {
      outline: none;
      border-color: var(--light-red);
      box-shadow: 
        inset 0 2px 8px rgba(0, 0, 0, 0.6),
        0 0 20px rgba(204, 0, 0, 0.4);
    }

    .page-info {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 700;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    /* PDF VIEWER - Premium Container */
    .pdf-viewer {
      background: linear-gradient(135deg, 
        rgba(20, 0, 0, 0.95) 0%, 
        rgba(10, 5, 5, 0.95) 50%,
        rgba(5, 0, 0, 0.95) 100%);
      border: 2px solid var(--border-primary);
      border-radius: 20px;
      padding: 40px;
      min-height: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: 
        0 10px 35px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.02),
        0 0 50px rgba(139, 0, 0, 0.2);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    /* Engineering Grid Inside Viewer */
    .pdf-viewer::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 0, 0, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(139, 0, 0, 0.08) 1px, transparent 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
      pointer-events: none;
      opacity: 0.5;
      z-index: 0;
      0%, 100% { opacity: 0.3; border-color: rgba(255, 255, 255, 0.2); }
      50% { opacity: 1; border-color: var(--light-red); box-shadow: 0 0 30px rgba(204, 0, 0, 0.5); }
    }

    .canvas-container {
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 
        0 15px 50px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      overflow: hidden;
      margin: 0 auto;
      max-width: 100%;
      position: relative;
      z-index: 1;
      border: 2px solid var(--border-red);
    }

    /* TEXT LAYER - Crystal Clear Selectable Text (Like Edge) */
    .textLayer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      opacity: 1;
      line-height: 1.0;
      text-align: initial;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .textLayer > span {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
    }

    .textLayer ::selection {
      background: rgba(204, 0, 0, 0.3);
    }

    .textLayer ::-moz-selection {
      background: rgba(204, 0, 0, 0.3);
    }

    body.night-mode .canvas-container {
      background: #1a1a1a;
      filter: invert(0.9) hue-rotate(180deg);
    }

    body.sepia-mode .canvas-container {
      background: #f5e8d0;
      filter: sepia(0.3);
    }

    /* FULLSCREEN MODE - Premium eBook Experience */
    body.pdf-fullscreen-mode {
      background: #000;
    }

    body.pdf-fullscreen-mode .content-wrapper {
      padding-top: 0;
    }

    body.pdf-fullscreen-mode .toolbar {
      border-radius: 0;
      border-left: none;
      border-right: none;
      top: 0;
    }

    body.pdf-fullscreen-mode .pdf-viewer {
      border-radius: 0;
      min-height: calc(100vh - 100px);
      padding: 20px;
    }

    body.pdf-fullscreen-mode .canvas-container {
      border-radius: 0;
      border: none;
      max-width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
    }

    body.pdf-fullscreen-mode #pdfCanvas {
      max-width: 100%;
      height: auto;
      image-rendering: crisp-edges;
      image-rendering: -webkit-optimize-contrast;
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* 📖 PREMIUM BOOK MODE - Realistic Reading Experience                     */
    /* ═══════════════════════════════════════════════════════════════════════ */
    
    body.book-mode {
      background: #2a2a2a;
      overflow: hidden;
    }

    body.book-mode .desktop-navbar,
    body.book-mode .back-to-list,
    body.book-mode .book-header,
    body.book-mode .toolbar,
    body.book-mode .progress-bar {
      display: none !important;
    }

    body.book-mode .reader-container {
      padding: 0;
      margin: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a2a2a;
    }

    body.book-mode .content-wrapper {
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body.book-mode .pdf-viewer {
      padding: 0;
      margin: 0;
      border-radius: 0;
      background: transparent;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 2000px;
    }

    /* Book Container - The Open Book */
    .book-container {
      display: none;
      position: relative;
      width: 90vw;
      max-width: 1400px;
      height: 85vh;
      transform-style: preserve-3d;
    }

    body.book-mode .book-container {
      display: flex;
      gap: 0;
      justify-content: center;
      align-items: center;
    }

    /* Two-Page Spread */
    .book-page {
      position: relative;
      width: 48%;
      height: 100%;
      background: #fefefe;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .book-page.left-page {
      transform-origin: right center;
      border-radius: 8px 0 0 8px;
      box-shadow: 
        inset -20px 0 30px rgba(0, 0, 0, 0.1),
        0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .book-page.right-page {
      transform-origin: left center;
      border-radius: 0 8px 8px 0;
      box-shadow: 
        inset 20px 0 30px rgba(0, 0, 0, 0.1),
        0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* Book Spine Shadow */
    .book-spine {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(0, 0, 0, 0.3) 20%,
        rgba(0, 0, 0, 0.4) 50%,
        rgba(0, 0, 0, 0.3) 80%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Page Content */
    .book-page .canvas-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fefefe;
      border-radius: inherit;
      overflow: hidden;
    }

    .book-page canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto !important;
      height: auto !important;
      object-fit: contain;
    }

    /* Page Flip Animation */
    .book-page.flipping-left {
      animation: flipLeft 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .book-page.flipping-right {
      animation: flipRight 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes flipLeft {
      0% {
        transform: rotateY(0deg);
      }
      100% {
        transform: rotateY(-180deg);
      }
    }

    @keyframes flipRight {
      0% {
        transform: rotateY(0deg);
      }
      100% {
        transform: rotateY(180deg);
      }
    }

    /* Page Curl Effect on Hover */
    .book-page::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 0;
      height: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(0, 0, 0, 0.1) 100%);
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .book-page.right-page::after {
      right: 0;
      border-radius: 0 0 0 100%;
    }

    .book-page.left-page::after {
      left: 0;
      border-radius: 0 0 100% 0;
    }

    .book-page:hover::after {
      width: 80px;
      height: 80px;
    }

    /* Floating Book Mode Controls */
    .book-mode-controls {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(204, 0, 0, 0.3);
      border-radius: 50px;
      padding: 15px 30px;
      z-index: 1000;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    }

    body.book-mode .book-mode-controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .book-mode-controls.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(20px);
    }

    .book-control-group {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 15px;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .book-control-group:last-child {
      border-right: none;
    }

    .book-control-btn {
      background: rgba(204, 0, 0, 0.2);
      border: 1px solid rgba(204, 0, 0, 0.3);
      color: #fff;
      padding: 10px 18px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .book-control-btn:hover {
      background: var(--primary-red);

    // PDF.js configuration
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let currentZoom = 1.0;
    let currentBookId = '';
    let currentBookData = null;
    let bookmarks = [];

    // Load book from URL parameter
    async function loadBook() {
      const urlParams = new URLSearchParams(window.location.search);
      currentBookId = urlParams.get('id');

      if (!currentBookId) {
        showError('No book ID provided');
        return;
      }

      try {
        const response = await fetch('books.json');
        const data = await response.json();
        currentBookData = data.books.find(book => book.id === currentBookId);

        if (!currentBookData) {
          showError('Book not found');
          return;
        }

        displayBookInfo();
        await loadPDF(currentBookData.downloadUrl);
        loadBookmarks();
      } catch (error) {
        console.error('Error loading book:', error);
        showError('Error loading book');
      }
    }

    function displayBookInfo() {
      const header = document.getElementById('bookHeader');
      const languageName = currentBookData.language === 'bn' ? 'বাংলা' : 'English';
      
      header.innerHTML = `
        <h1 class="book-title-main">${currentBookData.title}</h1>
        <div class="book-meta-info">
          <span class="meta-item-header">
            <i class="fas fa-user"></i>
            ${currentBookData.author}
          </span>
          <span class="meta-item-header">
            <i class="fas fa-file-pdf"></i>
            ${currentBookData.pages} pages
          </span>
          <span class="meta-item-header">
            <i class="fas fa-hdd"></i>
            ${currentBookData.size}
          </span>
          <span class="meta-item-header">
            <i class="fas fa-language"></i>
            ${languageName}
          </span>
          <span class="meta-item-header">
            <i class="fas fa-tag"></i>
            ${currentBookData.category}
          </span>
        </div>
      `;
    }

    async function loadPDF(url) {
      try {
        // Normalize URL - handle both local and GitHub URLs
        let pdfUrl = url;
        
        // If it's a local path, make it relative to current location
        if (!pdfUrl.startsWith('http') && !pdfUrl.startsWith('//')) {
          // Local path - ensure it's properly formatted
          if (pdfUrl.startsWith('./') || pdfUrl.startsWith('../')) {
            // Already relative
          } else if (pdfUrl.startsWith('/')) {
            // Absolute from root - make relative
            pdfUrl = '../..' + pdfUrl;
          } else {
            // No leading slash - assume Content Storage path
            pdfUrl = '../../Content Storage/' + pdfUrl;
          }
        }
        
        // For GitHub raw URLs, ensure proper format
        if (pdfUrl.includes('github.com') && !pdfUrl.includes('/raw/')) {
          pdfUrl = pdfUrl.replace('/blob/', '/raw/');
        }
        
        // Use CORS proxy for GitHub URLs to avoid CORS issues
        if (pdfUrl.includes('github.com') || pdfUrl.includes('githubusercontent.com')) {
          console.log('⚠️ GitHub URL detected - using CORS proxy');
          pdfUrl = 'https://corsproxy.io/?' + encodeURIComponent(pdfUrl);
        }
        
        console.log('Loading PDF from:', pdfUrl);
        
        // Load PDF with proper configuration for SHARP TEXT
        const loadingTask = pdfjsLib.getDocument({
          url: pdfUrl,
          cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
          cMapPacked: true,
          standardFontDataUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/standard_fonts/',
          enableXfa: true,
          // Add CORS mode
          httpHeaders: {},
          withCredentials: false,
          // Font rendering optimization
          disableFontFace: false,
          useSystemFonts: false
        });
        
        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;
        document.getElementById('totalPages').textContent = totalPages;
        document.getElementById('pageInput').max = totalPages;
        await renderPage(1);
        
        console.log('PDF loaded successfully:', totalPages, 'pages');
      } catch (error) {
        console.error('Error loading PDF:', error);
        console.error('PDF URL:', url);
        console.error('Normalized URL:', pdfUrl);
        showError(`Failed to load PDF file: ${error.message || 'Unknown error'}`);
      }
    }

    async function renderPage(pageNum) {
      if (!pdfDoc) return;

      currentPage = pageNum;
      document.getElementById('pageInput').value = currentPage;
      updateProgress();

      try {
        const page = await pdfDoc.getPage(pageNum);
        
        // Calculate optimal viewport for SHARP text rendering
        const desiredWidth = Math.min(window.innerWidth * 0.85, 1200);
        const viewport = page.getViewport({ scale: 1.0 });
        const scale = (desiredWidth / viewport.width) * currentZoom;
        const scaledViewport = page.getViewport({ scale: scale });
        
        // Use device pixel ratio for ULTRA SHARP rendering (like Edge)
        const outputScale = window.devicePixelRatio || 1;
        
        // Create container with canvas AND text layer
        const container = document.createElement('div');
        container.className = 'canvas-container';
        container.style.width = Math.floor(scaledViewport.width) + 'px';
        container.style.height = Math.floor(scaledViewport.height) + 'px';
        container.style.position = 'relative';
        
        // Create canvas for rendering
        const canvas = document.createElement('canvas');
        canvas.id = 'pdfCanvas';
        const context = canvas.getContext('2d', { 
          alpha: false,
          willReadFrequently: false
        });
        
        // Set canvas size with PERFECT DPI for sharp text
        canvas.width = Math.floor(scaledViewport.width * outputScale);
        canvas.height = Math.floor(scaledViewport.height * outputScale);
        canvas.style.width = '100%';
        canvas.style.height = '100%';

        // CRITICAL: Disable image smoothing for SHARP text (not blurry)
        context.imageSmoothingEnabled = false;
        
        const transform = outputScale !== 1 
          ? [outputScale, 0, 0, outputScale, 0, 0] 
          : null;

        // Append canvas to container
        container.appendChild(canvas);
        
        // Create TEXT LAYER for crystal clear selectable text (like Edge)
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';
        textLayerDiv.style.width = Math.floor(scaledViewport.width) + 'px';
        textLayerDiv.style.height = Math.floor(scaledViewport.height) + 'px';
        container.appendChild(textLayerDiv);
        
        // Clear viewer and add container
        document.getElementById('pdfViewer').innerHTML = '';
        document.getElementById('pdfViewer').appendChild(container);

        // Render canvas with OPTIMIZED settings for sharp text
        const renderTask = page.render({
          canvasContext: context,
          viewport: scaledViewport,
          transform: transform,
          intent: 'display'
        });
        
        await renderTask.promise;
        
        // Render TEXT LAYER for selectable, crystal clear text
        const textContent = await page.getTextContent();
        pdfjsLib.renderTextLayer({
          textContentSource: textContent,
          container: textLayerDiv,
          viewport: scaledViewport,
          textDivs: [],
          enhanceTextSelection: true
        });

        updateNavigationButtons();
        
        console.log(`✨ Page ${currentPage} rendered CRYSTAL CLEAR at ${Math.round(scale * 100)}% (${outputScale}x DPI + Text Layer)`);
      } catch (error) {
        console.error('Error rendering page:', error);
        showError('Failed to render PDF page');
      }
    }

    function changePage(delta) {
      const newPage = currentPage + delta;
      if (newPage >= 1 && newPage <= totalPages) {
        // Smooth page transition
        const viewer = document.getElementById('pdfViewer');
        viewer.style.opacity = '0.5';
        viewer.style.transform = 'scale(0.98)';
        
        setTimeout(() => {
          renderPage(newPage);
          setTimeout(() => {
            viewer.style.opacity = '1';
            viewer.style.transform = 'scale(1)';
          }, 100);
        }, 150);
        
        console.log(`📄 Page ${currentPage} → ${newPage}`);
      }
    }

    function goToPage() {
      const pageNum = parseInt(document.getElementById('pageInput').value);
      if (pageNum >= 1 && pageNum <= totalPages) {
        changePage(pageNum - currentPage);
      }
    }

    function updateNavigationButtons() {
      document.getElementById('prevPage').disabled = currentPage <= 1;
      document.getElementById('nextPage').disabled = currentPage >= totalPages;
    }

    function updateProgress() {
      const progress = (currentPage / totalPages) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
    }

    function zoomIn() {
      currentZoom = Math.min(currentZoom + 0.2, 4.0); // Max 400%
      document.getElementById('zoomDisplay').textContent = Math.round(currentZoom * 100) + '%';
      renderPage(currentPage);
      console.log(`🔍 Zoom: ${Math.round(currentZoom * 100)}%`);
    }

    function zoomOut() {
      currentZoom = Math.max(currentZoom - 0.2, 0.4); // Min 40%
      document.getElementById('zoomDisplay').textContent = Math.round(currentZoom * 100) + '%';
      renderPage(currentPage);
      console.log(`🔍 Zoom: ${Math.round(currentZoom * 100)}%`);
    }

    function resetZoom() {
      currentZoom = 1.0;
      document.getElementById('zoomDisplay').textContent = '100%';
      renderPage(currentPage);
      console.log('🔍 Zoom reset to 100%');
    }

    function toggleNightMode() {
      document.body.classList.remove('sepia-mode');
      document.body.classList.toggle('night-mode');
    }

    function toggleSepiaMode() {
      document.body.classList.remove('night-mode');
      document.body.classList.toggle('sepia-mode');
    }

    function toggleBookmarks() {
      document.getElementById('bookmarksPanel').classList.toggle('active');
    }

    function addBookmark() {
      const bookmark = {
        page: currentPage,
        date: new Date().toLocaleString(),
        bookId: currentBookId
      };
      
      bookmarks.push(bookmark);
      saveBookmarks();
      displayBookmarks();
      
      // Show notification
      alert(`Bookmark added for page ${currentPage}`);
    }

    function loadBookmarks() {
      const saved = localStorage.getItem('book-bookmarks-' + currentBookId);
      bookmarks = saved ? JSON.parse(saved) : [];
      displayBookmarks();
    }

    function saveBookmarks() {
      localStorage.setItem('book-bookmarks-' + currentBookId, JSON.stringify(bookmarks));
    }

    function displayBookmarks() {
      const container = document.getElementById('bookmarksList');
      
      if (bookmarks.length === 0) {
        container.innerHTML = '<div class="no-bookmarks"><p>No bookmarks yet</p></div>';
        return;
      }

      container.innerHTML = bookmarks.map((bookmark, index) => `
        <div class="bookmark-item" onclick="goToBookmark(${bookmark.page})">
          <div class="bookmark-page">Page ${bookmark.page}</div>
          <div class="bookmark-date">${bookmark.date}</div>
        </div>
      `).join('');
    }

    function goToBookmark(page) {
      renderPage(page);
      toggleBookmarks();
    }

    // ENHANCED FULLSCREEN with eBook mode
    function toggleFullscreen() {
      const elem = document.documentElement;
      
      if (!document.fullscreenElement && 
          !document.webkitFullscreenElement && 
          !document.mozFullScreenElement && 
          !document.msFullscreenElement) {
        // Enter fullscreen
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        } else if (elem.mozRequestFullScreen) {
          elem.mozRequestFullScreen();
        } else if (elem.msRequestFullscreen) {
          elem.msRequestFullscreen();
        }
        
        // Add fullscreen class for styling
        document.body.classList.add('pdf-fullscreen-mode');
        
        // Re-render page for optimal fullscreen size
        setTimeout(() => renderPage(currentPage), 100);
        
        console.log('📺 Fullscreen mode activated');
      } else {
        // Exit fullscreen
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
        
        document.body.classList.remove('pdf-fullscreen-mode');
        
        // Re-render page for normal size
        setTimeout(() => renderPage(currentPage), 100);
        
        console.log('📺 Fullscreen mode deactivated');
      }
    }
    
    // Listen for fullscreen changes
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    document.addEventListener('mozfullscreenchange', handleFullscreenChange);
    document.addEventListener('MSFullscreenChange', handleFullscreenChange);
    
    function handleFullscreenChange() {
      if (!document.fullscreenElement && 
          !document.webkitFullscreenElement && 
          !document.mozFullScreenElement && 
          !document.msFullscreenElement) {
        document.body.classList.remove('pdf-fullscreen-mode');
      }
    }

      document.getElementById('downloadModal').classList.add('active');
    }

    function closeDownloadModal() {
      document.getElementById('downloadModal').classList.remove('active');
    }

    function downloadFullPDF() {

      const link = document.createElement('a');
      link.href = currentBookData.downloadUrl;
      link.download = `${currentBookData.title.replace(/[^a-z0-9]/gi, '-')}.pdf`;

      link.click();
      document.body.removeChild(link);

      const canvas = document.getElementById('pdfCanvas');
      const link = document.createElement('a');
      link.download = `${currentBookData.title.replace(/[^a-z0-9]/gi, '-')}-page-${currentPage}.png`;

      window.print();
    }

               onmouseover="this.style.background='rgba(204, 0, 0, 0.1)'"

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (document.body.classList.contains('book-mode')) {
          toggleBookMode();
        }
      }
      if (e.key === 'ArrowLeft') {
        if (document.body.classList.contains('book-mode')) {
          bookModePrevPage();
        } else {
          changePage(-1);
        }
      }
      if (e.key === 'ArrowRight') {
        if (document.body.classList.contains('book-mode')) {
          bookModeNextPage();
        } else {
          changePage(1);
        }
      }
      if (e.key === ' ') {
        if (document.body.classList.contains('book-mode')) {
          e.preventDefault();
          bookModeNextPage();
        }
      }
      if (e.key === '+' || e.key === '=') zoomIn();
      if (e.key === '-') zoomOut();
      if (e.key === '0') resetZoom();
      if (e.key === 'f' || e.key === 'F') {
        if (!document.body.classList.contains('book-mode')) {
          toggleFullscreen();
        }
      }
      if (e.key === 'b' || e.key === 'B') {
        if (document.body.classList.contains('book-mode')) {
          toggleBookMode();
        } else {
          addBookmark();
        }
      }
    });

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* 📖 PREMIUM BOOK MODE - JavaScript Logic                                 */
    /* ═══════════════════════════════════════════════════════════════════════ */
    
    let isBookMode = false;
    let bookModeCurrentPage = 1;
    let hideControlsTimeout = null;
    let isBookNightMode = false;

    // Check URL parameter and localStorage on load
    function initBookMode() {
      const urlParams = new URLSearchParams(window.location.search);
      const bookModeParam = urlParams.get('bookmode');
      const savedBookMode = localStorage.getItem('preferBookMode');
      
      if (bookModeParam === 'true' || savedBookMode === 'true') {
        setTimeout(() => {
          if (pdfDoc && totalPages > 0) {
            toggleBookMode();
          }
        }, 1000);
      }
    }

    // Toggle Book Mode
    function toggleBookMode() {
      if (!pdfDoc) {
        console.log('❌ PDF not loaded yet');
        return;
      }

      isBookMode = !isBookMode;
      document.body.classList.toggle('book-mode');
      
      // Save preference
      localStorage.setItem('preferBookMode', isBookMode.toString());
      
      if (isBookMode) {
        console.log('📖 Book Mode ACTIVATED');
        bookModeCurrentPage = currentPage;
        
        // Ensure we're on an odd page for two-page spread
        if (window.innerWidth > 768) {
          if (bookModeCurrentPage % 2 === 0) {
            bookModeCurrentPage = Math.max(1, bookModeCurrentPage - 1);
          }
        }
        
        renderBookPages();
        updateBookModeUI();
        setupBookModeControls();
        
        // Show swipe hint on mobile
        if (window.innerWidth <= 768) {
          showSwipeHint();
        }
      } else {
        console.log('📖 Book Mode DEACTIVATED');
        currentPage = bookModeCurrentPage;
        renderPage(currentPage);
        
        // Clear book mode containers
        document.getElementById('leftPageCanvas').innerHTML = '';
        document.getElementById('rightPageCanvas').innerHTML = '';
      }
    }

    // Render Book Pages (Two-Page Spread)
    async function renderBookPages() {
      if (!pdfDoc) return;

      const isMobile = window.innerWidth <= 768;
      
      if (isMobile) {
        // Mobile: Single page view
        await renderBookPage(bookModeCurrentPage, 'rightPageCanvas');
        document.getElementById('leftPageCanvas').innerHTML = '';
      } else {
        // Desktop: Two-page spread
        const leftPageNum = bookModeCurrentPage;
        const rightPageNum = Math.min(bookModeCurrentPage + 1, totalPages);
        
        await renderBookPage(leftPageNum, 'leftPageCanvas');
        
        if (rightPageNum <= totalPages) {
          await renderBookPage(rightPageNum, 'rightPageCanvas');
        } else {
          document.getElementById('rightPageCanvas').innerHTML = '';
        }
      }
      
      updateBookModeUI();
    }

    // Render Single Book Page
    async function renderBookPage(pageNum, containerId) {
      try {
        const page = await pdfDoc.getPage(pageNum);
        const container = document.getElementById(containerId);
        container.innerHTML = '';

        // Calculate scale to fit container
        const containerWidth = container.offsetWidth || 600;
        const containerHeight = container.offsetHeight || 800;
        const viewport = page.getViewport({ scale: 1.0 });
        
        const scaleWidth = (containerWidth * 0.9) / viewport.width;
        const scaleHeight = (containerHeight * 0.9) / viewport.height;
        const scale = Math.min(scaleWidth, scaleHeight);
        
        const scaledViewport = page.getViewport({ scale });

        // Create canvas
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        
        // Set canvas size with device pixel ratio
        const outputScale = window.devicePixelRatio || 1;
        canvas.width = Math.floor(scaledViewport.width * outputScale);
        canvas.height = Math.floor(scaledViewport.height * outputScale);
        canvas.style.width = Math.floor(scaledViewport.width) + 'px';
        canvas.style.height = Math.floor(scaledViewport.height) + 'px';

        // Render PDF
        const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;
        context.imageSmoothingEnabled = false;

        const renderContext = {
          canvasContext: context,
          transform,
          viewport: scaledViewport
        };

        await page.render(renderContext).promise;
        container.appendChild(canvas);

        // Add text layer for selectable text
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';
        textLayerDiv.style.width = canvas.style.width;
        textLayerDiv.style.height = canvas.style.height;
        container.appendChild(textLayerDiv);

        const textContent = await page.getTextContent();
        await pdfjsLib.renderTextLayer({
          textContent,
          container: textLayerDiv,
          viewport: scaledViewport,
          enhanceTextSelection: true
        }).promise;

        console.log(`📖 Book page ${pageNum} rendered`);
      } catch (error) {
        console.error(`Error rendering book page ${pageNum}:`, error);
      }
    }

    // Book Mode Navigation
    function bookModeNextPage() {
      if (!isBookMode || !pdfDoc) return;
      
      const isMobile = window.innerWidth <= 768;
      const increment = isMobile ? 1 : 2;
      
      if (bookModeCurrentPage + increment <= totalPages) {
        // Add flip animation
        const rightPage = document.getElementById('rightPage');
        rightPage.classList.add('flipping-right');
        
        setTimeout(() => {
          bookModeCurrentPage += increment;
          renderBookPages();
          rightPage.classList.remove('flipping-right');
        }, 400);
        
        resetHideControlsTimer();
      }
    }

    function bookModePrevPage() {
      if (!isBookMode || !pdfDoc) return;
      
      const isMobile = window.innerWidth <= 768;
      const decrement = isMobile ? 1 : 2;
      
      if (bookModeCurrentPage - decrement >= 1) {
        // Add flip animation
        const leftPage = document.getElementById('leftPage');
        leftPage.classList.add('flipping-left');
        
        setTimeout(() => {
          bookModeCurrentPage = Math.max(1, bookModeCurrentPage - decrement);
          renderBookPages();
          leftPage.classList.remove('flipping-left');
        }, 400);
        
        resetHideControlsTimer();
      }
    }

    // Update Book Mode UI
    function updateBookModeUI() {
      if (!isBookMode) return;
      
      const isMobile = window.innerWidth <= 768;
      const pageInfo = document.getElementById('bookPageInfo');
      const progressFill = document.getElementById('bookProgressFill');
      
      if (isMobile) {
        pageInfo.textContent = `Page ${bookModeCurrentPage} of ${totalPages}`;
      } else {
        const rightPageNum = Math.min(bookModeCurrentPage + 1, totalPages);
        if (rightPageNum <= totalPages) {
          pageInfo.textContent = `Pages ${bookModeCurrentPage}-${rightPageNum} of ${totalPages}`;
        } else {
          pageInfo.textContent = `Page ${bookModeCurrentPage} of ${totalPages}`;
        }
      }
      
      const progress = (bookModeCurrentPage / totalPages) * 100;
      progressFill.style.width = progress + '%';
    }

    // Setup Book Mode Controls
    function setupBookModeControls() {
      const controls = document.getElementById('bookModeControls');
      
      // Show controls
      controls.classList.remove('hidden');
      
      // Auto-hide after 3 seconds
      resetHideControlsTimer();
      
      // Show controls on mouse move
      document.addEventListener('mousemove', handleBookModeMouseMove);
      document.addEventListener('touchstart', handleBookModeMouseMove);
    }

    function handleBookModeMouseMove() {
      if (!isBookMode) return;
      
      const controls = document.getElementById('bookModeControls');
      controls.classList.remove('hidden');
      resetHideControlsTimer();
    }

    function resetHideControlsTimer() {
      if (hideControlsTimeout) {
        clearTimeout(hideControlsTimeout);
      }
      
      // Don't auto-hide controls on mobile for better UX
      const isMobile = window.innerWidth <= 768;
      if (isMobile) return;
      
      hideControlsTimeout = setTimeout(() => {
        if (isBookMode) {
          const controls = document.getElementById('bookModeControls');
          controls.classList.add('hidden');
        }
      }, 3000);
    }

    // Toggle Book Night Mode
    function toggleBookNightMode() {
      isBookNightMode = !isBookNightMode;
      
      const leftPage = document.getElementById('leftPage');
      const rightPage = document.getElementById('rightPage');
      
      if (isBookNightMode) {
        leftPage.style.filter = 'invert(0.9) hue-rotate(180deg)';
        rightPage.style.filter = 'invert(0.9) hue-rotate(180deg)';
      } else {
        leftPage.style.filter = 'none';
        rightPage.style.filter = 'none';
      }
      
      resetHideControlsTimer();
    }

    // Show Swipe Hint on Mobile
    function showSwipeHint() {
      const swipeHint = document.getElementById('swipeHint');
      if (!swipeHint) return;
      
      // Check if user has seen the hint before
      const hasSeenHint = localStorage.getItem('bookModeSwipeHintSeen');
      
      if (!hasSeenHint) {
        setTimeout(() => {
          swipeHint.classList.add('show');
          
          setTimeout(() => {
            swipeHint.classList.remove('show');
            localStorage.setItem('bookModeSwipeHintSeen', 'true');
          }, 3000);
        }, 500);
      }
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* 📱 MOBILE SWIPE GESTURES - Touch Support                                */
    /* ═══════════════════════════════════════════════════════════════════════ */
    
    let touchStartX = 0;
    let touchStartY = 0;
    let touchEndX = 0;
    let touchEndY = 0;

    function handleSwipeGesture() {
      const swipeThreshold = 50; // Minimum swipe distance
      const swipeX = touchEndX - touchStartX;
      const swipeY = touchEndY - touchStartY;
      
      // Only process if horizontal swipe is dominant
      if (Math.abs(swipeX) > Math.abs(swipeY) && Math.abs(swipeX) > swipeThreshold) {
        if (swipeX > 0) {
          // Swipe right - Previous page
          bookModePrevPage();
        } else {
          // Swipe left - Next page
          bookModeNextPage();
        }
      }
    }

    // Add touch event listeners for swipe
    document.addEventListener('touchstart', (e) => {
      if (!isBookMode) return;
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      if (!isBookMode) return;
      touchEndX = e.changedTouches[0].screenX;
      touchEndY = e.changedTouches[0].screenY;
      handleSwipeGesture();
    }, { passive: true });

    // Double tap to toggle controls
    let lastTap = 0;
    document.addEventListener('touchend', (e) => {
      if (!isBookMode) return;
      
      const currentTime = new Date().getTime();
      const tapLength = currentTime - lastTap;
      
      if (tapLength < 300 && tapLength > 0) {
        // Double tap detected
        const controls = document.getElementById('bookModeControls');
        if (controls.classList.contains('hidden')) {
          controls.classList.remove('hidden');
          resetHideControlsTimer();
        } else {
          controls.classList.add('hidden');
          clearTimeout(hideControlsTimeout);
        }
      }
      lastTap = currentTime;
    }, { passive: true });

    // Load book on page load
    document.addEventListener('DOMContentLoaded', () => {
      loadBook();
      initBookMode();
    });

    // Handle orientation change for Book Mode
    window.addEventListener('orientationchange', () => {
      if (isBookMode) {
        setTimeout(() => {
          renderBookPages();
          updateBookModeUI();
        }, 300);
      }
    });

    // Handle window resize for Book Mode
    let resizeTimeout;
    window.addEventListener('resize', () => {
      if (isBookMode) {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          renderBookPages();
          updateBookModeUI();
        }, 200);
      }
    });

    // Background system
    if (typeof BackgroundSystem !== 'undefined') {
      const bg = new BackgroundSystem();
      bg.init();
    }
  </script>

  <script src="../../Optimization/Background/background-system.js"></script>
  <script src="../../Optimization/navbar-autohide.js"></script>

  <!-- Desktop Navbar Scroll Script -->
  <script>
    (function() {
      window.addEventListener('scroll', function() {
        const navbar = document.getElementById('desktopNavbar');
        if (navbar) {
          if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
          } else {
            navbar.classList.remove('scrolled');
          }
        }
      });
    })();
  </script>
