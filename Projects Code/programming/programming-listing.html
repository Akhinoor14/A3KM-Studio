<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Immediate Mobile Detection -->
  <script>
    (function() {
      function isMobile() {
        const ua = navigator.userAgent || '';
        return /android|iphone|ipad|ipod|iemobile|mobile/i.test(ua) ||
               (navigator.userAgentData && navigator.userAgentData.mobile);
      }
      if (isMobile()) {
        window.location.replace('../../mobile/projects/programming/programming-listing.html');
      }
    })();
  </script>

  <title>Programming - DSA & Solutions | Md Akhinoor Islam</title>
  <link rel="icon" href="../../images/favicon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="../../Optimization/styles.css" />
  <link rel="stylesheet" href="../../Optimization/navbar-autohide.css">
  <link rel="stylesheet" href="../../Optimization/navbar/desktop-navbar.css">
  <link rel="stylesheet" href="../../Optimization/Background/background-system.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

  <meta name="description" content="Browse programming solutions, DSA, algorithms, and Python scripts by Md Akhinoor Islam" />
  <meta name="keywords" content="programming, DSA, algorithms, LeetCode, Python, JavaScript, C++, problem solving" />
  <meta name="author" content="Md Akhinoor Islam" />
  <meta name="theme-color" content="#000a00" />

  <style>
    :root {
      --primary: #00cc44;
      --dark-primary: #008822;
      --light-primary: #33ff77;
      --accent: #00ff55;
      --bg-dark: #000000;
      --bg-card: rgba(0, 15, 5, 0.95);
      --border-primary: rgba(0, 139, 30, 0.4);
      --border-strong: rgba(0, 204, 68, 0.8);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.85);
      --text-dim: rgba(255, 255, 255, 0.65);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans Bengali', 'Segoe UI', sans-serif;
      color: var(--text-primary);
      overflow-x: hidden;
      background: linear-gradient(180deg, #000a02 0%, #000300 100%);
      position: relative;
      padding-top: 85px;
      min-height: 100vh;
    }

    /* ===== LIB HEADER ===== */
    .lib-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding: 26px 30px;
      background: linear-gradient(160deg,
        rgba(0, 60, 20, 0.35) 0%,
        rgba(0, 30, 10, 0.25) 50%,
        rgba(2, 15, 5, 0.85) 100%);
      border-top: 1px solid rgba(0, 204, 68, 0.2);
      border-bottom: 2px solid rgba(0, 204, 68, 0.45);
      position: sticky;
      top: 85px;
      overflow: hidden;
      z-index: 41;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }

    .lib-header::before {
      content: '';
      position: absolute;
      top: 0; left: -50%;
      width: 200%; height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(0, 204, 68, 0.06) 50%, transparent 100%);
      pointer-events: none;
    }

    .lib-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 2;
    }

    .lib-header-left h1 {
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8), 0 0 20px rgba(0,204,68,0.3);
      margin: 0;
    }

    .lib-header-left h1 i {
      color: var(--primary);
      font-size: 1.4rem;
      filter: drop-shadow(0 0 12px rgba(0,204,68,0.6));
    }

    .lib-header-divider {
      width: 1px;
      height: 28px;
      background: rgba(0,204,68,0.4);
    }

    .lib-header-subtitle {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .lib-header-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 2;
    }

    .lib-stat-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,204,68,0.3);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      transition: all 0.3s;
      white-space: nowrap;
    }

    .lib-stat-badge i { color: var(--primary); font-size: 0.7rem; }
    .lib-stat-badge strong { color: #fff; font-size: 0.9rem; }
    .lib-stat-badge:hover { border-color: rgba(0,204,68,0.6); background: rgba(0,204,68,0.1); }

    /* ===== LAYOUT ===== */
    .main-content-wrapper {
      display: flex;
      min-height: calc(100vh - 85px - 65px);
      background: #000200;
      position: relative;
    }

    /* ===== FILTER SIDEBAR ===== */
    .filter-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #000500;
      border-right: 2px solid rgba(0, 204, 68, 0.25);
      position: sticky;
      top: 153px;
      height: calc(100vh - 153px);
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 50;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.8);
    }

    .filter-sidebar::-webkit-scrollbar { width: 6px; }
    .filter-sidebar::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    .filter-sidebar::-webkit-scrollbar-thumb { background: rgba(0,204,68,0.4); border-radius: 3px; }
    .filter-sidebar::-webkit-scrollbar-thumb:hover { background: rgba(0,204,68,0.6); }

    .filter-header {
      padding: 20px 16px 16px;
      border-bottom: 2px solid rgba(0,204,68,0.2);
      background: rgba(0,15,5,0.6);
    }

    .filter-header h3 {
      font-size: 0.9rem;
      font-weight: 800;
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filter-header h3 i { color: var(--primary); font-size: 0.85rem; }

    .filter-section {
      padding: 16px;
      border-bottom: 1px solid rgba(0,204,68,0.12);
    }

    .filter-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-section-title i { color: var(--primary); font-size: 0.7rem; }

    .search-box { position: relative; margin-bottom: 12px; }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(0,204,68,0.35);
      border-radius: 10px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .search-input::placeholder { color: rgba(255,255,255,0.4); }
    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 20px rgba(0,204,68,0.3);
    }

    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--primary); font-size: 14px; pointer-events: none;
    }

    .clear-search {
      position: absolute; right: 15px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: rgba(255,255,255,0.5); cursor: pointer;
      font-size: 18px; padding: 5px; display: none;
    }

    .clear-search:hover { color: var(--primary); }

    .filter-dropdown {
      width: 100%;
      padding: 11px 14px;
      background: rgba(0,15,5,0.95);
      border: 1.5px solid rgba(0,204,68,0.3);
      border-radius: 10px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      -webkit-appearance: none;
      appearance: none;
      color-scheme: dark;
      margin-bottom: 8px;
    }

    .filter-dropdown option { background: #001a08; color: #ffffff; font-weight: 600; }

    .filter-dropdown:hover { border-color: var(--primary); background: rgba(0,204,68,0.08); }
    .filter-dropdown:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(0,204,68,0.3); }

    /* Toggle buttons (Language, Difficulty) */
    .toggle-group {
      display: flex;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(0,204,68,0.3);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .toggle-btn {
      flex: 1;
      min-width: 0;
      padding: 9px 6px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      border-right: 1px solid rgba(0,204,68,0.2);
      white-space: nowrap;
      text-align: center;
    }

    .toggle-btn:last-child { border-right: none; }
    .toggle-btn.active { background: linear-gradient(135deg, var(--primary), var(--dark-primary)); color: #000; }
    .toggle-btn:hover:not(.active) { background: rgba(0,204,68,0.1); color: white; }

    .view-toggle { display: flex; gap: 6px; margin-bottom: 8px; }

    .view-btn {
      flex: 1;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(0,204,68,0.3);
      border-radius: 10px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .view-btn.active { background: linear-gradient(135deg, var(--primary), var(--dark-primary)); border-color: var(--primary); color: #000; }
    .view-btn:hover:not(.active) { border-color: var(--primary); color: white; }

    .results-info { padding: 12px 16px; background: rgba(0,0,0,0.4); border-radius: 8px; text-align: center; }
    .results-count { color: rgba(255,255,255,0.55); font-weight: 700; font-size: 0.8rem; }
    .results-count span { color: var(--primary); font-weight: 800; font-size: 1.1rem; }

    /* Checkboxes */
    .checkbox-group { display: flex; flex-direction: column; gap: 6px; }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 6px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .checkbox-label:hover { background: rgba(0,204,68,0.08); color: white; }
    .checkbox-label input[type="checkbox"] { accent-color: var(--primary); width: 14px; height: 14px; cursor: pointer; }

    /* ===== PROGRAMS ZONE ===== */
    .programs-zone {
      flex: 1;
      background: linear-gradient(180deg, #020f05 0%, #010800 100%);
      border-left: 2px solid rgba(0,204,68,0.15);
      overflow-x: hidden;
    }

    .programs-container {
      padding: 30px 30px 60px;
      position: relative;
      z-index: 1;
      min-height: 100%;
    }

    /* ===== PROGRAMS GRID ===== */
    .programs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(280px, 28vw, 360px), 1fr));
      gap: 24px 20px;
      padding: 10px 0 20px;
    }

    /* ===== PROGRAM CARD ===== */
    .program-card {
      background: linear-gradient(160deg,
        rgba(0, 22, 8, 0.98) 0%,
        rgba(0, 14, 6, 0.98) 60%,
        rgba(0, 8, 2, 0.98) 100%);
      border: 1px solid rgba(0, 100, 30, 0.35);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 18px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,100,30,0.08);
    }

    .program-card::before {
      content: '';
      position: absolute;
      top: 8px; left: 8px;
      width: 18px; height: 18px;
      border-top: 2px solid var(--primary);
      border-left: 2px solid var(--primary);
      opacity: 0.22;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 5;
    }

    .program-card:hover {
      border-color: rgba(0, 204, 68, 0.7);
      box-shadow: 0 16px 40px rgba(0,139,30,0.42), 0 0 55px rgba(0,204,68,0.18);
      transform: translateY(-5px) scale(1.012);
    }

    .program-card:hover::before { width: 24px; height: 24px; opacity: 1; top: 5px; left: 5px; }

    /* Card top badges row */
    .card-badges {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 0;
      gap: 8px;
    }

    .lang-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .lang-badge.python { background: rgba(55,118,171,0.25); border: 1px solid rgba(55,118,171,0.6); color: #79b8ff; }
    .lang-badge.javascript { background: rgba(247,223,30,0.15); border: 1px solid rgba(247,223,30,0.5); color: #ffe066; }
    .lang-badge.cpp { background: rgba(0,89,156,0.25); border: 1px solid rgba(0,89,156,0.6); color: #5bceff; }
    .lang-badge.java { background: rgba(237,139,0,0.2); border: 1px solid rgba(237,139,0,0.5); color: #ffb347; }
    .lang-badge.c { background: rgba(168,185,204,0.15); border: 1px solid rgba(168,185,204,0.4); color: #c0d4e8; }
    .lang-badge.matlab { background: rgba(228,75,25,0.2); border: 1px solid rgba(228,75,25,0.5); color: #ff8866; }

    .diff-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .diff-badge.easy { background: rgba(0,180,50,0.2); border: 1px solid rgba(0,180,50,0.5); color: #66ff99; }
    .diff-badge.medium { background: rgba(255,160,0,0.2); border: 1px solid rgba(255,160,0,0.5); color: #ffcc44; }
    .diff-badge.hard { background: rgba(220,50,50,0.2); border: 1px solid rgba(220,50,50,0.5); color: #ff7777; }

    /* Source tag */
    .source-line {
      padding: 4px 12px 0;
      font-size: 0.68rem;
      color: rgba(0,204,68,0.5);
      font-weight: 600;
      font-family: 'Fira Code', monospace;
    }

    /* Code snippet preview */
    .code-preview {
      margin: 8px 10px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0,204,68,0.15);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .code-preview pre {
      margin: 0 !important;
      padding: 10px 14px !important;
      background: transparent !important;
      font-size: 0.72rem !important;
      font-family: 'Fira Code', 'Consolas', monospace !important;
      line-height: 1.5 !important;
      max-height: 80px;
      overflow: hidden;
    }

    .code-preview code { font-size: 0.72rem !important; }

    .code-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 35px;
      background: linear-gradient(transparent, rgba(0,5,2,0.92));
      pointer-events: none;
    }

    /* Card body: title + desc */
    .card-body {
      padding: 8px 12px 6px;
      flex: 1;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.35;
      margin-bottom: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.3s;
    }

    .program-card:hover .card-title { color: var(--primary); }

    .card-desc {
      font-size: 0.76rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Tags */
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px 12px 6px;
    }

    .card-tag {
      padding: 2px 8px;
      background: rgba(0,204,68,0.08);
      border: 1px solid rgba(0,204,68,0.2);
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
    }

    /* Complexity row */
    .complexity-row {
      display: flex;
      gap: 8px;
      padding: 0 12px 6px;
    }

    .complexity-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.45);
      font-family: 'Fira Code', monospace;
    }

    .complexity-chip i { color: var(--primary); font-size: 0.62rem; }

    /* Action buttons */
    .card-actions {
      display: flex;
      gap: 6px;
      padding: 8px 10px 10px;
      border-top: 1px solid rgba(0,204,68,0.12);
      margin-top: auto;
    }

    .btn-run, .btn-view {
      flex: 1;
      padding: 9px 6px;
      border-radius: 8px;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-run {
      background: linear-gradient(135deg, var(--primary), var(--dark-primary));
      color: #000;
    }

    .btn-run:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-view {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(0,204,68,0.25) !important;
    }

    .btn-view:hover { background: rgba(0,204,68,0.12); color: #fff; border-color: rgba(0,204,68,0.5) !important; }

    /* No results / loading */
    .no-programs { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .no-programs i { font-size: 48px; color: var(--primary); margin-bottom: 16px; }
    .no-programs p { font-size: 16px; margin-bottom: 8px; }

    .loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .loading i { font-size: 36px; color: var(--primary); animation: spin 1s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Featured marker */
    .featured-star {
      position: absolute;
      top: 8px; right: 8px;
      color: #ffd700;
      font-size: 0.8rem;
      filter: drop-shadow(0 0 4px rgba(255,215,0,0.5));
      z-index: 5;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .main-content-wrapper { flex-direction: column; }
      .filter-sidebar { width: 100%; height: auto; position: relative; top: 0; border-right: none; border-bottom: 2px solid rgba(0,204,68,0.25); max-height: 350px; overflow-y: auto; }
      .programs-zone { border-left: none; }
      .programs-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    }

    @media (max-width: 768px) {
      .lib-header-left h1 { font-size: 1.2rem; }
      .lib-header-subtitle { display: none; }
      .programs-container { padding: 20px 16px 40px; }
      .programs-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
  <script src="../../Optimization/navbar-autohide.js"></script>
  <script src="../../Optimization/script.js"></script>
  <script src="../../Optimization/fullscreen-init.js"></script>
  <script src="../../Optimization/cursor-effects.js" defer></script>

  <script>
    let allPrograms = [];
    let filteredPrograms = [];
    let currentFilters = {
      search: '',
      category: 'all',
      language: 'all',
      difficulty: 'all',
      source: 'all',
      sort: 'newest',
      view: 'grid',
      runnable: false,
      testCases: false,
      featured: false
    };

    const LANG_MAP = {
      python: { class: 'python', label: 'Python', icon: 'fab fa-python', prism: 'python' },
      javascript: { class: 'javascript', label: 'JS', icon: 'fab fa-js-square', prism: 'javascript' },
      cpp: { class: 'cpp', label: 'C++', icon: 'fas fa-code', prism: 'cpp' },
      java: { class: 'java', label: 'Java', icon: 'fab fa-java', prism: 'java' },
      c: { class: 'c', label: 'C', icon: 'fas fa-code', prism: 'c' },
      matlab: { class: 'matlab', label: 'MATLAB', icon: 'fas fa-chart-line', prism: 'matlab' }
    };

    async function loadPrograms() {
      try {
        const response = await fetch('programs.json');
        const data = await response.json();
        allPrograms = data.programs || [];
        filteredPrograms = [...allPrograms];
        console.log(`💻 Loaded ${allPrograms.length} programs`);
        setupFilterListeners();
        applyFiltersAndRender();
        updateHeaderStats(data);
      } catch (err) {
        console.error('Error loading programs:', err);
        document.getElementById('programsContainer').innerHTML = `
          <div class="no-programs">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Error loading programs</p>
            <small style="color:rgba(255,255,255,0.4)">Check console for details</small>
          </div>`;
      }
    }

    function updateHeaderStats(data) {
      const stats = data.statistics || {};
      const byLang = stats.byLanguage || {};
      const el = id => document.getElementById(id);
      if (el('headerTotal')) el('headerTotal').textContent = stats.total || allPrograms.length;
      if (el('headerPython')) el('headerPython').textContent = byLang.python || allPrograms.filter(p => p.language === 'python').length;
      if (el('headerJS')) el('headerJS').textContent = byLang.javascript || allPrograms.filter(p => p.language === 'javascript').length;
    }

    function setupFilterListeners() {
      const searchInput = document.getElementById('searchInput');
      const clearSearch = document.getElementById('clearSearch');

      searchInput.addEventListener('input', e => {
        currentFilters.search = e.target.value.toLowerCase();
        clearSearch.style.display = e.target.value ? 'block' : 'none';
        applyFiltersAndRender();
      });

      clearSearch.addEventListener('click', () => {
        searchInput.value = '';
        currentFilters.search = '';
        clearSearch.style.display = 'none';
        applyFiltersAndRender();
      });

      document.getElementById('categoryFilter').addEventListener('change', e => {
        currentFilters.category = e.target.value;
        applyFiltersAndRender();
      });

      document.getElementById('sourceFilter').addEventListener('change', e => {
        currentFilters.source = e.target.value;
        applyFiltersAndRender();
      });

      document.getElementById('sortFilter').addEventListener('change', e => {
        currentFilters.sort = e.target.value;
        applyFiltersAndRender();
      });

      // Language toggle
      document.querySelectorAll('#langToggle .toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#langToggle .toggle-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilters.language = btn.dataset.lang;
          applyFiltersAndRender();
        });
      });

      // Difficulty toggle
      document.querySelectorAll('#diffToggle .toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#diffToggle .toggle-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilters.difficulty = btn.dataset.diff;
          applyFiltersAndRender();
        });
      });

      // Checkboxes
      document.getElementById('filterRunnable').addEventListener('change', e => {
        currentFilters.runnable = e.target.checked;
        applyFiltersAndRender();
      });
      document.getElementById('filterTestCases').addEventListener('change', e => {
        currentFilters.testCases = e.target.checked;
        applyFiltersAndRender();
      });
      document.getElementById('filterFeatured').addEventListener('change', e => {
        currentFilters.featured = e.target.checked;
        applyFiltersAndRender();
      });

      // View toggle
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilters.view = btn.dataset.view;
          applyFiltersAndRender();
        });
      });
    }

    function applyFiltersAndRender() {
      filteredPrograms = [...allPrograms];

      if (currentFilters.search) {
        filteredPrograms = filteredPrograms.filter(p =>
          p.title.toLowerCase().includes(currentFilters.search) ||
          (p.description || '').toLowerCase().includes(currentFilters.search) ||
          (p.tags || []).some(t => t.toLowerCase().includes(currentFilters.search)) ||
          (p.subcategory || '').toLowerCase().includes(currentFilters.search)
        );
      }

      if (currentFilters.category !== 'all') {
        filteredPrograms = filteredPrograms.filter(p => p.category === currentFilters.category);
      }

      if (currentFilters.language !== 'all') {
        filteredPrograms = filteredPrograms.filter(p => p.language === currentFilters.language);
      }

      if (currentFilters.difficulty !== 'all') {
        filteredPrograms = filteredPrograms.filter(p =>
          (p.difficulty || '').toLowerCase() === currentFilters.difficulty
        );
      }

      if (currentFilters.source !== 'all') {
        filteredPrograms = filteredPrograms.filter(p => p.source === currentFilters.source);
      }

      if (currentFilters.runnable) {
        const RUNNABLE_LANGS = ['python', 'javascript'];
        filteredPrograms = filteredPrograms.filter(p => RUNNABLE_LANGS.includes(p.language));
      }

      if (currentFilters.testCases) {
        filteredPrograms = filteredPrograms.filter(p => p.hasTestCases);
      }

      if (currentFilters.featured) {
        filteredPrograms = filteredPrograms.filter(p => p.featured);
      }

      // Sort
      filteredPrograms.sort((a, b) => {
        switch (currentFilters.sort) {
          case 'newest': return new Date(b.dateAdded || 0) - new Date(a.dateAdded || 0);
          case 'oldest': return new Date(a.dateAdded || 0) - new Date(b.dateAdded || 0);
          case 'title-asc': return a.title.localeCompare(b.title);
          case 'title-desc': return b.title.localeCompare(a.title);
          case 'difficulty-asc': return (a.difficultyLevel || 0) - (b.difficultyLevel || 0);
          case 'difficulty-desc': return (b.difficultyLevel || 0) - (a.difficultyLevel || 0);
          case 'featured': return (b.featured ? 1 : 0) - (a.featured ? 1 : 0);
          default: return 0;
        }
      });

      renderPrograms();
      document.getElementById('resultCount').textContent = filteredPrograms.length;
      document.getElementById('totalResults').textContent = allPrograms.length;
    }

    function renderPrograms() {
      const container = document.getElementById('programsContainer');

      if (filteredPrograms.length === 0) {
        container.innerHTML = `
          <div class="no-programs">
            <i class="fas fa-search"></i>
            <p>No programs found</p>
            <p style="font-size:14px;margin-top:8px;color:rgba(255,255,255,0.4)">Try adjusting your filters</p>
          </div>`;
        return;
      }

      const cardsHTML = filteredPrograms.map(createProgramCard).join('');
      const listModeStyle = currentFilters.view === 'list'
        ? 'grid-template-columns: 1fr; gap: 12px;'
        : '';
      container.innerHTML = `<div class="programs-grid" style="${listModeStyle}">${cardsHTML}</div>`;

      // Highlight code after render
      if (window.Prism) Prism.highlightAll();
    }

    function createProgramCard(prog) {
      const langInfo = LANG_MAP[prog.language] || { class: prog.language, label: prog.language, icon: 'fas fa-code', prism: prog.language };
      const diff = (prog.difficulty || 'easy').toLowerCase();
      const sourceTag = prog.source
        ? `<div class="source-line">${prog.source}${prog.sourceNumber ? ' #' + prog.sourceNumber : ''}</div>`
        : '';
      const featuredStar = prog.featured ? '<i class="fas fa-star featured-star"></i>' : '';

      // Code snippet (first 4 lines)
      const codeLines = (prog.code || '').split('\n').slice(0, 5).join('\n');
      const escapedCode = codeLines.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const codePreview = codeLines ? `
        <div class="code-preview">
          <pre><code class="language-${langInfo.prism}">${escapedCode}</code></pre>
          <div class="code-fade"></div>
        </div>` : '';

      const tagsHTML = (prog.tags || []).slice(0, 3).map(t =>
        `<span class="card-tag">${t}</span>`).join('');

      const complexityHTML = (prog.timeComplexity || prog.spaceComplexity) ? `
        <div class="complexity-row">
          ${prog.timeComplexity ? `<span class="complexity-chip"><i class="fas fa-clock"></i>${prog.timeComplexity}</span>` : ''}
          ${prog.spaceComplexity ? `<span class="complexity-chip"><i class="fas fa-memory"></i>${prog.spaceComplexity}</span>` : ''}
        </div>` : '';

      const canRun = ['python', 'javascript'].includes(prog.language);
      const runBtn = canRun
        ? `<button class="btn-run" onclick="event.stopPropagation(); openViewer('${prog.id}', true)">
             <i class="fas fa-play"></i> Run
           </button>`
        : `<button class="btn-run" disabled title="Run not available for ${langInfo.label}">
             <i class="fas fa-play"></i> Run
           </button>`;

      return `
        <div class="program-card" onclick="openViewer('${prog.id}', false)">
          ${featuredStar}
          <div class="card-badges">
            <span class="lang-badge ${langInfo.class}"><i class="${langInfo.icon}"></i> ${langInfo.label}</span>
            <span class="diff-badge ${diff}">${prog.difficulty || 'Easy'}</span>
          </div>
          ${sourceTag}
          ${codePreview}
          <div class="card-body">
            <div class="card-title">${prog.title}</div>
            <div class="card-desc">${prog.description || ''}</div>
          </div>
          ${tagsHTML ? `<div class="card-tags">${tagsHTML}</div>` : ''}
          ${complexityHTML}
          <div class="card-actions">
            ${runBtn}
            <button class="btn-view" onclick="event.stopPropagation(); openViewer('${prog.id}', false)">
              <i class="fas fa-eye"></i> View
            </button>
          </div>
        </div>`;
    }

    function openViewer(id, autoRun) {
      const url = `code-viewer.html?id=${encodeURIComponent(id)}${autoRun ? '&run=1' : ''}`;
      window.location.href = url;
    }

    loadPrograms();
  </script>
    </div>
  </div>
