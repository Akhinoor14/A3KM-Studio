          </div>
          <div class="filter-section">
            <div class="filter-section-title"><i class="fas fa-sort"></i> Sort By</div>
            <select class="filter-dropdown" id="sortFilter">
              <option value="default">&#128290; Default Order</option>
              <option value="az">&#128289; A to Z</option>
              <option value="za">&#128290; Z to A</option>
            </select>
          </div>
          <div class="filter-section">
            <div class="filter-section-title"><i class="fas fa-th"></i> View Mode</div>
            <div class="view-toggle">
              <button class="view-btn active" id="viewGrid"><i class="fas fa-th-large"></i> Grid</button>
              <button class="view-btn" id="viewList"><i class="fas fa-list"></i> List</button>
            </div>
          </div>
          <div class="filter-section" id="activeFiltersSection" style="display:none;">
            <div class="filter-section-title"><i class="fas fa-tags"></i> Active Filters</div>
            <div class="active-filters" id="activeFilterTags"></div>
          </div>
        </div>

        <!-- PROJECTS ZONE -->
        <div class="projects-zone">
          <div class="projects-container" id="projectsContainer">
            <div class="no-projects"><i class="fas fa-spinner fa-spin"></i><h3>Loading projects...</h3></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script defer src="../../Optimization/script.js"></script>
  <script>
    let allModels = [];
    let filteredModels = [];
    let currentFilters = { search: '', type: 'all', sort: 'default', view: 'grid' };

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function isAssembly(model) {
      const cad = Array.isArray(model.files) ? model.files : (model.files && model.files.cad ? model.files.cad : []);
      return cad.some(f => String(f).toUpperCase().endsWith('.SLDASM'));
    }

    function initModels() {
      if (typeof paidProjects === 'undefined') { setTimeout(initModels, 100); return; }
      allModels = paidProjects || [];
      document.getElementById('headerTotal').textContent = allModels.length;
      document.getElementById('totalCount').textContent = allModels.length;
      applyFiltersAndRender();
    }

    function applyFiltersAndRender() {
      const { search, type, sort } = currentFilters;
      const term = search.toLowerCase();
      filteredModels = allModels.filter(m => {
        const typeOk = type === 'all' || (type === 'assemblies' ? isAssembly(m) : !isAssembly(m));
        const title = m.title || m.name || '';
        const desc = m.description || m.subtitle || '';
        const tags = m.tags || m.features || [];
        const searchOk = !term || title.toLowerCase().includes(term) || desc.toLowerCase().includes(term) || tags.some(t => String(t).toLowerCase().includes(term));
        return typeOk && searchOk;
      });
      if (sort === 'az') filteredModels.sort((a,b) => ((a.title||a.name||'')).localeCompare((b.title||b.name||'')));
      else if (sort === 'za') filteredModels.sort((a,b) => ((b.title||b.name||'')).localeCompare((a.title||a.name||'')));
      renderModels();
      document.getElementById('resultsCount').textContent = filteredModels.length;
      updateActiveFilters();
    }

    function renderModels() {
      const container = document.getElementById('projectsContainer');
      if (allModels.length === 0) {
        container.innerHTML = '<div class="coming-soon-section"><i class="fas fa-briefcase cs-icon"></i><h2>Commercial Projects Coming Soon</h2><p>Client-commissioned and commercial SOLIDWORKS deliverables are being prepared for showcase. Check back soon!</p><span class="cs-badge"><i class="fas fa-lock"></i> Confidential &amp; Coming Soon</span></div>';
        return;
      }
      if (filteredModels.length === 0) {
        container.innerHTML = '<div class="no-projects"><i class="fas fa-inbox"></i><h3>No projects found</h3><p>Try adjusting your filters or search term</p></div>';
        return;
      }
      const listMode = currentFilters.view === 'list';
      container.innerHTML = '<div class="projects-grid' + (listMode ? ' list-mode' : '') + '">' +
        filteredModels.map((m, i) => createCard(m, i)).join('') + '</div>';
    }

    function createCard(model, index) {
      const id = model.id;
      const title = model.title || model.name || 'Project';
      const cleanTitle = title.replace(/^Model \d+\s*[-\u2013]\s*/, '');
      const desc = model.description || model.subtitle || '';
      const glbPath = model.glbPath || '';
      const filesCad = Array.isArray(model.files) ? model.files : (model.files && model.files.cad ? model.files.cad : []);
      const thumbPath = model.thumbnailPath || (model.folder && model.files && model.files.images && model.files.images[0]
        ? '../../Projects Storage/Solidwork Projects/' + model.folder + '/' + model.files.images[0] : '');
      const zipPath = model.zipPath || '';
      const tags = (model.tags || model.features || []).slice(0, 3);
      const hasGlb = glbPath.trim() !== '';
      const assembly = isAssembly(model);
      const typeStr = assembly ? '&#9881;&#65039; Assembly' : '&#129659; Part';
      const num = String(index + 1).padStart(2, '0');
      const viewerUrl = 'solidworks-model-viewer.html?id=' + id + '&level=paid';

      const thumbContent = hasGlb ? (
        '<model-viewer src="' + escHtml(glbPath) + '" alt="' + escHtml(cleanTitle) + '" loading="lazy" camera-controls touch-action="pan-y" disable-zoom auto-rotate auto-rotate-delay="1000" rotation-per-second="30deg" camera-orbit="0deg 75deg 85%" field-of-view="25deg" min-field-of-view="20deg" max-field-of-view="35deg" interpolation-decay="200" style="width:100%;height:100%;--poster-color:transparent;background:transparent;">' +
          '<div slot="poster" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;background:linear-gradient(135deg,rgba(204,0,0,0.08),rgba(0,0,0,0.95));">' +
            '<div style="width:30px;height:30px;border:3px solid rgba(204,0,0,0.3);border-top-color:#CC0000;border-radius:50%;animation:spin 1s linear infinite;"></div>' +
            '<span style="font-size:10px;color:rgba(200,200,200,0.6);font-weight:600;text-transform:uppercase;letter-spacing:1px;">Loading 3D</span>' +
          '</div></model-viewer>' +
          '<div class="glb-indicator"><i class="fas fa-cube"></i><span>3D View</span></div>'
      ) : thumbPath ? (
        '<img src="' + escHtml(thumbPath) + '" alt="' + escHtml(cleanTitle) + '" onerror="this.style.display=\'none\'">'
      ) : '';

      const zipBadge = zipPath ? '<div class="zip-badge"><i class="fas fa-file-archive"></i> ZIP</div>' : '';
      const tagsHtml = tags.map(t => '<span class="tag">' + escHtml(String(t)) + '</span>').join('');

      return '<div class="project-card" onclick="window.location.href=\'' + viewerUrl + '\'">' +
        '<div class="project-thumbnail">' + thumbContent +
          '<div class="thumbnail-fallback"' + (hasGlb || thumbPath ? ' style="display:none;"' : '') + '><i class="fas fa-briefcase"></i></div>' +
          zipBadge +
        '</div>' +
        '<div class="project-card-content">' +
          '<span class="project-number">#' + num + '</span>' +
          '<div class="project-category-badge">' + typeStr + '</div>' +
          '<h3 class="project-title">' + escHtml(cleanTitle) + '</h3>' +
          '<p class="project-description">' + escHtml(desc) + '</p>' +
          '<div class="project-tags">' + tagsHtml + '</div>' +
          '<div class="project-footer">' +
            '<span class="difficulty-badge difficulty-paid">&#128188; Commercial</span>' +
            '<span class="project-link">View 3D <i class="fas fa-arrow-right"></i></span>' +
          '</div>' +
        '</div></div>';
    }

    function updateActiveFilters() {
      const section = document.getElementById('activeFiltersSection');
      const container = document.getElementById('activeFilterTags');
      const typeLabels = { 'parts': 'Parts', 'assemblies': 'Assemblies' };
      const tags = [];
      if (currentFilters.type !== 'all') tags.push({ label: typeLabels[currentFilters.type], type: 'type' });
      if (currentFilters.search) tags.push({ label: '"' + currentFilters.search + '"', type: 'search' });
      if (tags.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      container.innerHTML = tags.map(t =>
        '<span class="filter-tag">' + escHtml(t.label) + ' <i class="fas fa-times" onclick="removeFilter(\'' + t.type + '\')"></i></span>'
      ).join('');
    }

    function removeFilter(type) {
      if (type === 'type') { currentFilters.type = 'all'; document.getElementById('typeFilter').value = 'all'; }
      else if (type === 'search') { currentFilters.search = ''; document.getElementById('searchInput').value = ''; document.getElementById('clearSearch').classList.remove('active'); }
      applyFiltersAndRender();
    }

    document.addEventListener('DOMContentLoaded', () => {
      initModels();
      const searchInput = document.getElementById('searchInput');
      const clearSearch = document.getElementById('clearSearch');
      searchInput.addEventListener('input', e => { currentFilters.search = e.target.value; clearSearch.classList.toggle('active', !!e.target.value); applyFiltersAndRender(); });
      clearSearch.addEventListener('click', () => { currentFilters.search = ''; searchInput.value = ''; clearSearch.classList.remove('active'); applyFiltersAndRender(); });
      document.getElementById('typeFilter').addEventListener('change', e => { currentFilters.type = e.target.value; applyFiltersAndRender(); });
      document.getElementById('sortFilter').addEventListener('change', e => { currentFilters.sort = e.target.value; applyFiltersAndRender(); });
      document.getElementById('viewGrid').addEventListener('click', () => { currentFilters.view = 'grid'; document.getElementById('viewGrid').classList.add('active'); document.getElementById('viewList').classList.remove('active'); renderModels(); });
      document.getElementById('viewList').addEventListener('click', () => { currentFilters.view = 'list'; document.getElementById('viewList').classList.add('active'); document.getElementById('viewGrid').classList.remove('active'); renderModels(); });
      window.addEventListener('scroll', () => { const nb = document.getElementById('desktopNavbar'); if (nb) nb.classList.toggle('scrolled', window.scrollY > 50); });
    });
  </script>

  <script src="../../Optimization/navbar-autohide.js"></script>
  <script src="../../Optimization/fullscreen-init.js"></script>
  <script src="../../Optimization/cursor-effects.js" defer></script>
</body>
</html>
