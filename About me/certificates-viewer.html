<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0a0000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
  <meta name="description" content="Certificates & Achievements of Md Akhinoor Islam - Portfolio presented by A3KM Studio" />
  <title>Certificates - Md Akhinoor Islam | A3KM Studio Portfolio</title>
  <!-- Font Awesome CDN removed to avoid third-party tracking/storage warnings. -->
  <link rel="stylesheet" href="../Optimization/navbar/desktop-navbar.css">
  <link rel="stylesheet" href="../Optimization/Background/background-system.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #030000;
      color: #e0e0e0;
      min-height: 100vh;
      padding-top: 95px;
      padding-bottom: 60px;
    }

    /* Professional text-only mode: hide all decorative icons on this page */
    i.fas, i.fab {
      display: none !important;
    }

    /* Stats Bar */
    .stats-bar {
      max-width: 1400px;
      margin: 28px auto 0;
      padding: 22px 24px;
      background: linear-gradient(135deg, rgba(18, 5, 5, 0.82), rgba(10, 2, 2, 0.72));
      border: 1px solid rgba(204, 0, 0, 0.18);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(18px);
    }

    .stats-container {
      max-width: none;
      margin: 0;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
    }

    .stat-item {
      text-align: center;
      flex: 1 1 180px;
      padding: 16px 20px;
      background: linear-gradient(180deg, rgba(72, 10, 10, 0.28), rgba(38, 6, 6, 0.2));
      border-radius: 18px;
      border: 1px solid rgba(204, 0, 0, 0.2);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .stat-number {
      font-size: 1.8rem;
      font-weight: bold;
      color: #CC0000;
    }

    .stat-label {
      font-size: 0.82rem;
      color: #b08b8b;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Filter Bar */
    .filter-bar {
      max-width: 1400px;
      background: linear-gradient(135deg, rgba(20, 6, 6, 0.82), rgba(12, 4, 4, 0.76));
      padding: 20px 22px;
      margin: 18px auto 0;
      border-radius: 22px;
      border: 1px solid rgba(204, 0, 0, 0.18);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
    }

    .filter-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      background: linear-gradient(180deg, rgba(72, 10, 10, 0.28), rgba(38, 6, 6, 0.2));
      color: #e0e0e0;
      border: 1px solid rgba(204, 0, 0, 0.22);
      padding: 10px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #CC0000;
      border-color: #CC0000;
      color: white;
      transform: translateY(-2px);
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 13px 18px 13px 44px;
      background: rgba(8, 1, 1, 0.72);
      border: 1px solid rgba(204, 0, 0, 0.22);
      border-radius: 999px;
      color: #e0e0e0;
      font-size: 0.95rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .search-box i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #CC0000;
    }

    /* Main Content */
    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 22px 20px 0;
    }

    .category-section {
      margin-bottom: 28px;
      padding: 28px;
      background: linear-gradient(180deg, rgba(16, 4, 4, 0.72), rgba(10, 2, 2, 0.56));
      border: 1px solid rgba(204, 0, 0, 0.14);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.025);
      backdrop-filter: blur(14px);
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(204, 0, 0, 0.22);
    }

    .category-header i {
      font-size: 1.5rem;
      color: #CC0000;
    }

    .category-header h2 {
      font-size: 1.5rem;
      color: #fff;
      flex: 1;
    }

    .category-count {
      background: rgba(204, 0, 0, 0.2);
      color: #CC0000;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid rgba(204, 0, 0, 0.3);
    }

    .category-description {
      color: #a88a8a;
      font-size: 0.9rem;
      margin-left: 40px;
      margin-bottom: 22px;
    }

    /* Certificate Grid */
    .certificates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .certificate-card {
      background: linear-gradient(165deg, 
        rgba(14, 2, 2, 0.98), 
        rgba(36, 6, 6, 0.94),
        rgba(20, 2, 4, 0.96),
        rgba(6, 0, 0, 0.98)
      );
      border: 1px solid rgba(204, 0, 0, 0.2);
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      box-shadow: 
        0 16px 34px rgba(0, 0, 0, 0.38),
        0 1px 3px rgba(204, 0, 0, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 -1px 0 rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);
    }
    
    .certificate-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 20px,
          rgba(139, 0, 0, 0.03) 20px,
          rgba(139, 0, 0, 0.03) 21px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 20px,
          rgba(139, 0, 0, 0.03) 20px,
          rgba(139, 0, 0, 0.03) 21px
        ),
        linear-gradient(
          135deg,
          transparent 0%,
          rgba(255, 255, 255, 0.02) 50%,
          transparent 100%
        );
      background-size: 100% 100%, 100% 100%, 200% 200%;
      background-position: 0 0, 0 0, -100% 0;
      transition: background-position 0.6s ease;
      pointer-events: none;
      z-index: 0;
    }
    
    .certificate-card::after {
      content: '';
      position: absolute;
      inset: 16px;
      border: 2px solid transparent;
      border-image: linear-gradient(
        135deg,
        rgba(204, 0, 0, 0.4) 0%,
        transparent 25%,
        transparent 75%,
        rgba(204, 0, 0, 0.4) 100%
      ) 1;
      border-radius: 16px;
      transition: all 0.35s ease;
      z-index: 1;
      pointer-events: none;
    }

    .certificate-card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(204, 0, 0, 0.6);
      box-shadow: 
        0 22px 52px rgba(204, 0, 0, 0.18),
        0 10px 26px rgba(0, 0, 0, 0.56),
        inset 0 2px 0 rgba(255, 255, 255, 0.12),
        inset 0 -2px 0 rgba(0, 0, 0, 0.7),
        inset 0 0 40px rgba(204, 0, 0, 0.08);
      background: linear-gradient(165deg, 
        rgba(18, 3, 3, 0.98), 
        rgba(42, 8, 8, 0.95),
        rgba(24, 3, 5, 0.96),
        rgba(8, 0, 0, 0.98)
      );
    }
    
    .certificate-card:hover::before {
      background-position: 0 0, 0 0, 100% 0;
    }
    
    .certificate-card:hover::after {
      inset: 10px;
      border-width: 2.5px;
      border-image: linear-gradient(
        135deg,
        rgba(204, 0, 0, 0.7) 0%,
        rgba(255, 255, 255, 0.3) 25%,
        rgba(255, 255, 255, 0.3) 75%,
        rgba(204, 0, 0, 0.7) 100%
      ) 1;
    }
    
    .certificate-card > * {
      position: relative;
      z-index: 2;
    }

    .certificate-thumbnail {
      width: 100%;
      height: 232px;
      background: radial-gradient(circle at top, rgba(84, 10, 10, 0.18), transparent 56%),
        linear-gradient(145deg, 
        rgba(30, 4, 4, 0.72),
        rgba(8, 1, 1, 0.86),
        rgba(18, 3, 6, 0.74)
      );
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-bottom: 2px solid rgba(139, 0, 0, 0.3);
      box-shadow: 
        0 4px 16px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(0, 0, 0, 0.6);
    }
    
    .certificate-thumbnail::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 15px,
          rgba(139, 0, 0, 0.04) 15px,
          rgba(139, 0, 0, 0.04) 16px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 15px,
          rgba(139, 0, 0, 0.04) 15px,
          rgba(139, 0, 0, 0.04) 16px
        );
      pointer-events: none;
      opacity: 0.5;
    }

    .certificate-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
    }

    .certificate-card:hover .certificate-thumbnail img {
      transform: scale(1.08);
      filter: drop-shadow(0 6px 16px rgba(204, 0, 0, 0.4));
    }

    .certificate-thumbnail .placeholder {
      font-size: 3.6rem;
      color: rgba(204, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .certificate-thumbnail .pdf-icon {
      font-size: 5rem;
      color: rgba(204, 0, 0, 0.5);
      filter: drop-shadow(0 6px 16px rgba(204, 0, 0, 0.3));
      animation: iconPulse 3s ease-in-out infinite;
    }
    
    @keyframes iconPulse {
      0%, 100% { 
        transform: scale(1);
        opacity: 0.5;
      }
      50% { 
        transform: scale(1.05);
        opacity: 0.7;
      }
    }

    .certificate-thumbnail .pdf-label {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 600;
    }

    .certificate-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, 
        rgba(204, 0, 0, 0.95), 
        rgba(139, 0, 0, 0.85)
      );
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 
        0 2px 8px rgba(204, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    .certificate-info {
      padding: 24px 24px 22px;
      background: linear-gradient(180deg, rgba(28, 6, 6, 0.18), rgba(8, 1, 1, 0));
    }

    .certificate-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 10px;
      line-height: 1.4;
      text-shadow: 
        0 2px 8px rgba(0, 0, 0, 0.6),
        0 0 20px rgba(204, 0, 0, 0.15);
      letter-spacing: 0.3px;
    }

    .certificate-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .certificate-meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #999;
    }

    .certificate-meta-item i {
      color: #CC0000;
      width: 16px;
    }

    .certificate-description {
      font-size: 0.9rem;
      color: #c3adad;
      line-height: 1.5;
      margin-bottom: 15px;
    }

    .certificate-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
    }

    .tag {
      background: rgba(204, 0, 0, 0.12);
      color: #ff5c5c;
      padding: 5px 11px;
      border-radius: 999px;
      font-size: 0.75rem;
      border: 1px solid rgba(204, 0, 0, 0.22);
    }

    .certificate-actions {
      display: flex;
      gap: 10px;
    }

    .cert-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }
    
    .cert-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease;
      border-radius: 50%;
    }
    
    .cert-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .cert-btn-view {
      background: linear-gradient(135deg, 
        rgba(204, 0, 0, 0.95), 
        rgba(145, 0, 0, 0.88),
        rgba(95, 0, 0, 0.82)
      );
      color: white;
      box-shadow: 
        0 3px 12px rgba(204, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.15),
        inset 0 -1px 0 rgba(0, 0, 0, 0.4);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .cert-btn-download {
      background: linear-gradient(135deg, 
        rgba(64, 10, 10, 0.42), 
        rgba(44, 6, 6, 0.28),
        rgba(26, 2, 2, 0.22)
      );
      color: #ffd4d4;
      border: 1.5px solid rgba(204, 0, 0, 0.25);
      box-shadow: 
        0 3px 12px rgba(204, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.4);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .cert-btn:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 6px 20px rgba(204, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    
    .cert-btn:active {
      transform: translateY(-1px) scale(0.98);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #1a1a1a;
      border: 2px solid rgba(204, 0, 0, 0.5);
      border-radius: 12px;
      max-width: 1400px;
      width: 95%;
      max-height: 95vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid rgba(204, 0, 0, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-close {
      background: rgba(204, 0, 0, 0.2);
      border: 1px solid rgba(204, 0, 0, 0.4);
      color: #CC0000;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .modal-close:hover {
      background: #CC0000;
      color: white;
    }

    .modal-body {
      padding: 20px;
    }

    .modal-image-container {
      width: 100%;
      min-height: 600px;
      height: 75vh;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      border: 2px solid rgba(204, 0, 0, 0.3);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .modal-image-container > * {
      position: relative;
      z-index: 2;
    }

    .modal-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(204, 0, 0, 0.3));
    }

    .modal-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .modal-info-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .modal-info-label {
      font-size: 0.85rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal-info-value {
      font-size: 1rem;
      color: #fff;
      font-weight: 500;
    }

    .modal-actions {
      display: flex;
      gap: 15px;
    }

    .modal-btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .modal-btn-download {
      background: #CC0000;
      color: white;
    }

    .modal-btn-share {
      background: rgba(204, 0, 0, 0.2);
      color: #CC0000;
      border: 1px solid rgba(204, 0, 0, 0.4);
    }

    .modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(204, 0, 0, 0.4);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #987676;
    }

    .empty-state i {
      font-size: 4rem;
      color: rgba(204, 0, 0, 0.3);
      margin-bottom: 20px;
    }

    .empty-state h3 {
      font-size: 1.3rem;
      color: #999;
      margin-bottom: 10px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      border: 4px solid rgba(204, 0, 0, 0.2);
      border-top: 4px solid #CC0000;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Desktop Optimizations */
    @media (min-width: 769px) {
      .header-title h1 {
        font-size: 2rem;
      }

      .certificates-grid {
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      }

      .certificate-thumbnail {
        height: 250px;
      }
    }

    /* Mobile Optimizations */
    @media (max-width: 768px) {
      body {
        padding-top: 0;
      }

      .header {
        top: 0;
      }

      .filter-container {
        flex-direction: column;
      }

      .filter-btn {
        width: 100%;
        justify-content: center;
      }

      .stats-bar,
      .filter-bar {
        margin-left: 12px;
        margin-right: 12px;
      }

      .category-section {
        padding: 18px;
        border-radius: 22px;
      }

      .certificates-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        max-height: 95vh;
      }

      .modal-actions {
        flex-direction: column;
      }

      .modal-image-container {
        min-height: 400px;
        height: 60vh;
      }

      /* Mobile PDF viewer fix */
      .modal-image-container embed,
      .modal-image-container iframe {
        width: 100% !important;
        height: 100% !important;
      }
    }
  </style>
<style>
/* wg-footer */
.wg-footer{position:relative;margin:80px auto 0;max-width:1400px;background:linear-gradient(135deg,rgba(25,12,12,0.96),rgba(18,8,8,0.98));border-radius:20px;padding:56px 36px 44px;text-align:center;overflow:hidden;box-shadow:0 -6px 30px rgba(0,0,0,0.4),0 4px 20px rgba(204,0,0,0.08),inset 0 1px 0 rgba(204,0,0,0.15)}
.wg-footer::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:110px;height:2px;background:linear-gradient(90deg,transparent,#cc0000,transparent);border-radius:2px}

</style>
</head>
<body>

  <div class="bg-system-container">
    <div class="bg-hero-bg-elements">
      <div class="bg-geometric-shapes">
        <div class="bg-shape bg-shape-1"></div>
        <div class="bg-shape bg-shape-2"></div>
        <div class="bg-shape bg-shape-3"></div>

      </div>

    </div>

    <div class="bg-system-overlay"></div>
    <div class="bg-system-content">

  <!-- Desktop Navigation -->
  <nav class="desktop-navbar" id="desktopNavbar" aria-label="Desktop Navigation">
    <div class="desktop-nav-container">
      <a href="../Home/index.html" class="desktop-nav-logo" title="A3KM Studio - Home" aria-label="A3KM Studio Home">

          <a href="CV/Akhinoor_Islam_CV_2026.pdf" class="desktop-nav-link desktop-nav-cv-btn" download="Md_Akhinoor_Islam_CV_2026.pdf" title="Download CV" aria-label="Download CV PDF">

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stats-container">
      <div class="stat-item">
        <div class="stat-number" id="totalCount">0</div>
        <div class="stat-label">Total Certificates</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="academicCount">0</div>
        <div class="stat-label">Academic</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="skillCount">0</div>
        <div class="stat-label">Skills</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="medicalCount">0</div>
        <div class="stat-label">Medical</div>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-container">
      <button class="filter-btn active" data-filter="all">
        <i class="fas fa-list"></i>
        All Certificates
      </button>
      <button class="filter-btn" data-filter="Academic">
        <i class="fas fa-graduation-cap"></i>
        Academic
      </button>
      <button class="filter-btn" data-filter="Skill">
        <i class="fas fa-award"></i>
        Skills
      </button>
      <button class="filter-btn" data-filter="Medical">
        <i class="fas fa-heart-pulse"></i>
        Medical
      </button>
      <button class="filter-btn" data-filter="featured">
        <i class="fas fa-star"></i>
        Featured
      </button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search certificates...">
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div id="loadingState" class="loading">
      <div class="spinner"></div>
      <p>Loading certificates...</p>
    </div>
    <div id="certificatesContainer"></div>
  </div>

  <!-- Certificate Modal -->
  <div id="certificateModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" onclick="closeModal()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-image-container" id="modalImageContainer">
          <img id="modalImage" class="modal-image" src="" alt="">
        </div>
        <div class="modal-info" id="modalInfo"></div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-download" onclick="downloadCertificate()">
            <i class="fas fa-download"></i>
            Download Certificate
          </button>
          <button class="modal-btn modal-btn-share" onclick="shareCertificate()">
            <i class="fas fa-share-alt"></i>
            Share
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let certificatesData = null;
    let currentFilter = 'all';
    let currentCertificate = null;

    // Load certificates data
    async function loadCertificates() {
      try {
        console.log('Loading certificates data...');
        const response = await fetch('certificates-data.json');
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        certificatesData = await response.json();
        console.log('Certificates data loaded:', certificatesData);
        
        // Validate data structure
        if (!certificatesData.stats || !certificatesData.categories) {
          throw new Error('Invalid data structure');
        }
        
        // Update stats with actual data
        document.getElementById('totalCount').textContent = certificatesData.stats.totalCertificates || 0;
        document.getElementById('academicCount').textContent = certificatesData.stats.academicCount || 0;
        document.getElementById('skillCount').textContent = certificatesData.stats.skillCount || 0;
        document.getElementById('medicalCount').textContent = certificatesData.stats.medicalCount || 0;

        // Hide loading
        document.getElementById('loadingState').style.display = 'none';
        
        // Render certificates with initial filter
        console.log('Rendering certificates...');
        renderCertificates();
        console.log('Certificates rendered successfully');
      } catch (error) {
        console.error('Error loading certificates:', error);
        document.getElementById('loadingState').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Error Loading Certificates</h3>
            <p>${error.message || 'Please try again later'}</p>
            <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px; background: #CC0000; color: white; border: none; border-radius: 6px; cursor: pointer;">
              <i class="fas fa-redo"></i> Retry
            </button>
          </div>
        `;
      }
    }

    // Render certificates
    function renderCertificates(filter = 'all', searchTerm = '') {
      console.log('Rendering with filter:', filter, 'search:', searchTerm);
      
      if (!certificatesData || !certificatesData.categories) {
        console.error('No certificates data available');
        return;
      }
      
      const container = document.getElementById('certificatesContainer');
      container.innerHTML = '';

      let hasResults = false;

      // Define category order for consistent display
      const categoryOrder = ['Academic', 'Skill', 'Medical'];
      
      categoryOrder.forEach(categoryKey => {
        if (!certificatesData.categories[categoryKey]) {
          console.warn(`Category ${categoryKey} not found in data`);
          return;
        }
        
        const category = certificatesData.categories[categoryKey];
        
        if (!category.certificates || !Array.isArray(category.certificates)) {
          console.warn(`No certificates array in category ${categoryKey}`);
          return;
        }
        
        // Filter certificates - CASE INSENSITIVE MATCHING
        let certificates = category.certificates.filter(cert => {
          const matchesFilter = filter === 'all' || 
                               filter.toLowerCase() === categoryKey.toLowerCase() || 
                               (filter === 'featured' && cert.featured);
          const matchesSearch = searchTerm === '' || 
                               cert.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                               cert.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                               (cert.tags && cert.tags.some(tag => tag.toLowerCase().includes(searchTerm.toLowerCase())));
          return matchesFilter && matchesSearch;
        });

        console.log(`Category ${categoryKey}: ${certificates.length} certificates after filter`);

        if (certificates.length === 0) return;
        hasResults = true;

        // Create category section
        const section = document.createElement('div');
        section.className = 'category-section';
        section.innerHTML = `
          <div class="category-header">
            <i class="fas ${category.icon}"></i>
            <h2>${category.displayName}</h2>
            <span class="category-count">${certificates.length} certificate${certificates.length > 1 ? 's' : ''}</span>
          </div>
          <p class="category-description">${category.description}</p>
          <div class="certificates-grid" id="grid-${categoryKey}"></div>
        `;
        container.appendChild(section);

        const grid = document.getElementById(`grid-${categoryKey}`);

        // Render certificates
        certificates.forEach(cert => {
          const card = createCertificateCard(cert);
          grid.appendChild(card);
        });
      });

      if (!hasResults) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-search"></i>
            <h3>No Certificates Found</h3>
            <p>Try adjusting your filters or search term</p>
          </div>
        `;
      }
    }

    // Create certificate card
    function createCertificateCard(cert) {
      const card = document.createElement('div');
      card.className = 'certificate-card';
      card.onclick = () => openModal(cert);

      const safeCert = cert || {};
      const rawFilePath = String(safeCert.filePath || safeCert.thumbnail || '');
      const inferredExt = rawFilePath.includes('.') ? rawFilePath.split('.').pop().toLowerCase() : '';
      const safeFileType = String(safeCert.fileType || inferredExt || '').toLowerCase();
      const safeTitle = safeCert.title || 'Untitled Certificate';
      const safeIssuedBy = safeCert.issuedBy || 'Unknown Issuer';
      const safeIssuedDate = safeCert.issuedDate || 'Date Not Available';
      const safeDescription = safeCert.description || 'No description available.';
      const safeTags = Array.isArray(safeCert.tags) ? safeCert.tags : [];
      const safeFilePath = rawFilePath;
      const safeFileName = safeCert.fileName || 'certificate';

      // Fix thumbnail path - ensure proper relative path
      let thumbnailPath = String(safeCert.thumbnail || safeFilePath || '');
      
      // Normalize thumbnail path safely without relying on startsWith.
      if (!thumbnailPath) {
        thumbnailPath = '';
      } else {
        const normalizedPath = String(thumbnailPath);
        const isCertificatesPath = normalizedPath.slice(0, 13) === 'CERTIFICATES/';
        const isRelativePath = normalizedPath.slice(0, 3) === '../';
        thumbnailPath = (isCertificatesPath || isRelativePath) ? normalizedPath : normalizedPath;
      }
      
      // For images, use the actual file path
      const fullImagePath = thumbnailPath;

      // Determine thumbnail content based on file type
      const isPDF = safeFileType === 'pdf';
      const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(safeFileType);
      
      let thumbnailContent = '';
      if (isPDF) {
        // Show PDF icon for PDF files
        thumbnailContent = `
          <div class="placeholder" style="display:flex;">
            <i class="fas fa-file-pdf pdf-icon"></i>
            <span class="pdf-label">PDF Certificate</span>
          </div>
        `;
      } else if (isImage) {
        // Show image with fallback - improved loading
        thumbnailContent = `
          <img src="${fullImagePath}" 
               alt="${safeTitle}" 
               loading="lazy"
               style="display:block; width:100%; height:100%; object-fit:cover;"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="placeholder" style="display:none; flex-direction:column; text-align:center; padding:20px;">
            <i class="fas fa-certificate" style="font-size:4rem; color:#CC0000; margin-bottom:15px;"></i>
            <div style="font-size:1rem; color:#fff; font-weight:600; margin-bottom:8px;">${safeTitle}</div>
            <div style="font-size:0.85rem; color:#999; margin-bottom:5px;">
              <i class="fas fa-building" style="margin-right:5px;"></i>${safeIssuedBy}
            </div>
            <div style="font-size:0.75rem; color:#CC0000; background:rgba(204,0,0,0.15); padding:6px 12px; border-radius:20px; margin-top:10px; border:1px solid rgba(204,0,0,0.3);">
              <i class="fas fa-image" style="margin-right:5px;"></i>Image Preview Unavailable
            </div>
          </div>
        `;
      } else {
        // Generic file icon with certificate info
        thumbnailContent = `
          <div class="placeholder" style="display:flex; flex-direction:column; text-align:center; padding:20px;">
            <i class="fas fa-file-alt" style="font-size:4rem; color:#CC0000; margin-bottom:15px;"></i>
            <div style="font-size:1rem; color:#fff; font-weight:600; margin-bottom:8px;">${safeTitle}</div>
            <div style="font-size:0.75rem; color:#999;">
              <i class="fas fa-file" style="margin-right:5px;"></i>${(safeFileType || 'file').toUpperCase()} Document
            </div>
          </div>
        `;
      }

      card.innerHTML = `
        <div class="certificate-thumbnail">
          ${thumbnailContent}
          ${safeCert.verified ? '<div class="certificate-badge">Verified</div>' : ''}
        </div>
        <div class="certificate-info">
          <h3 class="certificate-title">${safeTitle}</h3>
          <div class="certificate-meta">
            <div class="certificate-meta-item">
              <i class="fas fa-building"></i>
              <span>${safeIssuedBy}</span>
            </div>
            <div class="certificate-meta-item">
              <i class="fas fa-calendar"></i>
              <span>${safeIssuedDate}</span>
            </div>
            <div class="certificate-meta-item">
              <i class="fas fa-file"></i>
              <span>${(safeFileType || 'file').toUpperCase()}</span>
            </div>
          </div>
          <p class="certificate-description">${safeDescription}</p>
          <div class="certificate-tags">
            ${safeTags.map(tag => `<span class="tag">#${String(tag)}</span>`).join('')}
          </div>
          <div class="certificate-actions">
            <button class="cert-btn cert-btn-view" onclick="event.stopPropagation(); openModal(${JSON.stringify(safeCert).replace(/"/g, '&quot;')})">
              <i class="fas fa-eye"></i>
              View
            </button>
            <button class="cert-btn cert-btn-download" onclick="event.stopPropagation(); downloadCert('${safeFilePath}', '${safeFileName}')">
              <i class="fas fa-download"></i>
              Download
            </button>
          </div>
        </div>
      `;

      return card;
    }

    // Open modal
    function openModal(cert) {
      const safeCert = cert || {};
      currentCertificate = safeCert;
      
      const certPath = String(safeCert.filePath || safeCert.thumbnail || '');
      const inferredExt = certPath.includes('.') ? certPath.split('.').pop().toLowerCase() : '';
      const fileExt = String(safeCert.fileType || inferredExt || '').toLowerCase();
      
      // Close any open modal first
      closeModal();
      
      // Detect file type properly
      const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'svg'];
      const pdfExtensions = ['pdf'];
      
      const isImage = imageExtensions.includes(fileExt);
      const isPDF = pdfExtensions.includes(fileExt);
      
      console.log('Opening certificate:', safeCert.title || 'Untitled', 'Type:', fileExt, 'IsImage:', isImage, 'IsPDF:', isPDF);
      
      // For images - use image lightbox
      if (isImage) {
        openImageLightbox(certPath, safeCert.title || 'Certificate');
        return;
      }
      
      // For PDFs - use Universal PDF Viewer
      if (isPDF && typeof openUniversalPDFViewer === 'function') {
        openUniversalPDFViewer({
          filePath: certPath,
          fileType: fileExt,
          title: `${safeCert.title || 'Certificate'}`,
          downloadName: `${String(safeCert.title || 'certificate').replace(/[^a-z0-9]/gi, '_')}.${fileExt || 'pdf'}`,
          showDownload: true,
          allowZoom: true
        });
        return;
      }
      
      // Fallback to modal for non-universal viewer support
      const modal = document.getElementById('certificateModal');
      document.getElementById('modalTitle').textContent = safeCert.title || 'Certificate';
      
      const modalContent = document.querySelector('.modal-image-container');
      
      if (isImage) {
        // Show image with premium styling
        modalContent.innerHTML = `
          <img class="modal-image" id="modalImage" src="${certPath}" alt="${safeCert.title || 'Certificate'}">
        `;
      } else {
        // Fallback
        modalContent.innerHTML = `
          <div style="text-align: center; padding: 40px; color: #999;">
            <i class="fas fa-file fa-3x" style="margin-bottom: 20px;"></i>
            <p>Preview not available for this file type</p>
            <p>Click download to view the file</p>
          </div>
        `;
      }
      
      document.getElementById('modalInfo').innerHTML = `
        <div class="modal-info-item">
          <span class="modal-info-label">Issued By</span>
          <span class="modal-info-value">${safeCert.issuedBy || 'Unknown Issuer'}</span>
        </div>
        <div class="modal-info-item">
          <span class="modal-info-label">Issue Date</span>
          <span class="modal-info-value">${safeCert.issuedDate || 'Date Not Available'}</span>
        </div>
        <div class="modal-info-item">
          <span class="modal-info-label">Category</span>
          <span class="modal-info-value">${safeCert.category || 'General'} - ${safeCert.subcategory || 'Document'}</span>
        </div>
        <div class="modal-info-item">
          <span class="modal-info-label">File Type</span>
          <span class="modal-info-value">${(fileExt || 'file').toUpperCase()}</span>
        </div>
        <div class="modal-info-item">
          <span class="modal-info-label">Status</span>
          <span class="modal-info-value">${safeCert.verified ? 'Verified' : 'Pending'}</span>
        </div>
        <div class="modal-info-item">
          <span class="modal-info-label">Description</span>
          <span class="modal-info-value">${safeCert.description || 'No description available.'}</span>
        </div>
      `;

      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // Close modal
    function closeModal() {
      document.getElementById('certificateModal').classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // Download certificate
    function downloadCertificate() {
      if (currentCertificate) {
        // Fix path for download
        const downloadPath = currentCertificate.filePath;
        downloadCert(downloadPath, currentCertificate.fileName);
      }
    }

    // Download helper
    function downloadCert(filePath, fileName) {
      // Ensure path is correct
      const correctPath = filePath;
      const link = document.createElement('a');
      link.href = correctPath;
      link.download = fileName;
      link.click();
    }
    
    // Image Lightbox for desktop certificates
    function openImageLightbox(imagePath, imageTitle) {
      const lightbox = document.createElement('div');
      lightbox.id = 'desktop-image-lightbox';
      lightbox.style.cssText = `
        position: fixed;
        inset: 0;
        z-index: 999999;
        background: rgba(0,0,0,0.98);
        display: flex;
        flex-direction: column;
        animation: fadeIn 0.3s ease;
      `;
      
      lightbox.innerHTML = `
        <style>
          @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
          @keyframes zoomIn { from { transform: scale(0.9); } to { transform: scale(1); } }
        </style>
        <div style="
          position: sticky;
          top: 0;
          z-index: 100;
          padding: 16px 24px;
          background: rgba(0,0,0,0.98);
          backdrop-filter: blur(10px);
          border-bottom: 2px solid rgba(139,0,0,0.4);
          box-shadow: 0 2px 15px rgba(204,0,0,0.3);
          display: flex;
          justify-content: space-between;
          align-items: center;
        ">
          <div style="font-size: 18px; font-weight: 700; color: #FFFFFF;">
            ${imageTitle}
          </div>
          <div style="display: flex; gap: 10px;">
            <button onclick="window.downloadImageDirect('${imagePath}', '${imageTitle}')" style="
              padding: 10px 20px;
              background: linear-gradient(135deg, rgba(204,0,0,0.3), rgba(204,0,0,0.2));
              border: 1.5px solid rgba(204,0,0,0.4);
              border-radius: 10px;
              color: #FF3333;
              font-size: 14px;
              font-weight: 600;
              cursor: pointer;
            ">
              <i class="fas fa-download"></i> Download
            </button>
            <button onclick="this.closest('#desktop-image-lightbox').remove()" style="
              padding: 10px 20px;
              background: linear-gradient(135deg, rgba(204,0,0,0.3), rgba(204,0,0,0.2));
              border: 1.5px solid rgba(204,0,0,0.4);
              border-radius: 10px;
              color: #FF3333;
              font-size: 14px;
              font-weight: 600;
              cursor: pointer;
            ">
              <i class="fas fa-times"></i> Close
            </button>
          </div>
        </div>
        <div style="
          flex: 1;
          overflow: auto;
          background: #0a0a0a;
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 40px;
        ">
          <img src="${imagePath}" alt="${imageTitle}" style="
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 12px 48px rgba(204,0,0,0.4);
            border-radius: 12px;
            animation: zoomIn 0.3s ease;
            cursor: zoom-in;
          " onclick="this.style.maxWidth = this.style.maxWidth === '100%' ? 'none' : '100%'; this.style.cursor = this.style.cursor === 'zoom-in' ? 'zoom-out' : 'zoom-in';">
        </div>
        <div style="
          padding: 16px 24px;
          background: rgba(0,0,0,0.95);
          border-top: 1px solid rgba(139,0,0,0.3);
          text-align: center;
          font-size: 13px;
          color: rgba(180,180,180,0.8);
        ">
          <i class="fas fa-mouse-pointer"></i> Click image to zoom | Press ESC to close
        </div>
      `;
      
      document.body.appendChild(lightbox);
      
      // Close on ESC
      const closeOnEsc = (e) => {
        if (e.key === 'Escape') {
          lightbox.remove();
          document.removeEventListener('keydown', closeOnEsc);
        }
      };
      document.addEventListener('keydown', closeOnEsc);
      
      console.log('Desktop image lightbox opened:', imageTitle);
    }
    
    // Helper for image downloads
    window.downloadImageDirect = function(imagePath, imageName) {
      const link = document.createElement('a');
      link.href = imagePath;
      link.download = imageName;
      link.target = '_blank';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      console.log('Image download started:', imageName);
    };

    // Share certificate
    function shareCertificate() {
      if (navigator.share && currentCertificate) {
        navigator.share({
          title: currentCertificate.title,
          text: `Check out my certificate: ${currentCertificate.title}`,
          url: window.location.href
        }).catch(err => console.log('Error sharing:', err));
      } else {
        alert('Sharing not supported on this device');
      }
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        console.log('Filter button clicked:', this.dataset.filter);
        
        // Remove active class from all buttons
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        
        // Add active class to clicked button
        this.classList.add('active');
        
        // Get filter value
        const filterValue = this.dataset.filter;
        currentFilter = filterValue;
        
        // Get search term
        const searchTerm = document.getElementById('searchInput').value;
        
        // Render with new filter
        console.log('Applying filter:', filterValue);
        renderCertificates(filterValue, searchTerm);
      });
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const searchValue = e.target.value;
      console.log('Search input:', searchValue);
      renderCertificates(currentFilter, searchValue);
    });

    // Close modal on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // Desktop navbar scroll effect
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('desktopNavbar');
      if (!navbar) return;
      if (window.scrollY > 40) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });

    // Load on page load
    loadCertificates();
  </script>

  <script src="../mobile/shared/pdf-viewer.js"></script>
  <script src="../Optimization/Background/background-system.js"></script>
  <script src="../Optimization/fullscreen-init.js"></script>
    </div>
  </div>
</body>
