<?xml version="1.0" encoding="UTF-8"?>
<!--
  A3KM Studio — Logo Concept 4: "Minimal Precision Mark"
  Style: Ultra-minimal — a sharp geometric arrow/sigma pointing forward,
         like a precision instrument vector. Think: engineering meets typography.
  Color: Pure white mark on black, single red accent
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="A3KM Studio Logo">
  <defs>
    <linearGradient id="g4-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1111"/>
      <stop offset="100%" stop-color="#AA0000"/>
    </linearGradient>
  </defs>

  <!-- Background — pure minimal square with rounded corners -->
  <rect width="200" height="200" rx="20" fill="#0C0000"/>

  <!-- The mark: bold custom "A" that doubles as an upward arrow/chevron -->
  <!-- Left leg -->
  <path d="M50,148 L82,52 L100,52" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Right leg -->
  <path d="M150,148 L118,52 L100,52" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Crossbar — RED, this is the signature accent -->
  <line x1="63" y1="110" x2="137" y2="110" stroke="url(#g4-red)" stroke-width="9" stroke-linecap="square"/>

  <!-- Negative-space "3" cut into the right leg — achieved with a red shape -->
  <!-- Small "3" as a precise stencil feel element, top-right of the A -->
  <text x="120" y="94" font-family="'Arial Black', 'Impact', sans-serif" font-size="28" font-weight="900"
        fill="#0C0000" letter-spacing="-1">3</text>

  <!-- A subtle red outline "3" sitting on white leg -->
  <text x="120" y="94" font-family="'Arial Black', 'Impact', sans-serif" font-size="28" font-weight="900"
        fill="none" stroke="#CC0000" stroke-width="1.5" letter-spacing="-1">3</text>

  <!-- Bottom wordmark -->
  <text x="100" y="176" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11" font-weight="700"
        fill="rgba(255,255,255,0.7)" letter-spacing="6">A3KM</text>

  <text x="100" y="190" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="7" font-weight="400"
        fill="rgba(200,0,0,0.7)" letter-spacing="4">STUDIO</text>

  <!-- Top-right corner micro mark -->
  <rect x="165" y="14" width="22" height="4" rx="2" fill="url(#g4-red)"/>
  <rect x="182" y="14" width="4" height="22" rx="2" fill="url(#g4-red)"/>
</svg>
