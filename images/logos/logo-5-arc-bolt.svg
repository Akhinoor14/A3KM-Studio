<?xml version="1.0" encoding="UTF-8"?>
<!--
  A3KM Studio — Logo Concept 5: "Arc & Bolt"
  Style: Broken circle arc (like a power/energy symbol) with a lightning bolt
         cutting through. Very strong, electric feel — energy engineering identity.
  Color: Red + white on near-black
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="A3KM Studio Logo">
  <defs>
    <linearGradient id="g5-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2A2A"/>
      <stop offset="100%" stop-color="#BB0000"/>
    </linearGradient>
    <linearGradient id="g5-white" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CCCCCC"/>
    </linearGradient>
    <filter id="f5-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Black square background -->
  <rect width="200" height="200" rx="22" fill="#080000"/>

  <!-- Outer arc circle — bottom gap (power symbol style) broken at top -->
  <!-- Left arc: from ~210deg to 90deg (going clockwise) -->
  <path d="M100,24 A76,76 0 1,0 100,176" fill="none"
        stroke="rgba(255,255,255,0.15)" stroke-width="8" stroke-linecap="round"/>

  <!-- Red glowing arc overlay — partial highlight -->
  <path d="M100,24 A76,76 0 0,1 163,162" fill="none"
        stroke="url(#g5-red)" stroke-width="8" stroke-linecap="round"
        filter="url(#f5-glow)"/>

  <!-- Lightning bolt — the core symbol, white -->
  <polygon points="108,46  88,105 102,105 92,154 118,88 104,88 116,46"
           fill="url(#g5-white)" filter="url(#f5-glow)"/>

  <!-- Red inner shadow on bolt -->
  <polygon points="108,46  88,105 102,105 92,154 118,88 104,88 116,46"
           fill="none" stroke="rgba(255,0,0,0.3)" stroke-width="1.5"/>

  <!-- "A3KM" wordmark -->
  <text x="100" y="191" text-anchor="middle"
        font-family="'Arial Black', sans-serif" font-size="12" font-weight="900"
        fill="#FFFFFF" letter-spacing="4">A3KM</text>

  <!-- Red dot accent between A and 3 -->
  <circle cx="100" cy="183" r="1.5" fill="#FF2222"/>
</svg>
