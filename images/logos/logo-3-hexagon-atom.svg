<?xml version="1.0" encoding="UTF-8"?>
<!--
  A3KM Studio — Logo Concept 3: "Hexagon Atom Core"
  Style: Atomic orbital rings inside a hexagon — energy science + engineering fusion
  Color: Red, white, dark background with glow
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="A3KM Studio Logo">
  <defs>
    <linearGradient id="g3-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2222"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <linearGradient id="g3-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100000"/>
      <stop offset="100%" stop-color="#050000"/>
    </linearGradient>
    <filter id="f3-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f3-softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#g3-bg)"/>

  <!-- Outer hexagon border -->
  <polygon points="100,12 175,56 175,144 100,188 25,144 25,56"
           fill="none" stroke="rgba(180,0,0,0.35)" stroke-width="1.8"/>

  <!-- Inner hexagon -->
  <polygon points="100,32 158,66 158,134 100,168 42,134 42,66"
           fill="rgba(15,0,0,0.5)" stroke="rgba(180,0,0,0.18)" stroke-width="1"/>

  <!-- Orbital ring 1 — tilted 0deg -->
  <ellipse cx="100" cy="100" rx="52" ry="18"
           fill="none" stroke="rgba(255,40,40,0.65)" stroke-width="1.8"
           filter="url(#f3-glow)"/>

  <!-- Orbital ring 2 — tilted 60deg -->
  <ellipse cx="100" cy="100" rx="52" ry="18"
           fill="none" stroke="rgba(255,40,40,0.55)" stroke-width="1.8"
           transform="rotate(60 100 100)"
           filter="url(#f3-glow)"/>

  <!-- Orbital ring 3 — tilted 120deg -->
  <ellipse cx="100" cy="100" rx="52" ry="18"
           fill="none" stroke="rgba(255,40,40,0.55)" stroke-width="1.8"
           transform="rotate(120 100 100)"
           filter="url(#f3-glow)"/>

  <!-- Center nucleus -->
  <circle cx="100" cy="100" r="10" fill="url(#g3-red)" filter="url(#f3-softglow)"/>
  <circle cx="100" cy="100" r="5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Electron dots -->
  <circle cx="152" cy="100" r="3.5" fill="#FF3333" filter="url(#f3-glow)"/>
  <circle cx="74" cy="55"   r="3.5" fill="#FF3333" filter="url(#f3-glow)" transform="rotate(60 100 100)"/>
  <circle cx="74" cy="55"   r="3.5" fill="#FF3333" filter="url(#f3-glow)" transform="rotate(120 100 100)"/>

  <!-- "A3KM" text below -->
  <text x="100" y="192" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="13" font-weight="900"
        fill="#FFFFFF" letter-spacing="3">A3KM</text>
</svg>
