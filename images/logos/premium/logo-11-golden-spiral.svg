<circle cx="200" cy="200" r="5" fill="#FF1A1A" filter="url(#glow2)"/>
<text x="200" y="378" text-anchor="middle" font-family="Courier New,monospace" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="4" font-weight="bold">A3KM STUDIO</text>
</svg>