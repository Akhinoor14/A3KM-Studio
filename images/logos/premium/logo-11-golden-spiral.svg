<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400"><rect width="400" height="400" fill="#050000"/>
<defs>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<defs>
  <linearGradient id="g11" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FF5555" stop-opacity="0.4"/>
    <stop offset="50%" stop-color="#FF2222" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#990000" stop-opacity="0.7"/>
  </linearGradient>
</defs>
<!-- Subtle grid squares showing Fibonacci tiling -->
<rect x="197" y="197" width="6" height="6" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/><rect x="197" y="203" width="6" height="6" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/><rect x="191" y="197" width="12" height="12" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/><rect x="191" y="185" width="19" height="19" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/><rect x="210" y="185" width="31" height="31" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/><rect x="210" y="216" width="50" height="50" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/><rect x="160" y="166" width="81" height="81" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
<!-- Golden spiral stroke -->
<path d="M 196.8,200.0 A 3.2,3.2 0 0,1 200.0,196.8 A 3.2,3.2 0 0,1 203.2,203.2 A 6.4,6.4 0 0,1 196.8,209.6 A 9.600000000000001,9.600000000000001 0 0,1 187.2,196.8 A 16.0,16.0 0 0,1 206.4,180.8 A 25.6,25.6 0 0,1 232.0,212.8 A 41.6,41.6 0 0,1 180.8,254.4 A 67.2,67.2 0 0,1 113.6,171.2 A 108.80000000000001,108.80000000000001 0 0,1 248.0,62.4" fill="none" stroke="url(#g11)" stroke-width="5"
      stroke-linecap="round" filter="url(#glow)"/>
