<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400"><rect width="400" height="400" fill="#050000"/>
<defs>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<defs>
  <linearGradient id="g05" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FF2222"/>
    <stop offset="100%" stop-color="#880000"/>
  </linearGradient>
</defs>
<!-- Outer hexagon ring (thick) -->
<polygon points="325.6,272.5 200.0,345.0 74.4,272.5 74.4,127.5 200.0,55.0 325.6,127.5"
         fill="none" stroke="url(#g05)" stroke-width="12" stroke-linejoin="round"
         filter="url(#glow)"/>
<!-- Inner hexagon (thinner, rotated) -->
<polygon points="318.0,200.0 259.0,302.2 141.0,302.2 82.0,200.0 141.0,97.8 259.0,97.8"
         fill="none" stroke="rgba(255,50,50,0.25)" stroke-width="1.5" stroke-linejoin="round"/>
<!-- Tick marks at corners -->
<line x1="315.2" y1="266.5"
             x2="338.6" y2="280.0"
             stroke="#FF1A1A" stroke-width="2.5" stroke-linecap="round"/><line x1="200.0" y1="333.0"
             x2="200.0" y2="360.0"
             stroke="#FF1A1A" stroke-width="2.5" stroke-linecap="round"/><line x1="84.8" y1="266.5"
             x2="61.4" y2="280.0"
             stroke="#FF1A1A" stroke-width="2.5" stroke-linecap="round"/><line x1="84.8" y1="133.5"
             x2="61.4" y2="120.0"
             stroke="#FF1A1A" stroke-width="2.5" stroke-linecap="round"/><line x1="200.0" y1="67.0"
             x2="200.0" y2="40.0"
             stroke="#FF1A1A" stroke-width="2.5" stroke-linecap="round"/><line x1="315.2" y1="133.5"
             x2="338.6" y2="120.0"
             stroke="#FF1A1A" stroke-width="2.5" stroke-linecap="round"/>
<!-- Large A inside -->
<text x="200" y="262" text-anchor="middle" font-family="Georgia,serif"
      font-size="160" fill="url(#g05)" font-weight="bold" filter="url(#glow)">A</text>
<!-- Sub-label -->
<text x="200" y="295" text-anchor="middle" font-family="Courier New,monospace"
      font-size="11" fill="rgba(255,100,100,0.5)" letter-spacing="6">3KM</text>
<text x="200" y="378" text-anchor="middle" font-family="Courier New,monospace" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="4" font-weight="bold">A3KM STUDIO</text>
</svg>