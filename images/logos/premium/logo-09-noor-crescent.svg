<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400"><rect width="400" height="400" fill="#050000"/>
<defs>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<defs>
  <radialGradient id="moon-grd" cx="38%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#FF4444"/>
    <stop offset="100%" stop-color="#880000"/>
  </radialGradient>
  <radialGradient id="star-grd" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#FFAAAA"/>
  </radialGradient>
</defs>
<!-- Crescent: big circle minus smaller offset circle via clip path -->
<defs>
  <clipPath id="cres-clip">
    <circle cx="200" cy="200" r="140"/>
  </clipPath>
</defs>
<!-- Main moon circle -->
<circle cx="200" cy="200" r="140" fill="url(#moon-grd)" filter="url(#glow)"/>
<!-- Cut-out circle (crescent bite) -->
<circle cx="238" cy="200" r="115" fill="#050000"/>
<!-- Subtle rim light on crescent edge -->
<circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,80,80,0.4)" stroke-width="2"/>
<!-- A star inside crescent pocket -->
<text x="155" y="228" text-anchor="middle" font-family="Georgia,serif"
      font-size="80" fill="url(#star-grd)" font-weight="bold"
      filter="url(#glow)">A</text>
<!-- Arabic-style dot constellation: 3 dots representing "Noor" -->
<circle cx="320" cy="150" r="6" fill="#FFFFFF" filter="url(#glow2)" opacity="0.9"/>
<circle cx="346" cy="178" r="4" fill="#FFFFFF" opacity="0.6"/>
<circle cx="340" cy="210" r="3" fill="#FFFFFF" opacity="0.4"/>
<text x="200" y="378" text-anchor="middle" font-family="Courier New,monospace" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="4" font-weight="bold">NOOR ACADEMY · A3KM STUDIO</text>
</svg>