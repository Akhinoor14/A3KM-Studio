<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400"><rect width="400" height="400" fill="#050000"/>
<defs>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<defs>
  <linearGradient id="face1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FF2222"/>
    <stop offset="100%" stop-color="#CC0000"/>
  </linearGradient>
  <linearGradient id="face2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#AA0000"/>
    <stop offset="100%" stop-color="#770000"/>
  </linearGradient>
  <linearGradient id="face3" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FF4444"/>
    <stop offset="100%" stop-color="#DD2222"/>
  </linearGradient>
</defs>
<!-- Isometric 3D letter A: decomposed into visible faces -->
<!-- Front face (brightest) -->
<polygon points="200,70 280,230 260,230 200,115 140,230 120,230"
         fill="url(#face1)"/>
<!-- Left side depth face -->
<polygon points="120,230 140,230 148,250 128,250"
         fill="url(#face2)"/>
<!-- Right side depth face -->  
<polygon points="260,230 280,230 288,250 268,250"
         fill="url(#face2)" opacity="0.8"/>
<!-- Left leg bottom face -->
<polygon points="120,230 140,230 148,250 128,250"
         fill="url(#face2)"/>
<!-- Cross bar front -->
<rect x="152" y="187" width="96" height="18" fill="url(#face1)"/>
<!-- Cross bar top face (lighter, 3D effect) -->
<polygon points="152,187 248,187 252,179 148,179"
         fill="url(#face3)"/>
<!-- Left leg front -->
<polygon points="120,232 200,70 200,115 140,232" fill="url(#face1)"/>
<!-- Right leg front -->
<polygon points="280,232 200,70 200,115 260,232" fill="url(#face1)" opacity="0.9"/>
<!-- Letter bottom platforms -->
<polygon points="120,230 148,250 128,250 100,230" fill="url(#face2)" opacity="0.6"/>
<polygon points="280,230 308,230 288,250 260,250" fill="url(#face2)" opacity="0.6"/>
<!-- Shine line -->
<line x1="200" y1="70" x2="200" y2="115" stroke="rgba(255,180,180,0.5)" stroke-width="2"/>
<text x="200" y="378" text-anchor="middle" font-family="Courier New,monospace" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="4" font-weight="bold">A3KM STUDIO</text>
</svg>