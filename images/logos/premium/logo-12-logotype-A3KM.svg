<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400"><rect width="400" height="400" fill="#050000"/>
<defs>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<defs>
  <linearGradient id="g12" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#FF3333"/>
    <stop offset="100%" stop-color="#CC0000"/>
  </linearGradient>
</defs>
<!-- Background accent line -->
<rect x="60" y="196" width="280" height="1.5" fill="rgba(255,255,255,0.06)"/>
<!-- Main logotype: A3KM in large, spaced type -->
<text x="200" y="240" text-anchor="middle"
      font-family="Courier New,monospace" font-size="100"
      fill="white" font-weight="bold" letter-spacing="8">A3KM</text>
<!-- Red accent: underline with gap = hidden dash = Morse code for K (−·−) -->
<rect x="60"  y="255" width="52" height="5" rx="2" fill="#FF1A1A" filter="url(#glow)"/>
<rect x="120" y="255" width="14" height="5" rx="2" fill="#FF1A1A" opacity="0.6"/>
<rect x="142" y="255" width="52" height="5" rx="2" fill="#FF1A1A" filter="url(#glow)"/>
<rect x="202" y="255" width="14" height="5" rx="2" fill="#FF1A1A" opacity="0.6"/>
<rect x="224" y="255" width="52" height="5" rx="2" fill="#FF1A1A" filter="url(#glow)"/>
<rect x="284" y="255" width="56" height="5" rx="2" fill="#FF1A1A" filter="url(#glow)" opacity="0.85"/>
<!-- Morse label -->
<text x="200" y="285" text-anchor="middle" font-family="Courier New" font-size="9"
      fill="rgba(255,60,60,0.4)" letter-spacing="2">−·−  ·−·  −−  −·</text>
<!-- STUDIO underneath -->
<text x="200" y="316" text-anchor="middle" font-family="Courier New,monospace"
      font-size="22" fill="rgba(255,255,255,0.85)" letter-spacing="18">STUDIO</text>
<!-- Red dot separators -->
<circle cx="112" cy="308" r="3" fill="#FF1A1A"/>
<circle cx="288" cy="308" r="3" fill="#FF1A1A"/>
<text x="200" y="356" text-anchor="middle" font-family="Courier New,monospace" font-size="10" fill="rgba(255,255,255,0.2)" letter-spacing="2" font-weight="bold">MD AKHINOOR ISLAM · KUET 2K23</text>
</svg>