<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400"><rect width="400" height="400" fill="#050000"/>
<defs>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<defs>
  <linearGradient id="g01" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FF2222"/>
    <stop offset="100%" stop-color="#990000"/>
  </linearGradient>
</defs>
<!-- The A shape: two legs + crossbar -->
<polygon points="200,55 310,330 260,330 200,175 140,330 90,330"
         fill="url(#g01)" filter="url(#glow)"/>
<!-- Negative space: cutout crossbar notch that creates lightning bolt shape -->
<polygon points="164,230 200,175 236,230 222,230 200,260 178,230"
         fill="#050000"/>
<!-- Crossbar -->
<rect x="148" y="228" width="104" height="14" rx="2" fill="#050000"/>
<!-- Re-draw lightning bolt in red so it pops -->
<polygon points="200,178 222,228 210,228 200,258 178,228 191,228"
         fill="#FF1A1A" filter="url(#glow2)" opacity="0.85"/>
<!-- Tagline dot -->
<circle cx="200" cy="354" r="3" fill="#FF1A1A"/>
<text x="200" y="378" text-anchor="middle" font-family="Courier New,monospace" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="4" font-weight="bold">A3KM STUDIO</text>
</svg>