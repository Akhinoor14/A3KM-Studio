<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400"><rect width="400" height="400" fill="#050000"/>
<defs>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<defs>
  <linearGradient id="g10" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FF2222"/>
    <stop offset="100%" stop-color="#AA0000"/>
  </linearGradient>
</defs>
<!-- Nested diamonds, each rotated 22.5° relative to previous -->
<g transform="rotate(0,200,200)">
  <polygon points="200,52 348,200 200,348 52,200" fill="none" stroke="rgba(255,26,26,0.9)" stroke-width="3" opacity="1.0"/>
</g>
<g transform="rotate(22.5,200,200)">
  <polygon points="200,85 315,200 200,315 85,200" fill="none" stroke="rgba(255,60,60,0.75)" stroke-width="2.5" opacity="1.0"/>
</g>
<g transform="rotate(45,200,200)">
  <polygon points="200,116 284,200 200,284 116,200" fill="none" stroke="rgba(255,100,100,0.6)" stroke-width="2" opacity="1.0"/>
</g>
<g transform="rotate(67.5,200,200)">
  <polygon points="200,144 256,200 200,256 144,200" fill="none" stroke="rgba(255,140,140,0.45)" stroke-width="1.8" opacity="1.0"/>
</g>
<g transform="rotate(90,200,200)">
  <polygon points="200,168 232,200 200,232 168,200" fill="none" stroke="rgba(255,180,180,0.35)" stroke-width="1.5" opacity="1.0"/>
</g>
<!-- Center fill -->
<polygon points="200,168 232,200 200,232 168,200"
         fill="rgba(200,0,0,0.25)" stroke="#FF1A1A" stroke-width="1" filter="url(#glow)"/>
<!-- Core dot with glow -->
<circle cx="200" cy="200" r="7" fill="#FF1A1A" filter="url(#glow2)"/>
<!-- Corner accents -->
<circle cx="348.0" cy="200.0" r="5" fill="#FF1A1A" opacity="0.7"/><circle cx="200.0" cy="348.0" r="5" fill="#FF1A1A" opacity="0.7"/><circle cx="52.0" cy="200.0" r="5" fill="#FF1A1A" opacity="0.7"/><circle cx="200.0" cy="52.0" r="5" fill="#FF1A1A" opacity="0.7"/>
<text x="200" y="378" text-anchor="middle" font-family="Courier New,monospace" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="4" font-weight="bold">A3KM STUDIO</text>
</svg>