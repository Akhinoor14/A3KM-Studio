<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400"><rect width="400" height="400" fill="#050000"/>
<defs>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<defs>
  <linearGradient id="g08" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FF3333"/>
    <stop offset="100%" stop-color="#990000"/>
  </linearGradient>
</defs>
<!-- Power circle arc (gap at top, 40-degree opening) -->
<path d="M 200,90 A 110,110 0 1,1 237.6,96.6"
      fill="none" stroke="url(#g08)" stroke-width="22" stroke-linecap="round"
      filter="url(#glow)"/>
<!-- Vertical bar (power → A peak) -->
<line x1="200" y1="90" x2="200" y2="180"
      stroke="url(#g08)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
<!-- Crossbar (A crossbar) -->
<rect x="152" y="213" width="96" height="16" rx="4"
      fill="#FF1A1A" filter="url(#glow)"/>
<!-- Inner subtle circle -->
<circle cx="200" cy="215" r="30" fill="none" stroke="rgba(255,50,50,0.2)" stroke-width="1.5"/>
<!-- Glowing core dot -->
<circle cx="200" cy="215" r="8" fill="#FF1A1A" filter="url(#glow2)" opacity="0.7"/>
<text x="200" y="378" text-anchor="middle" font-family="Courier New,monospace" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="4" font-weight="bold">A3KM STUDIO</text>
</svg>