<?xml version="1.0" encoding="UTF-8"?>
<!--
  A3KM Studio — Logo Concept 1: "Geometric Monogram"
  Style: Bold angular A3 letters fused into a single mark, energy-themed
  Color: Deep crimson gradient + white
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="A3KM Studio Logo">
  <defs>
    <linearGradient id="g1-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF1A1A"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="g1-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#0a0000"/>
    </linearGradient>
    <filter id="f1-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="url(#g1-dark)" stroke="#1a0000" stroke-width="1.5"/>

  <!-- Inner accent ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(204,0,0,0.2)" stroke-width="1"/>

  <!-- Hexagonal plate -->
  <polygon points="100,18 170,58 170,142 100,182 30,142 30,58"
           fill="rgba(20,0,0,0.6)" stroke="url(#g1-red)" stroke-width="1.5"/>

  <!-- Letter "A" — bold structural triangle -->
  <g fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter">
    <polyline points="62,138 82,62 92,62 112,138"/>
    <line x1="69" y1="110" x2="105" y2="110"/>
  </g>

  <!-- "3" shaped element — right side, red -->
  <g fill="none" stroke="url(#g1-red)" stroke-width="4.5" stroke-linecap="round" filter="url(#f1-glow)">
    <path d="M118,75 C118,68 126,62 134,65 C142,68 144,76 138,82 C132,88 126,88 126,88 C132,88 144,92 144,102 C144,112 136,120 126,118 C116,116 114,108 118,102"/>
  </g>

  <!-- Red baseline bar -->
  <rect x="40" y="152" width="120" height="5" rx="2.5" fill="url(#g1-red)"/>

  <!-- Studio text -->
  <text x="100" y="175" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="4">STUDIO</text>
</svg>
