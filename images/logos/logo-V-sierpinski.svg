<?xml version="1.0" encoding="UTF-8"?>
<!-- Source: Mathematics — Sierpinski triangle fractal, self-similar -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gV" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF2222"/><stop offset="100%" stop-color="#660000"/></linearGradient>
    <filter id="fV"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="200" height="200" rx="18" fill="#030000"/>
  <!-- Outer triangle -->
  <polygon points="100,18 184,163 16,163" fill="rgba(180,0,0,0.08)" stroke="url(#gV)" stroke-width="1.8" filter="url(#fV)"/>
  <!-- Level 1 inner triangles (3 filled) -->
  <polygon points="100,18 142,90 58,90" fill="rgba(180,0,0,0.18)" stroke="url(#gV)" stroke-width="1.4"/>
  <polygon points="142,90 184,163 100,163" fill="rgba(180,0,0,0.18)" stroke="url(#gV)" stroke-width="1.4"/>
  <polygon points="58,90 100,163 16,163" fill="rgba(180,0,0,0.18)" stroke="url(#gV)" stroke-width="1.4"/>
  <!-- Level 2 — 9 smaller triangles -->
  <polygon points="100,18 121,54 79,54" fill="rgba(180,0,0,0.35)" stroke="url(#gV)" stroke-width="1"/>
  <polygon points="142,90 163,126 121,126" fill="rgba(180,0,0,0.35)" stroke="url(#gV)" stroke-width="1"/>
  <polygon points="58,90 79,126 37,126" fill="rgba(180,0,0,0.35)" stroke="url(#gV)" stroke-width="1"/>
  <polygon points="121,54 142,90 100,90" fill="rgba(180,0,0,0.35)" stroke="url(#gV)" stroke-width="1"/>
  <polygon points="79,54 100,90 58,90" fill="rgba(180,0,0,0.35)" stroke="url(#gV)" stroke-width="1"/>
  <polygon points="100,163 121,127 79,127" fill="rgba(180,0,0,0.35)" stroke="url(#gV)" stroke-width="1"/>
  <!-- Level 3 selected tips — tiny bright triangles -->
  <polygon points="100,18 110,36 90,36" fill="#FF2222" stroke="none" opacity="0.8"/>
  <polygon points="163,126 174,145 152,145" fill="#FF2222" stroke="none" opacity="0.8"/>
  <polygon points="37,126 26,145 48,145" fill="#FF2222" stroke="none" opacity="0.8"/>
  <text x="100" y="195" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" font-weight="900" fill="#FFFFFF" letter-spacing="5">A3KM</text>
  <rect width="200" height="200" rx="18" fill="none" stroke="rgba(180,0,0,0.15)" stroke-width="1.2"/>
</svg>