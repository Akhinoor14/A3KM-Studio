<?xml version="1.0" encoding="UTF-8"?>
<!--
  A3KM Studio — Logo Concept 2: "Energy Signal"
  Style: Sine wave / oscilloscope signal morphing into the letter A — energy engineering feel
  Color: Crimson red on black, electric glow
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="A3KM Studio Logo">
  <defs>
    <linearGradient id="g2-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3333"/>
      <stop offset="50%" stop-color="#FF0000"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <filter id="f2-glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="f2-soft">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#080808"/>

  <!-- Grid lines (engineering graph paper feel) -->
  <g stroke="rgba(180,0,0,0.07)" stroke-width="1">
    <line x1="0" y1="50" x2="200" y2="50"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="150" x2="200" y2="150"/>
    <line x1="50" y1="0" x2="50" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
  </g>

  <!-- Oscilloscope / signal wave -->
  <path d="M18,100 L38,100 L48,60 L58,140 L68,60 L78,140 L88,100 L112,100 L122,55 L132,145 L142,100 L182,100"
        fill="none" stroke="url(#g2-red)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#f2-glow)"/>

  <!-- Glowing dot on the wave center -->
  <circle cx="100" cy="100" r="5" fill="#FF2222" filter="url(#f2-glow)"/>
  <circle cx="100" cy="100" r="2.5" fill="#FFFFFF"/>

  <!-- Top corner mark: A3KM -->
  <text x="16" y="33" font-family="'Courier New', monospace" font-size="22" font-weight="900"
        fill="#FFFFFF" letter-spacing="-1">A3KM</text>

  <!-- Red underline for text -->
  <line x1="16" y1="37" x2="94" y2="37" stroke="url(#g2-red)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bottom label -->
  <text x="100" y="178" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" font-weight="700"
        fill="rgba(255,255,255,0.4)" letter-spacing="5">STUDIO</text>

  <!-- Tiny corner dots — oscilloscope terminal feel -->
  <circle cx="18" cy="100" r="3" fill="rgba(255,50,50,0.5)"/>
  <circle cx="182" cy="100" r="3" fill="rgba(255,50,50,0.5)"/>

  <!-- Border -->
  <rect width="200" height="200" rx="24" fill="none" stroke="rgba(200,0,0,0.25)" stroke-width="1.5"/>
</svg>
