<?xml version="1.0" encoding="UTF-8"?>
<!-- Source: Astrophysics — supernova remnant shockwave / heliosphere -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="gW_core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="15%" stop-color="#FFEECC" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FF4400" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#AA0000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#220000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gW_bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#020000"/>
    </radialGradient>
    <filter id="fW"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="fWt"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#gW_bg)"/>
  <!-- Debris filaments -->
  <g fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M 100,100 L 28,38"  stroke="rgba(255,120,0,0.55)" stroke-width="1.2"/>
    <path d="M 100,100 L 172,38" stroke="rgba(255,100,0,0.5)" stroke-width="1"/>
    <path d="M 100,100 L 185,105" stroke="rgba(255,80,0,0.45)" stroke-width="0.9"/>
    <path d="M 100,100 L 158,178" stroke="rgba(255,60,0,0.4)" stroke-width="0.9"/>
    <path d="M 100,100 L 100,190" stroke="rgba(255,80,0,0.45)" stroke-width="0.9"/>
    <path d="M 100,100 L 42,178" stroke="rgba(255,70,0,0.4)" stroke-width="0.9"/>
    <path d="M 100,100 L 15,110" stroke="rgba(255,90,0,0.45)" stroke-width="0.9"/>
    <path d="M 100,100 L 16,60"  stroke="rgba(255,110,0,0.5)" stroke-width="1"/>
    <path d="M 100,100 L 56,15"  stroke="rgba(255,100,0,0.45)" stroke-width="0.9"/>
    <path d="M 100,100 L 144,15" stroke="rgba(255,100,0,0.45)" stroke-width="0.9"/>
    <path d="M 100,100 L 178,145" stroke="rgba(255,80,0,0.4)" stroke-width="0.9"/>
    <path d="M 100,100 L 20,148"  stroke="rgba(255,80,0,0.4)" stroke-width="0.9"/>
  </g>
  <!-- Expanding shock ring -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="rgba(255,80,0,0.35)" stroke-width="8" filter="url(#fW)"/>
  <circle cx="100" cy="100" r="62" fill="none" stroke="rgba(255,120,30,0.55)" stroke-width="2"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(200,40,0,0.2)" stroke-width="5" filter="url(#fW)"/>
  <!-- Core -->
  <circle cx="100" cy="100" r="26" fill="url(#gW_core)" filter="url(#fWt)"/>
  <circle cx="100" cy="100" r="8" fill="#FFFFFF" opacity="0.95"/>
  <text x="100" y="192" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" font-weight="900" fill="#FFFFFF" letter-spacing="5">A3KM</text>
</svg>