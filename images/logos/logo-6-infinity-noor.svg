<?xml version="1.0" encoding="UTF-8"?>
<!--
  A3KM Studio — Logo Concept 6: "Noor Infinity Crest"
  Style: An infinity loop / Möbius band shape that forms an "N" — for Noor.
         Elegant, eternal, flowing. Engineering + Academy fusion.
         Arabic "Noor" (نور) means Light — the shape glows.
  Color: Deep red gradient, white shimmer, dark background
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="A3KM Studio Logo">
  <defs>
    <linearGradient id="g6-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="40%" stop-color="#FF3333"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <linearGradient id="g6-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0000"/>
      <stop offset="100%" stop-color="#040000"/>
    </linearGradient>
    <filter id="f6-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f6-sharp">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background — octagonal plate feel -->
  <rect width="200" height="200" rx="28" fill="url(#g6-bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(150,0,0,0.06)" stroke-width="1">
    <line x1="0" y1="66" x2="200" y2="66"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="134" x2="200" y2="134"/>
    <line x1="66" y1="0" x2="66" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="134" y1="0" x2="134" y2="200"/>
  </g>

  <!-- Infinity / double-lemniscate shape as the main mark -->
  <!-- Left lobe -->
  <path d="M100,100 C90,72 52,58 38,78 C24,98 44,122 62,116 C80,110 92,88 100,100"
        fill="none" stroke="url(#g6-red)" stroke-width="7" stroke-linecap="round"
        filter="url(#f6-glow)"/>
  <!-- Right lobe -->
  <path d="M100,100 C110,128 148,142 162,122 C176,102 156,78 138,84 C120,90 108,112 100,100"
        fill="none" stroke="url(#g6-red)" stroke-width="7" stroke-linecap="round"
        filter="url(#f6-glow)"/>

  <!-- Center crossover highlight — white sparkle -->
  <circle cx="100" cy="100" r="5" fill="rgba(255,255,255,0.9)" filter="url(#f6-sharp)"/>
  <circle cx="100" cy="100" r="2" fill="#FFFFFF"/>

  <!-- Horizontal reference line -->
  <line x1="30" y1="100" x2="170" y2="100" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Wordmark: A3KM -->
  <text x="100" y="158" text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="18" font-weight="900"
        fill="#FFFFFF" letter-spacing="5">A3KM</text>

  <!-- Tagline: STUDIO -->
  <text x="100" y="173" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="8" font-weight="700"
        fill="rgba(200,0,0,0.8)" letter-spacing="5">STUDIO</text>

  <!-- Outer glow border -->
  <rect width="200" height="200" rx="28" fill="none" stroke="rgba(180,0,0,0.2)" stroke-width="1.5"/>
</svg>
