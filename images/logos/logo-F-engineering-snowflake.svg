<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="gF-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#030000"/>
    </radialGradient>
    <filter id="fF-c">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fF-t">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#gF-bg)"/>
  <polygon points="100,16 166,58 166,142 100,184 34,142 34,58"
           fill="none" stroke="rgba(255,0,0,0.07)" stroke-width="1"/>
  <!-- One snowflake arm, cloned & rotated 6x by SVG use+transform -->
  <g id="sf-arm" stroke="rgba(255,255,255,0.8)" stroke-linecap="round" stroke-linejoin="round">
    <line x1="100" y1="100" x2="100" y2="24"    stroke-width="2.2"/>
    <line x1="100" y1="68"  x2="82.7"  y2="58"  stroke-width="1.6"/>
    <line x1="100" y1="68"  x2="117.3" y2="58"  stroke-width="1.6"/>
    <line x1="100" y1="45"  x2="78.3"  y2="32.5" stroke-width="1.2"/>
    <line x1="100" y1="45"  x2="121.7" y2="32.5" stroke-width="1.2"/>
    <line x1="100" y1="24"  x2="93"    y2="15"  stroke-width="0.9"/>
    <line x1="100" y1="24"  x2="107"   y2="15"  stroke-width="0.9"/>
  </g>
  <use href="#sf-arm" transform="rotate(0 100 100)"/>
  <use href="#sf-arm" transform="rotate(60 100 100)"/>
  <use href="#sf-arm" transform="rotate(120 100 100)"/>
  <use href="#sf-arm" transform="rotate(180 100 100)"/>
  <use href="#sf-arm" transform="rotate(240 100 100)"/>
  <use href="#sf-arm" transform="rotate(300 100 100)"/>
  <!-- Red accent dots replicated at all 6 rotations -->
  <g filter="url(#fF-t)">
    <g id="sf-dots">
      <circle cx="82.7"  cy="58"   r="2.8" fill="#FF2222"/>
      <circle cx="117.3" cy="58"   r="2.8" fill="#FF2222"/>
      <circle cx="78.3"  cy="32.5" r="2.2" fill="#EE1111"/>
      <circle cx="121.7" cy="32.5" r="2.2" fill="#EE1111"/>
      <circle cx="93"    cy="15"   r="1.8" fill="#FF3333"/>
      <circle cx="107"   cy="15"   r="1.8" fill="#FF3333"/>
    </g>
    <use href="#sf-dots" transform="rotate(60 100 100)"/>
    <use href="#sf-dots" transform="rotate(120 100 100)"/>
    <use href="#sf-dots" transform="rotate(180 100 100)"/>
    <use href="#sf-dots" transform="rotate(240 100 100)"/>
    <use href="#sf-dots" transform="rotate(300 100 100)"/>
  </g>
  <!-- Center hex ring + glow -->
  <polygon points="100,90 108.7,95 108.7,105 100,110 91.3,105 91.3,95"
           fill="rgba(180,0,0,0.15)" stroke="rgba(255,30,30,0.55)" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="7" fill="#CC0000" filter="url(#fF-c)"/>
  <circle cx="100" cy="100" r="4" fill="#FF3333"/>
  <circle cx="100" cy="100" r="1.8" fill="#FFFFFF" opacity="0.9"/>
  <text x="100" y="174" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" letter-spacing="4">A3KM</text>
  <text x="100" y="189" text-anchor="middle" font-family="Courier New,monospace" font-size="8" font-weight="700" fill="rgba(200,0,0,0.8)" letter-spacing="4">STUDIO</text>
</svg>