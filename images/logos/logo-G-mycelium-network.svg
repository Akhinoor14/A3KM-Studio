    <path d="M 148,65  C 156,57 166,52 175,46"/>
    <path d="M 148,65  C 150,55 152,44 156,35"/>
    <path d="M 158,95  C 165,88 173,84 182,80"/>
    <path d="M 158,95  C 163,103 168,110 172,117"/>
