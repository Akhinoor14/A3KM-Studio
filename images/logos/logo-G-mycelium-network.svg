    <path d="M 78,24   C 74,16 70,10 66,4"/>
    <path d="M 108,24  C 110,16 112,10 114,4"/>
  </g>
  <!-- Fork nodes (red warm glow) -->
  <g fill="rgba(255,80,80,0.75)" filter="url(#fG-n)">
    <circle cx="148" cy="65"  r="3.2"/>
    <circle cx="158" cy="95"  r="3.2"/>
    <circle cx="138" cy="148" r="3.2"/>
    <circle cx="60"  cy="142" r="3.2"/>
    <circle cx="44"  cy="97"  r="3.2"/>
    <circle cx="94"  cy="54"  r="3.2"/>
