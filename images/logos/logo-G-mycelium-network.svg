  <!-- Sub-branches level 2 (micro) -->
  <g fill="none" stroke="rgba(255,255,255,0.2)" stroke-linecap="round" stroke-width="0.9">
    <path d="M 175,46  C 180,40 184,34 187,28"/>
    <path d="M 156,35  C 158,26 160,18 162,12"/>
    <path d="M 182,80  C 186,74 189,68 192,62"/>
    <path d="M 172,117 C 176,124 179,130 182,136"/>
    <path d="M 155,170 C 158,176 160,182 162,188"/>
    <path d="M 124,176 C 122,182 120,187 118,193"/>
