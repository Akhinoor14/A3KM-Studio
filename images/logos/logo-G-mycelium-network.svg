<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="gG-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#080000"/>
      <stop offset="100%" stop-color="#010000"/>
    </radialGradient>
    <radialGradient id="gG-node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#AA0000"/>
    </radialGradient>
    <filter id="fG-c">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fG-n">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fG-t">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="18" fill="url(#gG-bg)"/>
  <!-- Main branches (thickness decreases away from center) -->
  <g fill="none" stroke-linecap="round">
    <path d="M 100,100 C 112,90 128,78 148,65"    stroke="rgba(255,255,255,0.55)" stroke-width="2.4"/>
