    <circle cx="182" cy="80"  r="2"/><circle cx="172" cy="117" r="2"/>
    <circle cx="155" cy="170" r="2"/><circle cx="124" cy="176" r="2"/>
    <circle cx="36"  cy="162" r="2"/><circle cx="50"  cy="172" r="2"/>
    <circle cx="14"  cy="85"  r="2"/><circle cx="22"  cy="116" r="2"/>
    <circle cx="78"  cy="24"  r="2"/><circle cx="108" cy="24"  r="2"/>
  </g>
  <!-- Central master node -->
  <circle cx="100" cy="100" r="14" fill="#AA0000" filter="url(#fG-c)"/>
  <circle cx="100" cy="100" r="8"  fill="url(#gG-node)"/>
  <circle cx="100" cy="100" r="3.5" fill="#FFFFFF" opacity="0.9"/>
  <text x="100" y="178" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" letter-spacing="4">A3KM</text>
  <text x="100" y="192" text-anchor="middle" font-family="Courier New,monospace" font-size="8" font-weight="700" fill="rgba(200,0,0,0.8)" letter-spacing="4">STUDIO</text>
  <rect width="200" height="200" rx="18" fill="none" stroke="rgba(180,0,0,0.15)" stroke-width="1.2"/>
