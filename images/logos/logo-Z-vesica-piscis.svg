<?xml version="1.0" encoding="UTF-8"?>
<!-- Source: Sacred Geometry / Architecture — Vesica Piscis, found in Gothic cathedrals, Yin-Yang -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="gZ1" cx="36%" cy="50%" r="55%"><stop offset="0%" stop-color="#FF3333" stop-opacity="0.7"/><stop offset="100%" stop-color="#660000" stop-opacity="0.1"/></radialGradient>
    <radialGradient id="gZ2" cx="64%" cy="50%" r="55%"><stop offset="0%" stop-color="#FF3333" stop-opacity="0.7"/><stop offset="100%" stop-color="#660000" stop-opacity="0.1"/></radialGradient>
    <filter id="fZ"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="fZt"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="200" height="200" rx="100" fill="#030000"/>
  <!-- Outer containing circle -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(200,0,0,0.1)" stroke-width="1"/>
  <!-- Circle 1 centered at 72,100 -->
  <circle cx="72" cy="100" r="52" fill="url(#gZ1)" stroke="rgba(255,40,40,0.55)" stroke-width="1.5" filter="url(#fZt)"/>
  <!-- Circle 2 centered at 128,100 -->
  <circle cx="128" cy="100" r="52" fill="url(#gZ2)" stroke="rgba(255,40,40,0.55)" stroke-width="1.5" filter="url(#fZt)"/>
  <!-- Glow overlay in intersection -->
  <path d="M 100,50.1 A 52,52 0 0,1 100,149.9 A 52,52 0 0,1 100,50.1 Z" fill="rgba(255,40,40,0.3)" filter="url(#fZ)"/>
  <!-- Construction lines -->
  <line x1="72" y1="100" x2="128" y2="100" stroke="rgba(255,255,255,0.18)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="100" y1="50" x2="100" y2="150" stroke="rgba(255,255,255,0.18)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <!-- Node dots -->
  <circle cx="72" cy="100" r="2.5" fill="rgba(255,255,255,0.6)" filter="url(#fZt)"/>
  <circle cx="128" cy="100" r="2.5" fill="rgba(255,255,255,0.6)" filter="url(#fZt)"/>
  <circle cx="100" cy="50" r="2.5" fill="#FF3333" filter="url(#fZt)"/>
  <circle cx="100" cy="150" r="2.5" fill="#FF3333" filter="url(#fZt)"/>
  <text x="100" y="192" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" font-weight="900" fill="#FFFFFF" letter-spacing="5">A3KM</text>
