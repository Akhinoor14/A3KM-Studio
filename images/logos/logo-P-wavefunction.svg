  <!-- ψ standing wave inside -->
  <path d="M 40,100 C 50,70 55,55 60,70 C 65,85 70,95 75,85 C 80,75 85,55 90,50 C 95,45 100,43 105,50 C 110,57 115,75 120,85 C 125,95 130,85 135,70 C 140,55 145,70 160,100"
        fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- base line -->
  <line x1="18" y1="100" x2="182" y2="100" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="4 3"/>
