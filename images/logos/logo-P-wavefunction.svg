<!-- Source: Quantum Mechanics — Schrödinger wave equation probability density -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gP_c" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FF2222" stop-opacity="0"/><stop offset="35%" stop-color="#FF2222" stop-opacity="0.9"/><stop offset="65%" stop-color="#FF2222" stop-opacity="0.9"/><stop offset="100%" stop-color="#FF2222" stop-opacity="0"/></linearGradient>
    <filter id="fP"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="200" height="200" rx="18" fill="#040000"/>
  <!-- probability density |ψ|² envelope bell curve (Gaussian) -->
  <path d="M 18,100 C 30,100 40,100 50,99 C 60,98 65,90 70,78 C 75,66 78,52 85,42 C 92,32 100,28 100,28 C 100,28 108,32 115,42 C 122,52 125,66 130,78 C 135,90 140,98 150,99 C 160,100 170,100 182,100"
