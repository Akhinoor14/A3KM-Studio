  <circle cx="100" cy="28" r="4" fill="#FF2222" filter="url(#fP)"/>
  <circle cx="100" cy="28" r="1.8" fill="#FFFFFF" opacity="0.9"/>
  <!-- ψ symbol -->
  <text x="16" y="24" font-family="serif" font-size="18" fill="rgba(255,60,60,0.4)" font-style="italic">ψ</text>
  <text x="100" y="192" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" font-weight="900" fill="#FFFFFF" letter-spacing="5">A3KM</text>
  <rect width="200" height="200" rx="18" fill="none" stroke="rgba(180,0,0,0.18)" stroke-width="1.2"/>
