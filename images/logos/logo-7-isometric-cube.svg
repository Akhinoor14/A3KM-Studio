<?xml version="1.0" encoding="UTF-8"?>
<!--
  A3KM Studio — Logo Concept 7: "Isometric Cube Studio"
  Style: 3D isometric cube — engineering / architecture / technical drafting feel.
         Each face has a different shade. "A3" on front face.
         Like a Rubik / Minecraft / SolidWorks blueprint aesthetic.
  Color: Red face, white/grey structure, dark background
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="A3KM Studio Logo">
  <defs>
    <linearGradient id="g7-front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <linearGradient id="g7-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="g7-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="f7-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#FF0000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="22" fill="#060606"/>

  <!-- Isometric cube — centered at 100, 95 -->
  <!-- Top face (parallelogram) -->
  <polygon points="100,28 155,58 100,88 45,58"
           fill="url(#g7-top)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"
           filter="url(#f7-shadow)"/>

  <!-- Left face (darker) -->
  <polygon points="45,58 100,88 100,148 45,118"
           fill="url(#g7-side)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- Front face (RED — the signature brand face) -->
  <polygon points="100,88 155,58 155,118 100,148"
           fill="url(#g7-front)" stroke="rgba(255,80,80,0.4)" stroke-width="1.5"/>

  <!-- "A" on front face — white -->
  <g transform="translate(113,80)" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="square">
    <polyline points="10,52 22,10 34,52"/>
    <line x1="15" y1="36" x2="29" y2="36"/>
  </g>

  <!-- "3" on front face beside A -->
  <g transform="translate(138,82)">
    <path d="M2,16 C2,10 8,7 14,9 C20,12 21,18 16,22 C11,26 8,26 8,26 C12,26 22,30 22,38 C22,46 14,50 8,47 C2,44 0,38 2,34"
          fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2.8" stroke-linecap="round"/>
  </g>

  <!-- Edge highlights — glowing lines on cube edges -->
  <line x1="100" y1="28" x2="155" y2="58" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <line x1="100" y1="28" x2="45" y2="58"  stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <line x1="100" y1="88" x2="100" y2="148" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Shadow projection under cube -->
  <ellipse cx="100" cy="155" rx="52" ry="8" fill="rgba(180,0,0,0.18)"/>

  <!-- Wordmark -->
  <text x="100" y="178" text-anchor="middle"
        font-family="'Arial Black', sans-serif" font-size="11" font-weight="900"
        fill="rgba(255,255,255,0.85)" letter-spacing="5">A3KM</text>
  <text x="100" y="192" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="7.5" font-weight="700"
        fill="rgba(204,0,0,0.8)" letter-spacing="4">STUDIO</text>

  <!-- Outer border -->
  <rect width="200" height="200" rx="22" fill="none" stroke="rgba(180,0,0,0.18)" stroke-width="1.5"/>
</svg>
