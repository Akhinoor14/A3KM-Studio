<?xml version="1.0" encoding="UTF-8"?>
<!-- Source: Physics/Chemistry — Bohr model of the hydrogen atom, 1913 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="gR_n" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FF8800"/><stop offset="60%" stop-color="#CC2200"/><stop offset="100%" stop-color="#660000"/></radialGradient>
    <filter id="fR"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="fRt"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="200" height="200" rx="100" fill="#040000"/>
  <!-- 3 orbital shells -->
  <circle cx="100" cy="100" r="28" fill="none" stroke="rgba(255,80,0,0.45)" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="52" fill="none" stroke="rgba(255,60,0,0.35)" stroke-width="1.2"/>
  <circle cx="100" cy="100" r="74" fill="none" stroke="rgba(255,40,0,0.25)" stroke-width="1"/>
  <!-- Electrons on orbits -->
  <circle cx="128" cy="100" r="4.5" fill="#FF4400" filter="url(#fRt)"/><circle cx="128" cy="100" r="2" fill="#FFCC88"/>
  <circle cx="74" cy="55" r="4.5" fill="#FF4400" filter="url(#fRt)"/><circle cx="74" cy="55" r="2" fill="#FFCC88"/>
  <circle cx="126" cy="145" r="4.5" fill="#FF4400" filter="url(#fRt)"/><circle cx="126" cy="145" r="2" fill="#FFCC88"/>
  <!-- Nucleus glow -->
  <circle cx="100" cy="100" r="22" fill="url(#gR_n)" filter="url(#fR)"/>
  <circle cx="100" cy="100" r="12" fill="url(#gR_n)"/>
  <!-- Proton cross hatch inside nucleus -->
  <line x1="94" y1="100" x2="106" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="100" y1="94" x2="100" y2="106" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="100" y="192" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" font-weight="900" fill="#FFFFFF" letter-spacing="5">A3KM</text>
</svg>