<?xml version="1.0" encoding="UTF-8"?>
<!-- Source: Islamic Architecture — 8-pointed star (Khatam) geometric art -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gO1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#CC0000"/><stop offset="100%" stop-color="#660000"/></linearGradient>
    <filter id="fO"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="200" height="200" rx="4" fill="#040000"/>
  <!-- 8-fold star: two overlapping squares, rotated 45deg -->
  <polygon points="100,25 117,75 168,75 128,105 143,155 100,125 57,155 72,105 32,75 83,75"
           fill="url(#gO1)" opacity="0.9" filter="url(#fO)"/>
  <polygon points="100,25 117,75 168,75 128,105 143,155 100,125 57,155 72,105 32,75 83,75"
           fill="none" stroke="rgba(255,150,150,0.35)" stroke-width="1"/>
  <!-- Rotated 45deg version -->
  <polygon points="100,25 117,75 168,75 128,105 143,155 100,125 57,155 72,105 32,75 83,75"
           fill="url(#gO1)" opacity="0.55" filter="url(#fO)" transform="rotate(36 100 100)"/>
  <!-- Outer octagon border -->
  <polygon points="100,18 152,38 182,90 182,110 152,162 100,182 48,162 18,110 18,90 48,38"
           fill="none" stroke="rgba(255,40,40,0.25)" stroke-width="1.2"/>
  <!-- Center circle -->
  <circle cx="100" cy="100" r="14" fill="#AA0000" filter="url(#fO)"/>
  <circle cx="100" cy="100" r="7" fill="#FF3333"/>
  <circle cx="100" cy="100" r="2.5" fill="#FFFFFF" opacity="0.9"/>
  <text x="100" y="195" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" font-weight="900" fill="#FFFFFF" letter-spacing="5">A3KM</text>
</svg>