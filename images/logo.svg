<?xml version="1.0" encoding="UTF-8"?>
<!-- A3KM Studio — Premium Website Logo (Final Polished Spiral) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="44%" r="70%">
      <stop offset="0%" stop-color="#2C0000"/>
      <stop offset="62%" stop-color="#120000"/>
      <stop offset="100%" stop-color="#040000"/>
    </radialGradient>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="18" stroke="#520000" stroke-opacity="0.92" stroke-width="1"/>
      <line x1="0" y1="0" x2="18" y2="0" stroke="#520000" stroke-opacity="0.92" stroke-width="1"/>
    </pattern>
    <clipPath id="roundedClip">
      <rect width="200" height="200" rx="38" ry="38"/>
