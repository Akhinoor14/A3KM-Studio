<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0505;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CC0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1744;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="600" fill="url(#bgGrad)"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="400" height="600" fill="url(#grid)"/>
  
  <!-- Corner Brackets -->
  <path d="M 30 30 L 30 80 M 30 30 L 80 30" stroke="#CC0000" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 370 30 L 370 80 M 370 30 L 320 30" stroke="#CC0000" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 30 570 L 30 520 M 30 570 L 80 570" stroke="#CC0000" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 370 570 L 370 520 M 370 570 L 320 570" stroke="#CC0000" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- AI Icon -->
  <g transform="translate(200, 180)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#titleGrad)" stroke-width="3" opacity="0.8"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#titleGrad)" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#titleGrad)" stroke-width="2" opacity="0.4"/>
    
    <!-- Brain Pattern -->
    <path d="M -20 -10 Q -10 -20 0 -10 Q 10 -20 20 -10" fill="none" stroke="#CC0000" stroke-width="2"/>
    <path d="M -15 0 Q 0 -5 15 0" fill="none" stroke="#FF1744" stroke-width="2"/>
    <path d="M -20 10 Q -10 20 0 10 Q 10 20 20 10" fill="none" stroke="#CC0000" stroke-width="2"/>
    
    <!-- Neural Network Nodes -->
    <circle cx="-25" cy="-15" r="4" fill="#CC0000"/>
    <circle cx="25" cy="-15" r="4" fill="#CC0000"/>
    <circle cx="0" cy="0" r="5" fill="#FF1744"/>
    <circle cx="-25" cy="15" r="4" fill="#CC0000"/>
    <circle cx="25" cy="15" r="4" fill="#CC0000"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle">
    ARTIFICIAL
  </text>
  <text x="200" y="355" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle">
    INTELLIGENCE
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="400" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    Introduction to AI
  </text>
  <text x="200" y="425" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    Machine Learning • Neural Networks
  </text>
  
  <!-- Author -->
  <text x="200" y="520" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">
    Sample Author
  </text>
  
  <!-- Bottom Line -->
  <line x1="80" y1="550" x2="320" y2="550" stroke="#CC0000" stroke-width="2" opacity="0.5"/>
</svg>
