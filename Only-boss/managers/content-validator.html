<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Validator - A3KM Studio Admin</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../Optimization/styles.css">
    
    <style>
        :root {
            --error-red: #ff4444;
            --warning-orange: #ffaa00;
            --success-green: #00cc66;
            --info-blue: #4da6ff;
        }

        body {
            background: linear-gradient(135deg, #0a0000 0%, #1a0000 100%);
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(139, 0, 0, 0.1);
            border-radius: 16px;
            border: 2px solid rgba(139, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6b6b, #cc0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #cc0000, #8b0000);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(204, 0, 0, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .stat-card.errors { border-color: var(--error-red); }
        .stat-card.warnings { border-color: var(--warning-orange); }
        .stat-card.valid { border-color: var(--success-green); }
        .stat-card.total { border-color: var(--info-blue); }

        .stat-card h3 {
            font-size: 2rem;
            margin: 0 0 5px 0;
        }

        .stat-card p {
            margin: 0;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .results {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 30px;
            border: 2px solid rgba(139, 0, 0, 0.3);
        }

        .issue-section {
            margin-bottom: 30px;
        }

        .issue-section h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .issue-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .issue-item.error { border-color: var(--error-red); }
        .issue-item.warning { border-color: var(--warning-orange); }

        .issue-item .title {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 1.05rem;
        }

        .issue-item .message {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .issue-item .fix {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(204, 0, 0, 0.2);
            border-top-color: #cc0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            opacity: 0.6;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <a href="../dashboard/dashboard.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Dashboard
    </a>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-clipboard-check"></i> Content Validator</h1>
            <p>Check all content for missing fields, errors, and inconsistencies</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="validateAll()">
                <i class="fas fa-search"></i> Validate All Content
            </button>
            <button class="btn btn-secondary" onclick="validateCourses()">
                <i class="fas fa-graduation-cap"></i> Courses Only
            </button>
            <button class="btn btn-secondary" onclick="validateBooks()">
                <i class="fas fa-book"></i> Books Only
            </button>
            <button class="btn btn-secondary" onclick="validateProjects()">
                <i class="fas fa-project-diagram"></i> Projects Only
            </button>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card total">
                <h3 id="totalCount">0</h3>
                <p><i class="fas fa-list"></i> Total Items</p>
            </div>
            <div class="stat-card valid">
                <h3 id="validCount">0</h3>
                <p><i class="fas fa-check-circle"></i> Valid</p>
            </div>
            <div class="stat-card warnings">
                <h3 id="warningCount">0</h3>
                <p><i class="fas fa-exclamation-triangle"></i> Warnings</p>
            </div>
            <div class="stat-card errors">
                <h3 id="errorCount">0</h3>
                <p><i class="fas fa-times-circle"></i> Errors</p>
            </div>
        </div>

        <div class="results" id="results">
            <div class="empty-state">
                <i class="fas fa-clipboard-list"></i>
                <h3>Ready to Validate</h3>
                <p>Click a button above to start validation</p>
            </div>
        </div>
    </div>

    <script>
        const JSON_SOURCES = [
            { url: '../../Content Studio/educational-videos/courses.json', type: 'course', arrayKey: 'courses' },
            { url: '../../Content Studio/books-pdfs/books.json', type: 'book', arrayKey: 'books' },
            { url: '../../Content Studio/research-papers/papers.json', type: 'paper', arrayKey: 'papers' },
            { url: '../../Projects Code/projects.json', type: 'project', arrayKey: 'projects' }
        ];

        let allIssues = [];
        let totalItems = 0;
        let validItems = 0;
        let itemsWithWarnings = 0;
        let itemsWithErrors = 0;

        async function validateAll() {
            showLoading();
            allIssues = [];
            totalItems = 0;
            validItems = 0;
            itemsWithWarnings = 0;
            itemsWithErrors = 0;

            for (const source of JSON_SOURCES) {
                await validateSource(source);
            }

            displayResults();
        }

        async function validateCourses() {
            await validateSpecific('course');
        }

        async function validateBooks() {
            await validateSpecific('book');
        }

        async function validateProjects() {
            await validateSpecific('project');
        }

        async function validateSpecific(type) {
            showLoading();
            allIssues = [];
            totalItems = 0;
            validItems = 0;
            itemsWithWarnings = 0;
            itemsWithErrors = 0;

            const source = JSON_SOURCES.find(s => s.type === type);
            if (source) {
                await validateSource(source);
            }

            displayResults();
        }

        async function validateSource(source) {
            try {
                const response = await fetch(source.url);
                if (!response.ok) {
                    allIssues.push({
                        type: 'error',
                        source: source.type,
                        title: `Failed to load ${source.type}s`,
                        message: `HTTP ${response.status}: ${response.statusText}`,
                        fix: `Check if file exists: ${source.url}`
                    });
                    return;
                }

                const data = await response.json();
                const items = data[source.arrayKey] || [];

                console.log(`✅ Loaded ${items.length} ${source.type}(s)`);

                items.forEach(item => {
                    totalItems++;
                    const issues = validateItem(item, source.type);
                    
                    if (issues.errors.length === 0 && issues.warnings.length === 0) {
                        validItems++;
                    } else {
                        if (issues.errors.length > 0) itemsWithErrors++;
                        if (issues.warnings.length > 0) itemsWithWarnings++;
                        
                        allIssues.push(...issues.errors);
                        allIssues.push(...issues.warnings);
                    }
                });

            } catch (error) {
                console.error(`Error validating ${source.type}:`, error);
                allIssues.push({
                    type: 'error',
                    source: source.type,
                    title: `Parse Error: ${source.type}s`,
                    message: error.message,
                    fix: 'Check JSON syntax at https://jsonlint.com'
                });
            }
        }

        function validateItem(item, contentType) {
            const errors = [];
            const warnings = [];

            // Rule 1: Must have ID
            if (!item.id) {
                errors.push({
                    type: 'error',
                    source: contentType,
                    title: `Missing ID`,
                    message: `Item "${item.title || 'Unknown'}" has no ID field`,
                    fix: `Add: "id": "unique-id-here"`
                });
            }

            // Rule 2: Must have title
            if (!item.title) {
                errors.push({
                    type: 'error',
                    source: contentType,
                    title: `Missing Title`,
                    message: `Item "${item.id || 'Unknown'}" has no title`,
                    fix: `Add: "title": "Content Title"`
                });
            }

            // Rule 3: Check accessType
            if (!item.accessType) {
                warnings.push({
                    type: 'warning',
                    source: contentType,
                    title: `No Access Type (Defaulting to FREE)`,
                    message: `"${item.title || item.id}" has no accessType field`,
                    fix: `Add: "accessType": "free" or "accessType": "paid"`
                });
            }

            // Rule 4: If PAID, must have price
            if (item.accessType === 'paid') {
                if (!item.price) {
                    errors.push({
                        type: 'error',
                        source: contentType,
                        title: `PAID Content Missing Price`,
                        message: `"${item.title}" is marked PAID but has no price field`,
                        fix: `Add: "price": { "amount": 199, "currency": "BDT" }`
                    });
                } else if (!item.price.amount) {
                    errors.push({
                        type: 'error',
                        source: contentType,
                        title: `Price Missing Amount`,
                        message: `"${item.title}" has price object but no amount`,
                        fix: `Add: "price": { "amount": 199 }`
                    });
                } else {
                    // Check reasonable price range
                    const amount = item.price.amount;
                    if (amount < 10) {
                        warnings.push({
                            type: 'warning',
                            source: contentType,
                            title: `Price Too Low`,
                            message: `"${item.title}" costs only ৳${amount} (unusual)`,
                            fix: `Verify this is correct. Typical range: ৳49-৳999`
                        });
                    } else if (amount > 5000) {
                        warnings.push({
                            type: 'warning',
                            source: contentType,
                            title: `Price Very High`,
                            message: `"${item.title}" costs ৳${amount} (very expensive)`,
                            fix: `Verify this is correct. Typical range: ৳49-৳999`
                        });
                    }
                }
            }

            // Rule 5: If FREE, shouldn't have price
            if (item.accessType === 'free' && item.price) {
                warnings.push({
                    type: 'warning',
                    source: contentType,
                    title: `FREE Content Has Price`,
                    message: `"${item.title}" is FREE but has price field`,
                    fix: `Remove price field or change accessType to "paid"`
                });
            }

            // Rule 6: Check for duplicate IDs (would need global tracking)
            // Skipping for simplicity

            // Rule 7: Check description
            if (!item.description && !item.subtitle) {
                warnings.push({
                    type: 'warning',
                    source: contentType,
                    title: `No Description`,
                    message: `"${item.title}" has no description or subtitle`,
                    fix: `Add: "description": "Content description here"`
                });
            }

            // Rule 8: Discount logic check
            if (item.price && item.price.originalPrice && item.price.discount) {
                const calculated = Math.round((1 - item.price.amount / item.price.originalPrice) * 100);
                const stated = item.price.discount;
                
                if (Math.abs(calculated - stated) > 1) {
                    warnings.push({
                        type: 'warning',
                        source: contentType,
                        title: `Discount Mismatch`,
                        message: `"${item.title}" discount is ${stated}% but calculated is ${calculated}%`,
                        fix: `Check: (1 - ${item.price.amount}/${item.price.originalPrice}) * 100 = ${calculated}%`
                    });
                }
            }

            return { errors, warnings };
        }

        function showLoading() {
            document.getElementById('results').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 20px;">Validating content...</p>
                </div>
            `;
            document.getElementById('stats').style.display = 'none';
        }

        function displayResults() {
            // Update stats
            document.getElementById('totalCount').textContent = totalItems;
            document.getElementById('validCount').textContent = validItems;
            document.getElementById('warningCount').textContent = itemsWithWarnings;
            document.getElementById('errorCount').textContent = itemsWithErrors;
            document.getElementById('stats').style.display = 'grid';

            // Display issues
            const errors = allIssues.filter(i => i.type === 'error');
            const warnings = allIssues.filter(i => i.type === 'warning');

            let html = '';

            if (errors.length === 0 && warnings.length === 0) {
                html = `
                    <div class="empty-state">
                        <i class="fas fa-check-circle" style="color: var(--success-green);"></i>
                        <h3>All Clear! ✅</h3>
                        <p>No errors or warnings found. All ${totalItems} items are valid.</p>
                    </div>
                `;
            } else {
                if (errors.length > 0) {
                    html += `
                        <div class="issue-section">
                            <h2><i class="fas fa-times-circle" style="color: var(--error-red);"></i> Errors (${errors.length})</h2>
                            ${errors.map(issue => `
                                <div class="issue-item error">
                                    <div class="title">
                                        <i class="fas fa-exclamation-circle"></i>
                                        [${issue.source.toUpperCase()}] ${issue.title}
                                    </div>
                                    <div class="message">${issue.message}</div>
                                    <div class="fix">💡 Fix: ${issue.fix}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                if (warnings.length > 0) {
                    html += `
                        <div class="issue-section">
                            <h2><i class="fas fa-exclamation-triangle" style="color: var(--warning-orange);"></i> Warnings (${warnings.length})</h2>
                            ${warnings.map(issue => `
                                <div class="issue-item warning">
                                    <div class="title">
                                        <i class="fas fa-exclamation-triangle"></i>
                                        [${issue.source.toUpperCase()}] ${issue.title}
                                    </div>
                                    <div class="message">${issue.message}</div>
                                    <div class="fix">💡 Suggestion: ${issue.fix}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            }

            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
